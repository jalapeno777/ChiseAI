groups:
  - name: paper_trading
    rules:
      - alert: SignalConsumerDown
        expr: time() - redis_key_last_update_seconds{key="paper:signal_consumer:health"} > 120
        for: 1m
        labels:
          severity: critical
          team: paper-trading
        annotations:
          summary: "Signal Consumer is down or unresponsive"
          description: >-
            The signal consumer health key has not been updated for over
            2 minutes, indicating the consumer may be down or unresponsive.
          runbook_url: "https://docs.chiseai.com/runbooks/paper_trading#signal-consumer-down"

      - alert: PipelineStaleNoSignals
        expr: increase(pipeline_signals_generated[15m]) == 0
        for: 1m
        labels:
          severity: warning
          team: paper-trading
        annotations:
          summary: "Pipeline has not generated signals for >15 minutes"
          description: "No signals have been generated by the paper trading pipeline in the last 15 minutes."
          runbook_url: "https://docs.chiseai.com/runbooks/paper_trading#no-signals-generated"

      - alert: PipelineStaleNoOrders
        expr: increase(pipeline_orders_executed[30m]) == 0
        for: 2m
        labels:
          severity: warning
          team: paper-trading
        annotations:
          summary: "Pipeline has not executed orders for >30 minutes"
          description: "No orders have been executed by the paper trading pipeline in the last 30 minutes."
          runbook_url: "https://docs.chiseai.com/runbooks/paper_trading#no-orders-executed"
