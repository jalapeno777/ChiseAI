version: "3.8"

services:
  grafana-watchdog:
    build:
      context: ../../..
      dockerfile: infrastructure/grafana/watchdog/Dockerfile
    container_name: chiseai-grafana-watchdog
    networks:
      - chiseai
    volumes:
      - ../../../infrastructure/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:rw
    environment:
      - GRAFANA_URL=${GRAFANA_URL:-http://host.docker.internal:3001}
      - GRAFANA_USER=${GRAFANA_USER:-admin}
      - GRAFANA_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - DASHBOARDS_PATH=/etc/grafana/provisioning/dashboards
      - WATCHDOG_LOG_LEVEL=${WATCHDOG_LOG_LEVEL:-INFO}
      - WATCHDOG_DEBOUNCE_SECONDS=${WATCHDOG_DEBOUNCE_SECONDS:-5}
    labels:
      - "project=chiseai"
    restart: unless-stopped
    depends_on:
      - grafana
    healthcheck:
      test: ["CMD", "python3", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:10.4.0
    container_name: chiseai-grafana
    networks:
      - chiseai
    ports:
      - "3001:3001"
    volumes:
      - ../../../infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SERVER_HTTP_PORT=3001
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_CSRF_ADDITIONAL_HEADERS=X-Forwarded-Host
    labels:
      - "project=chiseai"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  chiseai:
    external: true

volumes:
  grafana-storage:
