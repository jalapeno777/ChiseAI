services:
  paper-trading-consumer:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.paper-trading
    container_name: chiseai-paper-trading-consumer
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - chiseai
    environment:
      - REDIS_HOST=chiseai-redis
      - REDIS_PORT=6380
      - PAPER_REDIS_HOST=chiseai-redis
      - PAPER_REDIS_PORT=6380
      - REDIS_URL=redis://chiseai-redis:6380
      - PAPER_REDIS_DB=0
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=${POSTGRES_PORT:-5434}
      - POSTGRES_USER=${POSTGRES_USER:-chiseai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - POSTGRES_DB=${POSTGRES_DB:-chiseai_trading}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src:/app/scripts
      - TRADING_SYMBOLS=BTC/USDT,ETH/USDT
      - SYMBOL_EVAL_INTERVAL_SECONDS=300
      - PORTFOLIO_VALUE=10000.0
      - CONFIDENCE_THRESHOLD=0.70
      # Disabled: allows live fill prices from exchange instead of simulated fills
      - FORCE_SIMULATOR_MODE=false
    volumes:
      - paper-trading-logs:/var/log/chiseai
    command: >
      python3 scripts/run_signal_consumer.py
      --portfolio-value 10000.0
      --confidence-threshold 0.70
    labels:
      - "project=chiseai"
      - "service=paper-trading"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import redis.asyncio as redis; import asyncio; asyncio.run(redis.Redis(host=''chiseai-redis'', port=6380).ping())" && python3 -c "import redis; r=redis.Redis(host=''chiseai-redis'', port=6380); r.ping() and r.exists(''paper:signal_consumer:health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  ohlcv-ingestion:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.ohlcv-ingestion
    container_name: chiseai-ohlcv-ingestion
    restart: unless-stopped
    networks:
      - chiseai
    environment:
      - EXCHANGE_ID=bybit
      - SYMBOLS=BTC/USDT,ETH/USDT
      - TIMEFRAMES=1m,5m,15m,1h
      - INGEST_INTERVAL_SECONDS=60
      - INFLUXDB_URL=http://chiseai-influxdb:18087
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-chiseai}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-market_data}
    labels:
      - "project=chiseai"
      - "service=ohlcv-ingestion"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

networks:
  chiseai:
    external: true

volumes:
  paper-trading-logs:
    driver: local
