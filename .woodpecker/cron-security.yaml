# Woodpecker Full Security Audit Pipeline
#
# Purpose:
# - Run heavyweight security checks on an intentional cadence instead of every PR.
# - Keep routine CI fast while preserving scheduled dependency and code scans.
#
# Suggested cron name in Woodpecker UI:
#   - weekly-security-audit
#
when:
  event:
    - cron
  branch:
    - main
  cron:
    - weekly-security-audit
    - docker-live-check

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  dependency-audit-full:
    pull: false
    image: chiseai-ci-dependency-audit:py311-20260324
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
      FORCE_DEPENDENCY_AUDIT: "1"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          echo "dependency-audit-full: forcing dependency vulnerability audit"
          python3 scripts/ci/dependency_audit.py
        ) > "$${CI_STATUS_DIR}/dependency-audit-full.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/dependency-audit-full.log"
        echo "$code" > "$${CI_STATUS_DIR}/dependency-audit-full.status"
        exit 0

  security-scan-full:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          echo "security-scan-full: running full Bandit scan over src/ and scripts/"
          bandit -q -lll -c pyproject.toml -r src scripts
        ) > "$${CI_STATUS_DIR}/security-scan-full.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/security-scan-full.log"
        echo "$code" > "$${CI_STATUS_DIR}/security-scan-full.status"
        exit 0

  docker-live-check:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/docker_live_check.py
        ) > "$${CI_STATUS_DIR}/docker-live-check.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/docker-live-check.log"
        echo "$code" > "$${CI_STATUS_DIR}/docker-live-check.status"
        exit 0

  security-audit-gate:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    depends_on:
      - dependency-audit-full
      - security-scan-full
      - docker-live-check
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        missing=0
        failed=0
        for gate in dependency-audit-full security-scan-full; do
          status_file="$${CI_STATUS_DIR}/$${gate}.status"
          if [ ! -f "$${status_file}" ]; then
            echo "security-audit-gate: missing status file for $${gate}" >&2
            missing=1
            continue
          fi
          status="$(cat "$${status_file}")"
          echo "security-audit-gate: $${gate} -> $${status}"
          if [ "$${status}" != "0" ]; then
            failed=1
          fi
        done
        if [ "$${missing}" != "0" ] || [ "$${failed}" != "0" ]; then
          echo "security-audit-gate: FAIL" >&2
          exit 1
        fi
        echo "security-audit-gate: PASS"
