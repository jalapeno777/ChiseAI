# Woodpecker CI Pipeline for ChiseAI
# ST-NS-030: CI/CD Pipeline Enhancement

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

when:
  - event: push
    branch: [main, develop]

steps:
  # Lint Stage
  lint:
    image: python:3.13
    commands:
      - pip install black ruff mypy
      - black --check --diff src/ tests/
      - ruff check src/ tests/
      - mypy src/ --ignore-missing-imports || true
    when:
      - event: push

  # Test Stage with Coverage
  test:
    image: python:3.13
    environment:
      PYTHONPATH: /woodpecker/src/github.com/chiseai/chiseai
    commands:
      - pip install pytest pytest-cov pytest-xdist pytest-asyncio
      - pip install -r requirements.txt || true
      - pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing -n4
    when:
      - event: push

  # Security Scan
  security:
    image: python:3.13
    commands:
      - pip install bandit safety
      - bandit -r src/ -f json || true
      - safety check --json || true
    when:
      - event: push

  # Build Stage
  build:
    image: python:3.13
    commands:
      - pip install build wheel
      - python -m build
    when:
      - event: push
        branch: [main, develop]

  # Optional failure notification.
  # Avoids hard-failing pipeline parsing when Slack secret is not configured.
  notify-failure:
    image: alpine:3.21
    commands:
      - |
        set -eu
        if [ -z "${CI_SLACK_WEBHOOK:-}" ]; then
          echo "CI_SLACK_WEBHOOK not set; skipping Slack notification"
          exit 0
        fi
        apk add --no-cache curl >/dev/null
        payload="$(printf '{"text":"❌ Pipeline failed for %s on %s\\nCommit: %s\\nAuthor: %s\\nMessage: %s"}' \
          "${CI_REPO:-unknown}" "${CI_COMMIT_BRANCH:-unknown}" "${CI_COMMIT_SHA:-unknown}" \
          "${CI_COMMIT_AUTHOR:-unknown}" "${CI_COMMIT_MESSAGE:-unknown}")"
        curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "${CI_SLACK_WEBHOOK}" >/dev/null
    when:
      - event: push
        status: failure

# Services for integration tests
services:
  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: chiseai_test

# Matrix builds for Python versions
matrix:
  PYTHON_VERSION:
    - "3.11"
    - "3.12"
    - "3.13"
