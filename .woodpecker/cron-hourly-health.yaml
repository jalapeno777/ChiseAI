# Woodpecker Hourly Health Check Pipeline
#
# Story: HOURLY-HEALTH-001 - Hourly Health Check Scheduling
#
# Purpose:
# - Run the hourly health check via Woodpecker instead of system crontab.
# - Provides CI-visible logs, retry handling, and evidence tracking.
# - Script posts summary to Discord #development and writes Redis evidence.
#
# CRON SCHEDULE (configured in Woodpecker UI):
#   - hourly-health: Every hour at minute 0 (0 * * * *)
#
# SAFETY: Read-only health check. No risk/promotion/live-trading flow modified.
# SAFETY: Redis writes are limited to chise:cron:hourly-health:* evidence keys.

when:
  event:
    - cron
  branch:
    - main
  cron:
    - hourly-health

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  hourly-health-check:
    pull: false
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
      REDIS_HOST: "host.docker.internal"
      REDIS_PORT: "6380"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        mkdir -p logs/monitoring
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir redis requests

          echo "Running hourly health check..."
          python3 scripts/monitoring/cron_wrapper.py scripts/monitoring/hourly_health_check.py --verbose

          echo "Checking Redis evidence keys..."
          python3 -c "
          import redis, json
          r = redis.Redis(host='host.docker.internal', port=6380, decode_responses=True)
          keys = r.keys('chise:cron:hourly-health:*')
          for k in sorted(keys):
              val = r.get(k)
              print(f'  {k} = {val[:200] if val else \"(none)\"}')
          if not keys:
              print('  WARNING: No Redis evidence keys found')
          "
        ) > "$${CI_STATUS_DIR}/hourly-health-check.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/hourly-health-check.log"
        echo "$code" > "$${CI_STATUS_DIR}/hourly-health-check.status"
        # NOTE: exit 0 is intentional — the actual pass/fail gate is in the
        # next step (health-check-gate) which reads the .status file.
        # This step must always succeed so the gate step can inspect the result.
        if [ "$code" != "0" ]; then
          echo "ALERT: hourly-health-check script failed with exit code $code"
        fi
        exit 0

  health-check-gate:
    pull: false
    image: python:3.11
    depends_on:
      - hourly-health-check
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        status_file="$${CI_STATUS_DIR}/hourly-health-check.status"
        if [ ! -f "$${status_file}" ]; then
          echo "health-check-gate: missing status file" >&2
          exit 1
        fi
        status="$(cat "$${status_file}")"
        echo "health-check-gate: hourly-health-check -> $${status}"
        if [ "$${status}" != "0" ]; then
          echo "health-check-gate: FAIL" >&2
          exit 1
        fi
        echo "health-check-gate: PASS"
