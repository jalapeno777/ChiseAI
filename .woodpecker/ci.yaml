  pre-eval-ingestion:
    image: python:3.11
    # Full diagnostics only; PRs rely on fast gates to stay within budget.
    when:
      event:
        - manual
        - cron
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
      # CI_TEMPMEMORY_INGESTION_ENABLED: Feature flag for tempmemory ingestion
      # - Default: enabled for staging (non-main branches), disabled for production (main)
      # - Override: Set CI_TEMPMEMORY_INGESTION_ENABLED=true/false at pipeline level
      # - Rollback: Set to "false" or remove this step from pipeline
      CI_TEMPMEMORY_INGESTION_ENABLED: "${CI_TEMPMEMORY_INGESTION_ENABLED:-auto}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python -V
          echo "Running pre-evaluation tempmemory ingestion..."
          # Determine feature flag value
          # "auto" mode: enabled for non-main branches (staging), disabled for main (production)
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "auto" ]; then
            if [ "$${CI_COMMIT_BRANCH}" != "main" ] && [ "$${CI_COMMIT_BRANCH}" != "$${CI_REPO_DEFAULT_BRANCH:-main}" ]; then
              CI_TEMPMEMORY_INGESTION_ENABLED="true"
              echo "Staging branch detected ($${CI_COMMIT_BRANCH}). Enabling tempmemory ingestion."
            else
              CI_TEMPMEMORY_INGESTION_ENABLED="false"
              echo "Production branch detected ($${CI_COMMIT_BRANCH}). Disabling tempmemory ingestion."
            fi
          fi
          echo "Feature flag CI_TEMPMEMORY_INGESTION_ENABLED=$${CI_TEMPMEMORY_INGESTION_ENABLED}"
          # Fast-path when ingestion is disabled (main/prod by default):
          # avoid expensive dependency bootstrapping and emit a compatible report.
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" != "true" ]; then
            echo "Ingestion disabled for this branch; writing skip report and exiting step early."
            printf '%s\n' '{"success": true, "skipped": true, "reason": "Feature flag disabled", "files_processed": 0, "files_ingested": 0, "files_failed": 0, "files_skipped": 0, "duration_seconds": 0, "errors": [], "ingested_memory_ids": []}' > "$${CI_STATUS_DIR}/pre-eval-ingestion.json"
            exit 0
          fi
          # Install only dependencies needed for enabled ingestion mode.
          pip install --no-cache-dir pyyaml redis qdrant-client || true
          # Run pre-eval ingestion
          python scripts/ci/pre_eval_ingestion.py --output "$${CI_STATUS_DIR}/pre-eval-ingestion.json"
        ) > "$${CI_STATUS_DIR}/pre-eval-ingestion.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/pre-eval-ingestion.log"
        echo "$code" > "$${CI_STATUS_DIR}/pre-eval-ingestion.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  brain-eval:
    image: python:3.11
    # Full diagnostics only; PRs rely on brain-regression fast gate.
    when:
      event:
        - manual
        - cron
    depends_on:
      - pre-eval-ingestion
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
      CI_TEMPMEMORY_INGESTION_ENABLED: "${CI_TEMPMEMORY_INGESTION_ENABLED:-auto}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python -V
          echo "brain-eval: start $(date -Iseconds)"
          # Determine feature flag value (same logic as pre-eval-ingestion)
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "auto" ]; then
            if [ "$${CI_COMMIT_BRANCH}" != "main" ] && [ "$${CI_COMMIT_BRANCH}" != "$${CI_REPO_DEFAULT_BRANCH:-main}" ]; then
              CI_TEMPMEMORY_INGESTION_ENABLED="true"
            else
              CI_TEMPMEMORY_INGESTION_ENABLED="false"
            fi
          fi
          # Check ingestion results if enabled
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "true" ] && [ -f "$${CI_STATUS_DIR}/pre-eval-ingestion.json" ]; then
            echo "Checking pre-eval ingestion results..."
            INGESTION_SUCCESS=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('success', False))")
            INGESTION_INGESTED=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('files_ingested', 0))")
            echo "Ingestion success: $${INGESTION_SUCCESS}, Files ingested: $${INGESTION_INGESTED}"
          fi
          # Determine changed files from Woodpecker-provided metadata first.
          CHANGED_FILES="$(printf '%s' \"$${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' || true)"
          if [ -z "$(printf '%s' "$${CHANGED_FILES}" | tr -d '[:space:]')" ]; then
            # Fallback to commit-local file list when CI_PIPELINE_FILES is unavailable.
            CHANGED_FILES="$(git show --name-only --pretty='' HEAD 2>/dev/null || true)"
          fi

          if printf '%s\n' "$${CHANGED_FILES}" | grep -qE '^(src/brain/|src/neuro_symbolic/|src/strategy/)'; then
            echo "brain-eval: Brain changes detected, running evaluation..."
            pip install --no-cache-dir pyyaml requests numpy scipy
            pip install -e . > /dev/null 2>&1 || pip install -e . --break-system-packages > /dev/null 2>&1 || true
            python scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-eval.json"
          else
            echo "brain-eval: No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > "$${CI_STATUS_DIR}/brain-eval.json"
          fi
          echo "brain-eval: complete $(date -Iseconds)"
        ) > "$${CI_STATUS_DIR}/brain-eval.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-eval.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-eval.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

