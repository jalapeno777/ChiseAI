          set -euo pipefail
          CHANGED_FILES="$(printf '%s' "${CI_PIPELINE_FILES:-[]}" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' || true)"
          if ! printf '%s\n' "$CHANGED_FILES" | grep -qx "docs/bmm-workflow-status.yaml"; then
            echo "completion-evidence-gate: workflow status file unchanged; skipping"
            exit 0
          fi
          echo "completion-evidence-gate: workflow status file changed; running validation..."
          python3 scripts/validate_completion_evidence.py --legacy-grace-period-days 7
        ) > "$${CI_STATUS_DIR}/completion-evidence-gate.log" 2>&1
        code=$$?; cat "$${CI_STATUS_DIR}/completion-evidence-gate.log"; echo "$$code" > "$${CI_STATUS_DIR}/completion-evidence-gate.status"

        # 4. workflow-transition-gate
        echo "governance-gates-group: [4/6] Running workflow-transition-gate..."
        (
          set -euo pipefail
          CHANGED_FILES="$(printf '%s' "${CI_PIPELINE_FILES:-[]}" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' || true)"
          if ! printf '%s\n' "$CHANGED_FILES" | grep -qx "docs/bmm-workflow-status.yaml"; then
            echo "workflow-transition-gate: workflow status file unchanged; skipping"
            exit 0
          fi
          echo "workflow-transition-gate: workflow status file changed; running validation..."
          python3 scripts/validation/validate_workflow_transitions.py
        ) > "$${CI_STATUS_DIR}/workflow-transition-gate.log" 2>&1
        code=$$?; cat "$${CI_STATUS_DIR}/workflow-transition-gate.log"; echo "$$code" > "$${CI_STATUS_DIR}/workflow-transition-gate.status"

        # 5. governance-drift-check
        echo "governance-gates-group: [5/6] Running governance-drift-check..."
        (
          set -euo pipefail
          python3 scripts/validation/governance_drift_guard.py --verbose
        ) > "$${CI_STATUS_DIR}/governance-drift-check.log" 2>&1
        code=$$?; cat "$${CI_STATUS_DIR}/governance-drift-check.log"; echo "$$code" > "$${CI_STATUS_DIR}/governance-drift-check.status"

        # 6. evidence-gate
        echo "governance-gates-group: [6/6] Running evidence-gate..."
        (
          set -euo pipefail
          echo "evidence-gate: Running evidence validation..."
          python3 scripts/ci/evidence_gate_runner.py --verbose
        ) > "$${CI_STATUS_DIR}/evidence-gate.log" 2>&1
        code=$$?; cat "$${CI_STATUS_DIR}/evidence-gate.log"; echo "$$code" > "$${CI_STATUS_DIR}/evidence-gate.status"

        GROUP_END_TIME=$$(date +%s)
        GROUP_DURATION=$$((GROUP_END_TIME - GROUP_START_TIME))
        echo "governance-gates-group: All 6 governance gates completed in $${GROUP_DURATION}s"
        echo "0" > "$${CI_STATUS_DIR}/governance-gates-group.status"
        exit 0
  ci-gate:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    depends_on:
      - swarm-context
      - cross-branch-verify
      - lint
      - security-scan
      - dependency-audit
      - secret-scan
      - risk-invariants
      - brain-regression
      - docker-governance
      - e2e-tests
      - integration-tests
      - local-ci
      - brain-eval
      - performance-gate
      - truth-gate
      - flaky-detection
      - tempmemory-operations-group
      - evaluation-pre-eval-group
      - quality-advisory-group
      - governance-gates-group
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - "set -euo pipefail\npython3 scripts/ci/ci_gate.py\n"
  pr-automerge:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    depends_on:
      - ci-gate
    when:
      event:
        - pull_request
    environment:
      GITEA_BASE_URL: http://host.docker.internal:3000
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
      GITEA_TOKEN:
        from_secret: gitea_token
      CHISE_AUTOPR_BASE: main
      CHISE_AUTOPR_PROTECTED_BRANCHES: main,develop
      CHISE_AUTOPR_SOURCE_BRANCH: ${CI_COMMIT_BRANCH}
      CHISE_AUTOPR_ENABLE_SERVER_AUTOMERGE: "1"
    commands:
      - |
        set -euo pipefail
        python3 scripts/pr_lifecycle/auto_pr_merge.py automerge --enable-automerge || {
          echo "pr-automerge: non-blocking failure while enabling merge checks; continuing"
          exit 0
        }
