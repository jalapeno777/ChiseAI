            echo "brain-eval: SKIPPED (push-to-main, PR is authoritative)"
            echo '{"success": true, "skipped": true, "reason": "push-to-main"}' > "$${CI_STATUS_DIR}/brain-eval.json"
            echo "0" > "$${CI_STATUS_DIR}/brain-eval.status"
            exit 0
          fi
          python -V
          # Determine feature flag value (same logic as pre-eval-ingestion)
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "auto" ]; then
            if [ "$${CI_COMMIT_BRANCH}" != "main" ] && [ "$${CI_COMMIT_BRANCH}" != "$${CI_REPO_DEFAULT_BRANCH:-main}" ]; then
              CI_TEMPMEMORY_INGESTION_ENABLED="true"
            else
              CI_TEMPMEMORY_INGESTION_ENABLED="false"
            fi
          fi
          # Check ingestion results if enabled
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "true" ] && [ -f "$${CI_STATUS_DIR}/pre-eval-ingestion.json" ]; then
            echo "Checking pre-eval ingestion results..."
            INGESTION_SUCCESS=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('success', False))")
            INGESTION_INGESTED=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('files_ingested', 0))")
            echo "Ingestion success: $${INGESTION_SUCCESS}, Files ingested: $${INGESTION_INGESTED}"
          fi
          # Check if brain files changed
          CHANGED_BRAIN_FILES="$(python3 scripts/ci/ci_change_scope.py --base-ref origin/main --mode changed-python | grep -E '^(src/brain/|src/neuro_symbolic/|src/strategy/)' || true)"
          if [ -n "$(printf '%s' "$${CHANGED_BRAIN_FILES}" | tr -d '[:space:]')" ]; then
            echo "Brain changes detected, running evaluation..."
            pip install -e . || pip install -e . --break-system-packages
            # D-03: Verify pip install actually worked - detect silent failures
            python -c "import chiseai" || { echo "FATAL: pip install failed silently - package not importable"; exit 1; }
            python scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-eval.json"
          else
            echo "No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > "$${CI_STATUS_DIR}/brain-eval.json"
          fi
        ) > "$${CI_STATUS_DIR}/brain-eval.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-eval.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-eval.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

