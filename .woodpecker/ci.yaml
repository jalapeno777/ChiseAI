# Woodpecker CI Pipeline Configuration for ChiseAI
# Story: ST-CI-001 - Real CI Gates
#
# DESIGN PRINCIPLE: Non-blocking steps with single fail point
# - Individual steps capture exit codes but always exit 0
# - The ci-gate step (at the end) is the SINGLE authoritative failure point
# - This ensures all validations run and provide feedback before failing
#
# BLOCKING GATES (via ci-gate.py FAST_REQUIRED list):
#   - swarm-context: Repository context validation
#   - lint: Code quality (black, ruff, mypy, status sync, iterlog governance)
#     Note: insight/metacog governance checks are intentionally lint-bundled to keep
#     gate fan-out small while preserving strict blocking on changed iterlogs.
#   - security-scan: Bandit security analysis
#   - dependency-audit: pip-audit vulnerability scan
#   - secret-scan: Hardcoded secret detection
#   - risk-invariants: Critical risk invariant tests
#   - brain-regression: Brain evaluation regression tests
#   - docs-pairing: Documentation pairing validation
#   - docker-governance: Docker container governance
#   - changed-lines-coverage: Coverage on changed lines
#   - status-write-gate: Workflow status file validation
#
# FULL-ONLY GATES (main/cron or FORCE_FULL_GATE=1):
#   - local-ci: Full test suite
#   - brain-eval: Brain evaluation
#
# CRON-ONLY GATES (main cron or FORCE_CRON_GATE=1):
#   - tempmemory-drill: Tempmemory reconciliation drill
#   - flaky-detection: Flaky test detection
#
# Triggers: pull_request, manual, cron events
when:
  event:
    - pull_request
    - manual
    - cron

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  swarm-context:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python scripts/ci/validate_swarm_context.py
        ) > "$${CI_STATUS_DIR}/swarm-context.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/swarm-context.log"
        echo "$code" > "$${CI_STATUS_DIR}/swarm-context.status"
        exit 0

  lint:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir black ruff mypy pytest pytest-cov pyyaml types-PyYAML types-requests || echo "WARN: pip install failed, continuing"
          CHANGED_PY="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$CHANGED_PY" | tr -d '[:space:]')" ]; then
            echo "lint: checking changed python files only: ${CHANGED_PY}"
            black --check ${CHANGED_PY} || echo "WARN: black violations (non-blocking)"
            ruff check ${CHANGED_PY} || echo "WARN: ruff violations (non-blocking)"
          else
            echo "lint: no changed python files; skipping black/ruff file checks"
          fi
          MYPY_CHANGED="$(printf '%s' \"$CHANGED_PY\" | tr ' ' '\n' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$MYPY_CHANGED" | tr -d '[:space:]')" ]; then
            echo "mypy: checking changed src/scripts files: ${MYPY_CHANGED}"
            mypy ${MYPY_CHANGED} || echo "WARN: mypy violations (non-blocking)"
          else
            echo "mypy: no changed src/scripts files; checking baseline src package"
            mypy src || echo "WARN: mypy violations (non-blocking)"
          fi
          python scripts/validate_status_sync.py || echo "WARN: status sync issues (non-blocking)"
          python scripts/validate_fr_traceability.py || echo "WARN: FR traceability issues (non-blocking)"
          # Iterloop compliance remains optional by default to avoid blocking
          # non-story infra/docs runs. Set CI_SKIP_ITERLOOP_COMPLIANCE=0 to enforce.
          if [ "${CI_SKIP_ITERLOOP_COMPLIANCE:-1}" = "1" ]; then
            echo "lint: skipping iterloop compliance (CI_SKIP_ITERLOOP_COMPLIANCE=1)"
          else
            python scripts/validate_iterloop_compliance.py || echo "WARN: iterloop compliance issues (non-blocking)"
          fi
          CHANGED_ITERLOGS="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '^docs/tempmemories/iterlog-.*\\.md$' || true)"
          if [ -n "$(printf '%s' "$CHANGED_ITERLOGS" | tr -d '[:space:]')" ]; then
            echo "insight-governance: validating changed iterlogs (blocking)"
            printf '%s\n' "$CHANGED_ITERLOGS" | while IFS= read -r iterlog_path; do
              [ -z "$iterlog_path" ] && continue
              story_id="$(basename "$iterlog_path" .md | sed 's/^iterlog-//')"
              echo " - validating story_id=${story_id} from ${iterlog_path}"
              TP_SESSION_ARGS=""
              if [ "${CI_TP_SESSION_SELF_HEAL:-1}" = "1" ]; then
                TP_SESSION_ARGS="--tp-session-self-heal"
              fi
              python scripts/validation/validate_insight_governance.py \
                --story-id "${story_id}" \
                --strict \
                --tp-session-artifact-mode "${CI_TP_SESSION_ARTIFACT_MODE:-warn}" \
                ${TP_SESSION_ARGS}
            done
            echo "metacog-governance: validating changed iterlogs (blocking)"
            printf '%s\n' "$CHANGED_ITERLOGS" | while IFS= read -r iterlog_path; do
              [ -z "$iterlog_path" ] && continue
              story_id="$(basename "$iterlog_path" .md | sed 's/^iterlog-//')"
              echo " - validating story_id=${story_id} from ${iterlog_path}"
              if [ "${CI_REQUIRE_REDIS_METACOG_ARTIFACTS:-0}" = "1" ]; then
                python scripts/validation/validate_metacog_compliance.py --story-id "${story_id}" --strict --require-artifacts
              else
                python scripts/validation/validate_metacog_compliance.py --story-id "${story_id}" --strict
              fi
            done
          else
            echo "insight-governance: no changed iterlog files; skipping strict check"
            echo "metacog-governance: no changed iterlog files; skipping strict check"
          fi
          python scripts/validate_pr_title.py || echo "WARN: PR title validation issue (non-blocking)"
          python scripts/validate_traceability_drift.py --verbose || echo "WARN: traceability drift issues (non-blocking)"
          python scripts/ci/validate_bootstrap_compliance.py --check --allowlist scripts/ci/bootstrap_allowlist.txt || echo "WARN: bootstrap compliance issues"
        ) > "$${CI_STATUS_DIR}/lint.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/lint.log"
        echo "$code" > "$${CI_STATUS_DIR}/lint.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step is the SINGLE authoritative failure point that reads
        # lint.status and fails the pipeline if non-zero. This design ensures
        # all validation feedback is collected before failing.
        exit 0

  security-scan:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir bandit
          CHANGED_SCAN="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$CHANGED_SCAN" | tr -d '[:space:]')" ]; then
            echo "security-scan: scanning changed files only: ${CHANGED_SCAN}"
            # Keep PR checks actionable by scanning changed executable code only.
            bandit --ini .bandit -q ${CHANGED_SCAN} -ll || echo "WARN: bandit findings (non-blocking)"
          else
            echo "security-scan: no changed src/scripts python files; skipping"
          fi
        ) > "$${CI_STATUS_DIR}/security-scan.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/security-scan.log"
        echo "$code" > "$${CI_STATUS_DIR}/security-scan.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step reads security-scan.status and fails if non-zero.
        exit 0

  dependency-audit:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pip-audit tomli || pip install --no-cache-dir --break-system-packages pip-audit tomli
          python3 scripts/ci/dependency_audit.py
        ) > "$${CI_STATUS_DIR}/dependency-audit.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/dependency-audit.log"
        echo "$code" > "$${CI_STATUS_DIR}/dependency-audit.status"
        exit 0

  secret-scan:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/secret_scan_changed.py
        ) > "$${CI_STATUS_DIR}/secret-scan.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/secret-scan.log"
        echo "$code" > "$${CI_STATUS_DIR}/secret-scan.status"
        exit 0

  risk-invariants:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if ! echo "$CHANGED_FILES" | grep -qE "^(src/execution/|src/ml/|scripts/reconciliation/|tests/test_execution/|tests/test_ml/|scripts/ci/|pyproject.toml|requirements)"; then
            echo "risk-invariants: no risk-domain changes; skipping"
            exit 0
          fi
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy pyyaml click joblib pydantic
          python3 -m pytest -q \
            tests/test_execution/test_venue_enforcement.py \
            tests/test_execution/test_kill_switch/ \
            tests/test_execution/test_reconciliation.py \
            tests/test_execution/test_outcome_persistence.py \
            tests/test_execution/test_paper/test_paper_risk_enforcer.py
        ) > "$${CI_STATUS_DIR}/risk-invariants.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/risk-invariants.log"
        echo "$code" > "$${CI_STATUS_DIR}/risk-invariants.status"
        exit 0

  brain-regression:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if ! echo "$CHANGED_FILES" | grep -qE "^(src/brain/|src/evaluation/|src/neuro_symbolic/|src/governance/tempmemory/|scripts/evaluation/|scripts/ci/brain_eval_ci.py)"; then
            echo "brain-regression: no brain/evaluation changes; skipping"
            exit 0
          fi

          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml requests numpy scipy
          python3 -m pytest -q \
            tests/test_brain/ \
            tests/test_evaluation/ \
            tests/test_ci/test_brain_evaluation.py \
            tests/test_mini_brain_eval.py \
            tests/test_mini_brain_eval_structured.py

          python3 scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-regression.json"
        ) > "$${CI_STATUS_DIR}/brain-regression.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-regression.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-regression.status"
        exit 0

  docs-pairing:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/validate_docs_pairing.py
        ) > "$${CI_STATUS_DIR}/docs-pairing.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/docs-pairing.log"
        echo "$code" > "$${CI_STATUS_DIR}/docs-pairing.status"
        exit 0

  docker-governance:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          python3 scripts/ci/validate_docker_governance.py
        ) > "$${CI_STATUS_DIR}/docker-governance.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/docker-governance.log"
        echo "$code" > "$${CI_STATUS_DIR}/docker-governance.status"
        exit 0

  local-ci:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          # Increase file descriptor and process limits for testing
          ulimit -n 16384 || echo "Warning: could not increase file descriptor limit"
          ulimit -u 2048 || echo "Warning: could not increase process limit"
          echo "File descriptor limit: $(ulimit -n)"
          echo "Process limit: $(ulimit -u)"
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-}}}"
          BRANCH="$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}"
          REF="$${CI_COMMIT_REF:-}"
          FULL_MODE=0
          if [ "$${CI_FORCE_FULL:-0}" = "1" ]; then
            FULL_MODE=1
          elif printf '%s' "$${REF}" | grep -q '^refs/pull/'; then
            FULL_MODE=0
            echo "local-ci: pull_request ref detected ($${REF}); skipping heavy local-ci checks"
            exit 0
          elif [ "$${EVENT}" = "cron" ] && [ "$${BRANCH}" = "main" ]; then
            FULL_MODE=1
          fi

          if [ "$${FULL_MODE}" = "0" ]; then
            if python scripts/ci/ci_change_scope.py --mode docs-only; then
              echo "local-ci: docs/opencode-only change detected; skipping heavy local-ci checks"
              exit 0
            fi
          else
            echo "local-ci: full-suite mode enabled (event=$${EVENT}, branch=$${BRANCH}, ref=$${REF}, CI_FORCE_FULL=$${CI_FORCE_FULL:-0})"
          fi

          # Install system dependencies required by tests
          apt-get update && apt-get install -y jq ripgrep
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pytest-forked pyyaml requests
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi httpx
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi
          pip install --no-cache-dir sqlalchemy>=2.0.0
          if [ -x scripts/local-ci-checks.sh ]; then
            # Set environment to indicate we're in CI with file descriptor constraints
            export CI_FD_CONSTRAINTS=1
            if [ "$${FULL_MODE}" = "1" ]; then
              ./scripts/local-ci-checks.sh
            else
              ./scripts/local-ci-checks.sh --merged-only
            fi
          else
            echo "scripts/local-ci-checks.sh not found; failing"
            exit 1
          fi
        ) > "$${CI_STATUS_DIR}/local-ci-full.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/local-ci-full.log"
        echo "$code" > "$${CI_STATUS_DIR}/local-ci.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step reads local-ci.status and fails if non-zero.
        # Note: local-ci is in FULL_REQUIRED list, so it only blocks on main/cron
        # or when FORCE_FULL_GATE=1. PR builds skip this gate by default.
        exit 0

  changed-lines-coverage:
    image: python:3.11
    depends_on:
      - local-ci
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir coverage
          if ! python3 -m coverage json -o "$${CI_STATUS_DIR}/coverage.json"; then
            echo "changed-lines-coverage: no coverage data available; skipping"
            exit 0
          fi
          python3 scripts/ci/coverage_changed_lines.py --coverage-json "$${CI_STATUS_DIR}/coverage.json" --threshold 80
        ) > "$${CI_STATUS_DIR}/changed-lines-coverage.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/changed-lines-coverage.log"
        echo "$code" > "$${CI_STATUS_DIR}/changed-lines-coverage.status"
        exit 0

  pipeline-watchdog:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir requests
          python scripts/ci/check_woodpecker_stuck_pipelines.py --max-running-seconds 1800
        ) > "$${CI_STATUS_DIR}/pipeline-watchdog.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/pipeline-watchdog.log"
        echo "$code" > "$${CI_STATUS_DIR}/pipeline-watchdog.status"
        # Non-blocking signal; ci-gate remains the only fail point.
        exit 0

  brain-eval:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python -V
          # Check if brain files changed
          if git diff --name-only origin/main HEAD | grep -qE "(src/brain/|src/neuro_symbolic/|src/strategy/)"; then
            echo "Brain changes detected, running evaluation..."
            pip install --no-cache-dir pyyaml requests numpy scipy
            pip install -e . > /dev/null 2>&1 || pip install -e . --break-system-packages > /dev/null 2>&1 || true
            python scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-eval.json"
          else
            echo "No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > "$${CI_STATUS_DIR}/brain-eval.json"
          fi
        ) > "$${CI_STATUS_DIR}/brain-eval.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-eval.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-eval.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  tempmemory-scheduler:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run tempmemory migration
          python3 scripts/ops/tempmemory_migration.py --dry-run
        ) > "$${CI_STATUS_DIR}/tempmemory-scheduler.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/tempmemory-scheduler.log"
        echo "$code" > "$${CI_STATUS_DIR}/tempmemory-scheduler.status"
        exit 0

  mini-brain-eval:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run mini BrainEval with all sources
          python3 scripts/evaluation/mini_brain_eval.py --cadence daily --use-all --provenance --output-dir "$${CI_STATUS_DIR}/mini-brain-eval"
        ) > "$${CI_STATUS_DIR}/mini-brain-eval.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/mini-brain-eval.log"
        echo "$code" > "$${CI_STATUS_DIR}/mini-brain-eval.status"
        exit 0

  tempmemory-reconcile:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run reconciliation and archive
          python3 scripts/ops/tempmemory_scheduler.py --once --dry-run
        ) > "$${CI_STATUS_DIR}/tempmemory-reconcile.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/tempmemory-reconcile.log"
        echo "$code" > "$${CI_STATUS_DIR}/tempmemory-reconcile.status"
        exit 0

  tempmemory-drill:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          if [ "${EVENT}" != "cron" ] || [ "${BRANCH}" != "main" ]; then
            echo "tempmemory-drill: not cron/main; skipping"
            exit 0
          fi

          pip install --no-cache-dir pyyaml
          python3 scripts/ops/tempmemory_migration.py --dry-run
          python3 scripts/ops/tempmemory_scheduler.py --once --dry-run
          python3 scripts/reconciliation/trade_reconciliation.py --dry-run --output "$${CI_STATUS_DIR}/tempmemory-drill-reconciliation.json"
        ) > "$${CI_STATUS_DIR}/tempmemory-drill.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/tempmemory-drill.log"
        echo "$code" > "$${CI_STATUS_DIR}/tempmemory-drill.status"
        exit 0

  flaky-detection:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          if [ "${EVENT}" != "cron" ] || [ "${BRANCH}" != "main" ]; then
            echo "flaky-detection: not cron/main; skipping"
            exit 0
          fi

          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml
          TARGETS=\"tests/test_execution/test_venue_enforcement.py tests/test_execution/test_kill_switch/test_executor.py tests/test_execution/test_reconciliation.py tests/test_evaluation/test_mini_brain_eval.py\"

          for i in 1 2 3; do
            echo \"flaky-detection: run ${i}/3\"
            python3 -m pytest -q ${TARGETS}
          done
        ) > "$${CI_STATUS_DIR}/flaky-detection.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/flaky-detection.log"
        echo "$code" > "$${CI_STATUS_DIR}/flaky-detection.status"
        exit 0

  compass-apply:
    image: python:3.11
    environment:
      CI_PR_LABELS: "${CI_COMMIT_PULL_REQUEST_LABELS:-}"
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run compass apply to auto-label PRs based on changed files
          echo "Running compass apply..."
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | python3 scripts/ops/compass_apply.py
          else
            echo "No changed files detected, skipping compass apply"
          fi
        ) > "$${CI_STATUS_DIR}/compass-apply.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/compass-apply.log"
        echo "$code" > "$${CI_STATUS_DIR}/compass-apply.status"
        # Non-blocking: always exit 0 for auto-labeling
        exit 0

  compass-gate:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_PR_LABELS: "${CI_COMMIT_PULL_REQUEST_LABELS:-}"
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir pyyaml
        # Run compass gate to check for sensitive path changes
        echo "Running compass gate check..."
        CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
        if [ -n "$CHANGED_FILES" ]; then
          echo "$CHANGED_FILES" | python3 scripts/ci/compass_gate.py --check
        else
          echo "No changed files detected, skipping compass gate"
        fi

  status-write-gate:
    image: python:3.11
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-}}}"
          BRANCH="$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}"
          REF="$${CI_COMMIT_REF:-}"
          CHANGED_FILES="$(printf '%s' \"$${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' || true)"
          if [ "$${CI_FORCE_FULL:-0}" != "1" ] && printf '%s' "$${REF}" | grep -q '^refs/pull/' && ! printf '%s\n' "$CHANGED_FILES" | grep -qx "docs/bmm-workflow-status.yaml"; then
            echo "status-write-gate: workflow status file unchanged on PR; skipping"
            exit 0
          fi
          echo "Running status write gate check..."
          pip install --no-cache-dir pyyaml || pip install --no-cache-dir --break-system-packages pyyaml
          python3 scripts/governance/status_write_gate.py --file docs/bmm-workflow-status.yaml --no-require-authority
        ) > "$${CI_STATUS_DIR}/status-write-gate.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/status-write-gate.log"
        echo "$code" > "$${CI_STATUS_DIR}/status-write-gate.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  ci-gate:
    image: python:3.11
    depends_on:
      - swarm-context
      - lint
      - security-scan
      - dependency-audit
      - secret-scan
      - risk-invariants
      - brain-regression
      - docs-pairing
      - docker-governance
      - local-ci
      - pipeline-watchdog
      - brain-eval
      - tempmemory-scheduler
      - mini-brain-eval
      - tempmemory-reconcile
      - tempmemory-drill
      - flaky-detection
      - compass-apply
      - compass-gate
      - status-write-gate
      - changed-lines-coverage
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir requests
        python scripts/ci/ci_gate.py
