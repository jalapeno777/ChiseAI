when:
  event:
  - pull_request
  - manual
  - cron
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url
steps:
  swarm-context:
    pull: false
    image: chiseai-ci-tools:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  python scripts/ci/validate_swarm_context.py\n) > \"$${CI_STATUS_DIR}/swarm-context.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/swarm-context.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/swarm-context.status\"\nexit 0\n"
  cross-branch-verify:
    pull: false
    image: chiseai-ci-tools:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  BRANCH=\"$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}\"\n  EVENT=\"$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}\"\n  if [ \"$${EVENT}\" != \"push\" ] || [ \"$${BRANCH}\" != \"main\" ]; then\n    echo \"cross-branch-verify: skipping (event=$${EVENT:-unknown}, branch=$${BRANCH:-unknown})\"\n    exit 0\n  fi\n  echo \"cross-branch-verify: branch=$${BRANCH}, sha=$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA:-unknown}}\"\n  echo \"cross-branch-verify: merge-to-main event detected; verifying commit is on main\"\n  git fetch --quiet --unshallow origin || git fetch --quiet --depth=50000 origin main || true\n  if git branch --contains \"$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA}}\" | grep -qE \"^\\s*main$\"; then\n    echo \"cross-branch-verify: commit is on main\"\n    exit 0\n  else\n    echo \"cross-branch-verify: FAIL - commit is not on main\"\n    git branch --contains \"$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA}}\"\n    exit 1\n  fi\n) > \"$${CI_STATUS_DIR}/cross-branch-verify.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/cross-branch-verify.log\"\n# Advisory-only: always write 0 regardless of check result\necho \"0\" > \"$${CI_STATUS_DIR}/cross-branch-verify.status\"\n# Advisory-only: log result but never block pipeline.\n# The original purpose (catching false merge claims) is now enforced by\n# validate_completion_evidence.py and truth-gate infrastructure.\nexit 0\n"
  lint:
    pull: false
    image: chiseai-ci-lint:py311-20260323
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  python -V\n  # Validate CI_PIPELINE_FILES is a non-empty JSON array with actual files\n  if [ -z \"${CI_PIPELINE_FILES:-}\" ] || [ \"${CI_PIPELINE_FILES:-}\" = \"[]\" ] || [ \"${CI_PIPELINE_FILES:-}\" = \"null\" ]; then\n    echo \"lint: no changed files detected; skipping lint checks\"\n    echo \"0\" > \"$${CI_STATUS_DIR}/lint.status\"\n    exit 0\n  fi\n  CHANGED_PY=\"$(python -c 'import json, os; raw=os.environ.get(\"CI_PIPELINE_FILES\",\"[]\"); payload=json.loads(raw) if raw else []; files=[str(item).strip() for item in payload if isinstance(payload, list) and str(item).strip().endswith(\".py\")]; print(\" \".join(files))' 2>/dev/null || true)\"\n  if [ -n \"$(printf '%s' \"$CHANGED_PY\" | tr -d '[:space:]')\" ]; then\n    echo \"lint: checking changed python files only: ${CHANGED_PY}\"\n    printf '%s\\n' \"$CHANGED_PY\" | tr -s '[:space:]' '\\n' | grep -v '^$' | xargs black --check\n    printf '%s\\n' \"$CHANGED_PY\" | tr -s '[:space:]' '\\n' | grep -v '^$' | xargs ruff check\n  else\n    echo \"lint: no changed python files; skipping black/ruff file checks\"\n  fi\n  MYPY_CHANGED=\"$(printf '%s' \"$CHANGED_PY\" | tr ' ' '\\n' | grep -E '^(src/|scripts/).+\\\\.py$' | tr '\\n' ' ' || true)\"\n  if [ -n \"$(printf '%s' \"$MYPY_CHANGED\" | tr -d '[:space:]')\" ]; then\n    echo \"mypy: checking changed src/scripts files: ${MYPY_CHANGED}\"\n    printf '%s\\n' \"$MYPY_CHANGED\" | tr -s '[:space:]' '\\n' | grep -v '^$' | xargs mypy || echo \"WARN: mypy violations (non-blocking)\"\n  else\n    echo \"mypy: no changed src/scripts files; checking baseline src package\"\n    mypy src || echo \"WARN: mypy violations (non-blocking)\"\n  fi\n  python scripts/validate_status_sync.py || echo \"WARN: status sync issues (non-blocking)\"\n  python scripts/validate_fr_traceability.py || echo \"WARN: FR traceability issues (non-blocking)\"\n  # Iterloop compliance remains optional by default to avoid blocking\n  # non-story infra/docs runs. Set CI_SKIP_ITERLOOP_COMPLIANCE=0 to enforce.\n  if [ \"${CI_SKIP_ITERLOOP_COMPLIANCE:-1}\" = \"1\" ]; then\n    echo \"lint: skipping iterloop compliance (CI_SKIP_ITERLOOP_COMPLIANCE=1)\"\n  else\n    python scripts/validate_iterloop_compliance.py || echo \"WARN: iterloop compliance issues (non-blocking)\"\n  fi\n  CHANGED_ITERLOGS=\"$(printf '%s' \\\"${CI_PIPELINE_FILES:-[]}\\\" | tr -d '[]\\\"' | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | grep -E '^docs/tempmemories/iterlog-.*\\\\.md$' || true)\"\n  if [ -n \"$(printf '%s' \"$CHANGED_ITERLOGS\" | tr -d '[:space:]')\" ]; then\n    echo \"insight-governance: validating changed iterlogs (blocking)\"\n    printf '%s\\n' \"$CHANGED_ITERLOGS\" | while IFS= read -r iterlog_path; do\n      [ -z \"$iterlog_path\" ] && continue\n      story_id=\"$(basename \"$iterlog_path\" .md | sed 's/^iterlog-//')\"\n      iterlog_priority=\"$(sed -n 's/^priority:[[:space:]]*//p' \"$iterlog_path\" | head -n1 | tr -d \"\\\"'\" | tr '[:lower:]' '[:upper:]')\"\n      iterlog_status=\"$(sed -n 's/^status:[[:space:]]*//p' \"$iterlog_path\" | head -n1 | tr -d \"\\\"'\" | tr '[:upper:]' '[:lower:]')\"\n      TP_SESSION_MODE=\"${CI_TP_SESSION_ARTIFACT_MODE:-warn}\"\n      if [ \"${CI_TP_SESSION_STRICT_P0P1_COMPLETED:-1}\" = \"1\" ]; then\n        if [ \"$iterlog_priority\" = \"P0\" ] || [ \"$iterlog_priority\" = \"P1\" ]; then\n          if [ \"$iterlog_status\" = \"completed\" ] || [ \"$iterlog_status\" = \"complete\" ] || [ \"$iterlog_status\" = \"done\" ]; then\n            TP_SESSION_MODE=\"strict\"\n          fi\n        fi\n      fi\n      echo \" - validating story_id=${story_id} from ${iterlog_path}\"\n      echo \"   tp_session_artifact_mode=${TP_SESSION_MODE} (priority=${iterlog_priority:-unknown}, status=${iterlog_status:-unknown})\"\n      TP_SESSION_ARGS=\"\"\n      if [ \"${CI_TP_SESSION_SELF_HEAL:-1}\" = \"1\" ]; then\n        TP_SESSION_ARGS=\"--tp-session-self-heal\"\n      fi\n      python scripts/validation/validate_insight_governance.py \\\n        --story-id \"${story_id}\" \\\n        --strict \\\n        --tp-session-artifact-mode \"${TP_SESSION_MODE}\" \\\n        ${TP_SESSION_ARGS}\n    done\n    echo \"metacog-governance: validating changed iterlogs (blocking)\"\n    printf '%s\\n' \"$CHANGED_ITERLOGS\" | while IFS= read -r iterlog_path; do\n      [ -z \"$iterlog_path\" ] && continue\n      story_id=\"$(basename \"$iterlog_path\" .md | sed 's/^iterlog-//')\"\n      echo \" - validating story_id=${story_id} from ${iterlog_path}\"\n      if [ \"${CI_REQUIRE_REDIS_METACOG_ARTIFACTS:-0}\" = \"1\" ]; then\n        python scripts/validation/validate_metacog_compliance.py --story-id \"${story_id}\" --strict --require-artifacts\n      else\n        python scripts/validation/validate_metacog_compliance.py --story-id \"${story_id}\" --strict\n      fi\n    done\n  else\n    echo \"insight-governance: no changed iterlog files; skipping strict check\"\n    echo \"metacog-governance: no changed iterlog files; skipping strict check\"\n  fi\n  python scripts/validate_pr_title.py || echo \"WARN: PR title validation issue (non-blocking)\"\n  python scripts/validate_traceability_drift.py --verbose || echo \"WARN: traceability drift issues (non-blocking)\"\n  python scripts/ci/validate_bootstrap_compliance.py --check --allowlist scripts/ci/bootstrap_allowlist.txt || echo \"WARN: bootstrap compliance issues\"\n) > \"$${CI_STATUS_DIR}/lint.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/lint.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/lint.status\"\n# RATIONALE: Exit 0 ensures pipeline continues to ci-gate.\n# The ci-gate step is the SINGLE authoritative failure point that reads\n# lint.status and fails the pipeline if non-zero. This design ensures\n# all validation feedback is collected before failing.\nexit 0\n"
  security-scan:
    pull: false
    image: chiseai-ci-tools:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  CHANGED_SCAN=\"$(printf '%s' \\\"${CI_PIPELINE_FILES:-[]}\\\" | tr -d '[]\\\"' | tr ',' '\\n' | sed 's/^ *//;s/ *$//' | grep -E '^(src/|scripts/).+\\\\.py$' | tr '\\n' ' ' || true)\"\n  if [ -n \"$(printf '%s' \"$CHANGED_SCAN\" | tr -d '[:space:]')\" ]; then\n    echo \"security-scan: scanning changed files only: ${CHANGED_SCAN}\"\n    # Keep PR checks actionable by scanning changed executable code only.\n    printf '%s\\n' \"$CHANGED_SCAN\" | tr -s '[:space:]' '\\n' | grep -v '^$' | xargs bandit -c pyproject.toml -q -ll || echo \"WARN: bandit findings (non-blocking)\"\n  else\n    echo \"security-scan: no changed src/scripts python files; skipping\"\n  fi\n) > \"$${CI_STATUS_DIR}/security-scan.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/security-scan.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/security-scan.status\"\n# RATIONALE: Exit 0 ensures pipeline continues to ci-gate.\n# The ci-gate step reads security-scan.status and fails if non-zero.\nexit 0\n"
  dependency-audit:
    pull: false
    image: chiseai-ci-dependency-audit:py311-20260324
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  python3 scripts/ci/dependency_audit.py\n) > \"$${CI_STATUS_DIR}/dependency-audit.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/dependency-audit.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/dependency-audit.status\"\nexit 0\n"
  secret-scan:
    pull: false
    image: chiseai-ci-tools:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  python3 scripts/ci/secret_scan_changed.py\n) > \"$${CI_STATUS_DIR}/secret-scan.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/secret-scan.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/secret-scan.status\"\nexit 0\n"
  risk-invariants:
    pull: false
    image: chiseai-ci-risk-invariants:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  CHANGED_FILES=\"$(git diff --name-only origin/main HEAD || true)\"\n  if ! echo \"$CHANGED_FILES\" | grep -qE \"^(src/execution/|src/ml/|scripts/reconciliation/|tests/test_execution/|tests/test_ml/|scripts/ci/|pyproject.toml|requirements)\"; then\n    echo \"risk-invariants: no risk-domain changes; skipping\"\n    exit 0\n  fi\n  python3 -m pytest -q \\\n    tests/test_execution/test_venue_enforcement.py \\\n    tests/test_execution/test_kill_switch/ \\\n    tests/test_execution/test_reconciliation.py \\\n    tests/test_execution/test_outcome_persistence.py \\\n    tests/test_execution/test_paper/test_paper_risk_enforcer.py\n) > \"$${CI_STATUS_DIR}/risk-invariants.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/risk-invariants.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/risk-invariants.status\"\nexit 0\n"
  brain-regression:
    pull: false
    image: chiseai-ci-brain-regression:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  CHANGED_FILES=\"$(git diff --name-only origin/main HEAD || true)\"\n  if ! echo \"$CHANGED_FILES\" | grep -qE \"^(src/brain/|src/evaluation/|src/neuro_symbolic/|src/governance/tempmemory/|scripts/evaluation/|scripts/ci/brain_eval_ci.py)\"; then\n    echo \"brain-regression: no brain/evaluation changes; skipping\"\n    exit 0\n  fi\n\n  python3 -m pytest -q \\\n    tests/test_brain/ \\\n    tests/test_evaluation/ \\\n    tests/test_ci/test_brain_evaluation.py \\\n    tests/test_mini_brain_eval.py \\\n    tests/test_mini_brain_eval_structured.py\n\n  python3 scripts/ci/brain_eval_ci.py --output \"$${CI_STATUS_DIR}/brain-regression.json\"\n) > \"$${CI_STATUS_DIR}/brain-regression.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/brain-regression.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/brain-regression.status\"\nexit 0\n"
  docker-governance:
    pull: false
    image: chiseai-ci-tools:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  python3 scripts/ci/validate_docker_governance.py\n) > \"$${CI_STATUS_DIR}/docker-governance.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/docker-governance.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/docker-governance.status\"\nexit 0\n"
  local-ci:
    pull: false
    image: chiseai-ci-local-ci:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      PYTEST_WORKERS: auto
      PYTEST_MAX_WORKERS: '4'
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  EVENT=\"$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}\"\n  # Skip expensive steps on push-to-main (PR is authoritative)\n  if [ \"$${EVENT}\" = \"push\" ] && [ \"$${CI_COMMIT_BRANCH}\" = \"main\" ]; then\n    echo \"local-ci: SKIPPED (push-to-main, PR is authoritative)\"\n    echo \"0\" > \"$${CI_STATUS_DIR}/local-ci.status\"\n    exit 0\n  fi\n  # PHASE 3: Performance monitoring start\n  START_TIME=$(date +%s)\n  echo \"local-ci: Starting at $(date -Iseconds)\"\n\n  # Increase file descriptor and process limits for testing\n  ulimit -n 16384 || echo \"Warning: could not increase file descriptor limit\"\n  ulimit -u 2048 || echo \"Warning: could not increase process limit\"\n  echo \"File descriptor limit: $(ulimit -n)\"\n  echo \"Process limit: $(ulimit -u)\"\n\n  # PHASE 3: Log system resources\n  echo \"local-ci: CPU count: $(nproc)\"\n  echo \"local-ci: Memory: $(free -h | grep Mem | awk '{print $2}')\"\n\n  BRANCH=\"$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}\"\n  REF=\"$${CI_COMMIT_REF:-}\"\n  FULL_MODE=0\n  if [ \"$${CI_FORCE_FULL:-0}\" = \"1\" ]; then\n    FULL_MODE=1\n  elif printf '%s' \"$${REF}\" | grep -q '^refs/pull/'; then\n    FULL_MODE=0\n    echo \"local-ci: pull_request ref detected ($${REF}); running changed-files + critical path tests\"\n    # PR mode: run changed-files + critical path tests instead of full suite\n    CHANGED_FILES=\"$(git diff --name-only origin/main HEAD 2>/dev/null | tr '\\n' ' ')\"\n    if python scripts/ci/critical_paths.py --check $CHANGED_FILES; then\n      echo \"local-ci: critical paths matched; running critical path test subset\"\n      pytest tests/test_execution/ tests/test_ml/ tests/test_venue_enforcement/ tests/test_kill_switch/ tests/test_reconciliation/ tests/test_paper/ -x -q --tb=short\n      exit $?\n    else\n      echo \"local-ci: no critical paths affected; running lightweight sanity check\"\n      python -c \"import sys; print('Python imports OK')\" && exit 0 || exit 1\n    fi\n  elif [ \"$${EVENT}\" = \"cron\" ] && [ \"$${BRANCH}\" = \"main\" ]; then\n    FULL_MODE=1\n  fi\n\n  if [ \"$${FULL_MODE}\" = \"0\" ]; then\n    if python scripts/ci/ci_change_scope.py --mode docs-only; then\n      echo \"local-ci: docs/opencode-only change detected; skipping heavy local-ci checks\"\n      exit 0\n    fi\n  else\n    echo \"local-ci: full-suite mode enabled (event=$${EVENT}, branch=$${BRANCH}, ref=$${REF}, CI_FORCE_FULL=$${CI_FORCE_FULL:-0})\"\n  fi\n\n  # PHASE 3: Calculate optimal workers\n  CPU_COUNT=$(nproc)\n  WORKERS=$((CPU_COUNT > 4 ? 4 : CPU_COUNT))\n  echo \"local-ci: Using $WORKERS parallel workers\"\n\n  if [ -x scripts/local-ci-checks.sh ]; then\n    # Set environment to indicate we're in CI with file descriptor constraints\n    export CI_FD_CONSTRAINTS=1\n    # PHASE 3: Export parallel test settings\n    export PYTEST_WORKERS=$WORKERS\n    if [ \"$${FULL_MODE}\" = \"1\" ]; then\n      ./scripts/local-ci-checks.sh --full --parallel\n    else\n      ./scripts/local-ci-checks.sh --merged-only --parallel\n    fi\n  else\n    echo \"scripts/local-ci-checks.sh not found; failing\"\n    exit 1\n  fi\n\n  # PHASE 3: Performance monitoring end\n  END_TIME=$(date +%s)\n  DURATION=$((END_TIME - START_TIME))\n  echo \"local-ci: Completed in ${DURATION}s\"\n  echo \"{\\\"duration_seconds\\\": $DURATION, \\\"workers\\\": $WORKERS, \\\"timestamp\\\": \\\"$(date -Iseconds)\\\"}\" > \"$${CI_STATUS_DIR}/local-ci-performance.json\"\n\n  # PHASE 3: Fail if duration exceeds threshold (5 minutes = 300s)\n  if [ $DURATION -gt 300 ]; then\n    echo \"local-ci: WARNING - Duration ${DURATION}s exceeds threshold (300s)\"\n    # Non-blocking warning; ci-gate can enforce if needed\n  fi\n) > \"$${CI_STATUS_DIR}/local-ci-full.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/local-ci-full.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/local-ci.status\"\n# RATIONALE: Exit 0 ensures pipeline continues to ci-gate.\n# The ci-gate step reads local-ci.status and fails if non-zero.\n# Note: local-ci is in FULL_REQUIRED list, so it only blocks on main/cron\n# or when FORCE_FULL_GATE=1. PR builds skip this gate by default.\nexit 0\n"
  brain-eval:
    pull: false
    image: chiseai-ci-brain-eval:py311-20260323
    depends_on:
    - evaluation-pre-eval-group
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      CI_TEMPMEMORY_INGESTION_ENABLED: ${CI_TEMPMEMORY_INGESTION_ENABLED:-auto}
    commands:
    - "set -euo pipefail\nmkdir -p \"$${CI_STATUS_DIR}\"\nset +e\n(\n  set -euo pipefail\n  EVENT=\"$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}\"\n  # Skip expensive brain-eval on push-to-main (PR is authoritative)\n  if [ \"$${EVENT}\" = \"push\" ] && [ \"$${CI_COMMIT_BRANCH}\" = \"main\" ]; then\n    echo \"brain-eval: SKIPPED (push-to-main, PR is authoritative)\"\n    echo '{\"success\": true, \"skipped\": true, \"reason\": \"push-to-main\"}' > \"$${CI_STATUS_DIR}/brain-eval.json\"\n    echo \"0\" > \"$${CI_STATUS_DIR}/brain-eval.status\"\n    exit 0\n  fi\n  python -V\n  # Determine feature flag value (same logic as pre-eval-ingestion)\n  if [ \"$${CI_TEMPMEMORY_INGESTION_ENABLED}\" = \"auto\" ]; then\n    if [ \"$${CI_COMMIT_BRANCH}\" != \"main\" ] && [ \"$${CI_COMMIT_BRANCH}\" != \"$${CI_REPO_DEFAULT_BRANCH:-main}\" ]; then\n      CI_TEMPMEMORY_INGESTION_ENABLED=\"true\"\n    else\n      CI_TEMPMEMORY_INGESTION_ENABLED=\"false\"\n    fi\n  fi\n  # Check ingestion results if enabled\n  if [ \"$${CI_TEMPMEMORY_INGESTION_ENABLED}\" = \"true\" ] && [ -f \"$${CI_STATUS_DIR}/pre-eval-ingestion.json\" ]; then\n    echo \"Checking pre-eval ingestion results...\"\n    INGESTION_SUCCESS=$(python3 -c \"import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('success', False))\")\n    INGESTION_INGESTED=$(python3 -c \"import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('files_ingested', 0))\")\n    echo \"Ingestion success: $${INGESTION_SUCCESS}, Files ingested: $${INGESTION_INGESTED}\"\n  fi\n  # Check if brain files changed\n  CHANGED_BRAIN_FILES=\"$(python3 scripts/ci/ci_change_scope.py --base-ref origin/main --mode changed-python | grep -E '^(src/brain/|src/neuro_symbolic/|src/strategy/)' || true)\"\n  if [ -n \"$(printf '%s' \"$${CHANGED_BRAIN_FILES}\" | tr -d '[:space:]')\" ]; then\n    echo \"Brain changes detected, running evaluation...\"\n    # D-03: Ensure pip install failures are detected\n    set -e\n    pip install -e . || pip install -e . --break-system-packages\n    # D-03: Verify pip install actually worked - detect silent failures\n    python -c \"import chiseai\" || { echo \"FATAL: pip install failed silently - package not importable\"; exit 1; }\n    python scripts/ci/brain_eval_ci.py --output \"$${CI_STATUS_DIR}/brain-eval.json\"\n  else\n    echo \"No brain changes detected, skipping evaluation\"\n    echo '{\"success\": true, \"skipped\": true, \"reason\": \"No brain changes detected\"}' > \"$${CI_STATUS_DIR}/brain-eval.json\"\n  fi\n) > \"$${CI_STATUS_DIR}/brain-eval.log\" 2>&1\ncode=$?\ncat \"$${CI_STATUS_DIR}/brain-eval.log\"\necho \"$code\" > \"$${CI_STATUS_DIR}/brain-eval.status\"\n# Do not short-circuit the pipeline; ci-gate is the single fail point.\nexit 0\n"
  performance-gate:
    pull: false
    image: chiseai-ci-performance-gate:py311-20260323
    depends_on:
    - local-ci
    - changed-lines-coverage
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      MAX_TEST_DURATION: '300'
      MAX_MEMORY_MB: '2048'
    commands:
