when:
  event:
    - pull_request
    - manual
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url
steps:
  swarm-context:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/validate_swarm_context.py
        ) > "$${CI_STATUS_DIR}/swarm-context.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/swarm-context.log"
        echo "$code" > "$${CI_STATUS_DIR}/swarm-context.status"
        exit 0
  cross-branch-verify:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        {
          set -euo pipefail
          BRANCH="$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}"
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          if [ "$${EVENT}" != "push" ] || [ "$${BRANCH}" != "main" ]; then
            echo "cross-branch-verify: skipping (event=$${EVENT:-unknown}, branch=$${BRANCH:-unknown})"
            exit 0
          fi
          echo "cross-branch-verify: branch=$${BRANCH}, sha=$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA:-unknown}}"
          echo "cross-branch-verify: merge-to-main event detected; verifying commit is on main"
          git fetch --quiet --unshallow origin || git fetch --quiet --depth=50000 origin main || true
          if git branch --contains "$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA}}" | grep -qE "^\s*main$"; then
            echo "cross-branch-verify: commit is on main"
            exit 0
          fi
          echo "cross-branch-verify: FAIL - commit is not on main"
          git branch --contains "$${CI_COMMIT_SHA:-$${WOODPECKER_COMMIT_SHA}}"
          exit 1
        } > "$${CI_STATUS_DIR}/cross-branch-verify.log" 2>&1
        cat "$${CI_STATUS_DIR}/cross-branch-verify.log"
        echo "0" > "$${CI_STATUS_DIR}/cross-branch-verify.status"
        # Advisory-only: log result but never block pipeline.
        # The original purpose (catching false merge claims) is now enforced by
        # validate_completion_evidence.py and truth-gate infrastructure.
        exit 0
  lint:
    pull: false
    image: chiseai-ci-lint:py311-20260329
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 -V
          # Validate CI_PIPELINE_FILES is a non-empty JSON array with actual files
          if [ -z "${CI_PIPELINE_FILES:-}" ] || [ "${CI_PIPELINE_FILES:-}" = "[]" ] || [ "${CI_PIPELINE_FILES:-}" = "null" ]; then
            echo "lint: no changed files detected; skipping lint checks"
            echo "0" > "$${CI_STATUS_DIR}/lint.status"
            exit 0
          fi
          CHANGED_PY="$(python3 -c 'import json, os; raw=os.environ.get("CI_PIPELINE_FILES","[]"); payload=json.loads(raw) if raw else []; files=[str(item).strip() for item in payload if isinstance(payload, list) and str(item).strip().endswith(".py") and os.path.isfile(str(item).strip())]; print(" ".join(files))' 2>/dev/null || true)"
          if [ -n "$(printf '%s' "$CHANGED_PY" | tr -d '[:space:]')" ]; then
            echo "lint: checking changed python files only: ${CHANGED_PY}"
            printf '%s\n' "$CHANGED_PY" | tr -s '[:space:]' '\n' | grep -v '^$' | xargs black --check
            printf '%s\n' "$CHANGED_PY" | tr -s '[:space:]' '\n' | grep -v '^$' | xargs ruff check
          else
            echo "lint: no changed python files; skipping black/ruff file checks"
          fi
          MYPY_CHANGED="$(printf '%s' "$CHANGED_PY" | tr ' ' '\n' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$MYPY_CHANGED" | tr -d '[:space:]')" ]; then
            echo "mypy: checking changed src/scripts files: ${MYPY_CHANGED}"
            printf '%s\n' "$MYPY_CHANGED" | tr -s '[:space:]' '\n' | grep -v '^$' | xargs mypy || echo "WARN: mypy violations (non-blocking)"
          else
            echo "mypy: no changed src/scripts files; checking baseline src package"
            mypy src || echo "WARN: mypy violations (non-blocking)"
          fi
          python3 scripts/validate_status_sync.py || echo "WARN: status sync issues (non-blocking)"
          python3 scripts/validate_fr_traceability.py || echo "WARN: FR traceability issues (non-blocking)"
          # Iterloop compliance remains optional by default to avoid blocking
          # non-story infra/docs runs. Set CI_SKIP_ITERLOOP_COMPLIANCE=0 to enforce.
          if [ "${CI_SKIP_ITERLOOP_COMPLIANCE:-1}" = "1" ]; then
            echo "lint: skipping iterloop compliance (CI_SKIP_ITERLOOP_COMPLIANCE=1)"
          else
            python3 scripts/validate_iterloop_compliance.py || echo "WARN: iterloop compliance issues (non-blocking)"
          fi
          CHANGED_ITERLOGS="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '^docs/tempmemories/iterlog-.*\\.md$' || true)"
          if [ -n "$(printf '%s' "$CHANGED_ITERLOGS" | tr -d '[:space:]')" ]; then
            echo "insight-governance: validating changed iterlogs (blocking)"
            printf '%s\n' "$CHANGED_ITERLOGS" | while IFS= read -r iterlog_path; do
              [ -z "$iterlog_path" ] && continue
              story_id="$(basename "$iterlog_path" .md | sed 's/^iterlog-//')"
              iterlog_priority="$(sed -n 's/^priority:[[:space:]]*//p' "$iterlog_path" | head -n1 | tr -d "\"'" | tr '[:lower:]' '[:upper:]')"
              iterlog_status="$(sed -n 's/^status:[[:space:]]*//p' "$iterlog_path" | head -n1 | tr -d "\"'" | tr '[:upper:]' '[:lower:]')"
              TP_SESSION_MODE="${CI_TP_SESSION_ARTIFACT_MODE:-warn}"
              if [ "${CI_TP_SESSION_STRICT_P0P1_COMPLETED:-1}" = "1" ]; then
                if [ "$iterlog_priority" = "P0" ] || [ "$iterlog_priority" = "P1" ]; then
                  if [ "$iterlog_status" = "completed" ] || [ "$iterlog_status" = "complete" ] || [ "$iterlog_status" = "done" ]; then
                    TP_SESSION_MODE="strict"
                  fi
                fi
              fi
              echo " - validating story_id=${story_id} from ${iterlog_path}"
              echo "   tp_session_artifact_mode=${TP_SESSION_MODE} (priority=${iterlog_priority:-unknown}, status=${iterlog_status:-unknown})"
              TP_SESSION_ARGS=""
              if [ "${CI_TP_SESSION_SELF_HEAL:-1}" = "1" ]; then
                TP_SESSION_ARGS="--tp-session-self-heal"
              fi
              python3 scripts/validation/validate_insight_governance.py \
                --story-id "${story_id}" \
                --strict \
                --tp-session-artifact-mode "${TP_SESSION_MODE}" \
                ${TP_SESSION_ARGS}
            done
            echo "metacog-governance: validating changed iterlogs (blocking)"
            printf '%s\n' "$CHANGED_ITERLOGS" | while IFS= read -r iterlog_path; do
              [ -z "$iterlog_path" ] && continue
              story_id="$(basename "$iterlog_path" .md | sed 's/^iterlog-//')"
              echo " - validating story_id=${story_id} from ${iterlog_path}"
              if [ "${CI_REQUIRE_REDIS_METACOG_ARTIFACTS:-0}" = "1" ]; then
                python3 scripts/validation/validate_metacog_compliance.py --story-id "${story_id}" --strict --require-artifacts
              else
                python3 scripts/validation/validate_metacog_compliance.py --story-id "${story_id}" --strict
              fi
            done
          else
            echo "insight-governance: no changed iterlog files; skipping strict check"
            echo "metacog-governance: no changed iterlog files; skipping strict check"
          fi
          python3 scripts/validate_pr_title.py || echo "WARN: PR title validation issue (non-blocking)"
          python3 scripts/validate_traceability_drift.py --verbose || echo "WARN: traceability drift issues (non-blocking)"
          python3 scripts/ci/validate_bootstrap_compliance.py --check --allowlist scripts/ci/bootstrap_allowlist.txt || echo "WARN: bootstrap compliance issues"
        ) > "$${CI_STATUS_DIR}/lint.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/lint.log"
        echo "$code" > "$${CI_STATUS_DIR}/lint.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step is the SINGLE authoritative failure point that reads
        # lint.status and fails the pipeline if non-zero. This design ensures
        # all validation feedback is collected before failing.
        exit 0
  test-skip-audit:
    pull: false
    image: chiseai-ci-dependency-audit:py311-20260324
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - python3 scripts/ci/count_test_skips.py
  security-scan:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          CHANGED_SCAN="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$CHANGED_SCAN" | tr -d '[:space:]')" ]; then
            echo "security-scan: scanning changed files only: ${CHANGED_SCAN}"
            # Keep PR checks actionable by scanning changed executable code only.
            printf '%s\n' "$CHANGED_SCAN" | tr -s '[:space:]' '\n' | grep -v '^$' | xargs bandit -c pyproject.toml -q -ll || echo "WARN: bandit findings (non-blocking)"
          else
            echo "security-scan: no changed src/scripts python files; skipping"
          fi
        ) > "$${CI_STATUS_DIR}/security-scan.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/security-scan.log"
        echo "$code" > "$${CI_STATUS_DIR}/security-scan.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step reads security-scan.status and fails if non-zero.
        exit 0
  dependency-audit:
    pull: false
    image: chiseai-ci-dependency-audit:py311-20260324
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/dependency_audit.py
        ) > "$${CI_STATUS_DIR}/dependency-audit.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/dependency-audit.log"
        echo "$code" > "$${CI_STATUS_DIR}/dependency-audit.status"
        exit 0
  secret-scan:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/secret_scan_changed.py
        ) > "$${CI_STATUS_DIR}/secret-scan.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/secret-scan.log"
        echo "$code" > "$${CI_STATUS_DIR}/secret-scan.status"
        exit 0
  risk-invariants:
    pull: false
    image: chiseai-ci-risk-invariants:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        code=0
        status_file="$${CI_STATUS_DIR}/risk-invariants.status"
        trap 'echo "$${code}" > "$${status_file}"' EXIT
        set +e
        {
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if ! echo "$CHANGED_FILES" | grep -qE "^(src/execution/|src/ml/|scripts/reconciliation/|tests/test_execution/|tests/test_ml/|scripts/ci/|pyproject.toml|requirements)"; then
            echo "risk-invariants: no risk-domain changes; skipping"
            code=0
            exit 0
          fi
          if python3 -m pytest -q \
            tests/test_execution/test_venue_enforcement.py \
            tests/test_execution/test_kill_switch/ \
            tests/test_execution/test_reconciliation.py \
            tests/test_execution/test_outcome_persistence.py \
            tests/test_execution/test_paper/test_paper_risk_enforcer.py; then
            code=0
          else
            code=$?
          fi
        } > "$${CI_STATUS_DIR}/risk-invariants.log" 2>&1
        cat "$${CI_STATUS_DIR}/risk-invariants.log"
        exit 0
  brain-regression:
    pull: false
    image: chiseai-ci-brain-regression:py311-20260323
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if ! echo "$CHANGED_FILES" | grep -qE "^(src/brain/|src/evaluation/|src/neuro_symbolic/|src/governance/tempmemory/|scripts/evaluation/|scripts/ci/brain_eval_ci.py)"; then
            echo "brain-regression: no brain/evaluation changes; skipping"
            exit 0
          fi

          python3 -m pytest -q \
            tests/test_brain/ \
            tests/test_evaluation/ \
            tests/test_ci/test_brain_evaluation.py \
            tests/test_mini_brain_eval.py \
            tests/test_mini_brain_eval_structured.py

          python3 scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-regression.json"
        ) > "$${CI_STATUS_DIR}/brain-regression.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-regression.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-regression.status"
        exit 0
  docker-governance:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/validate_docker_governance.py
        ) > "$${CI_STATUS_DIR}/docker-governance.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/docker-governance.log"
        echo "$code" > "$${CI_STATUS_DIR}/docker-governance.status"
        exit 0
  e2e-tests:
    pull: false
    image: chiseai-ci-local-ci:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          # Skip on push-to-main (PR is authoritative)
          if [ "$${EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
            echo "e2e-tests: SKIPPED (push-to-main, PR is authoritative)"
            echo "0" > "$${CI_STATUS_DIR}/e2e-tests.status"
            exit 0
          fi
          echo "e2e-tests: Running E2E tests for paper trading pipeline"
          python3 -m pytest -m e2e tests/e2e/ -v --tb=short
        ) > "$${CI_STATUS_DIR}/e2e-tests.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/e2e-tests.log"
        echo "$code" > "$${CI_STATUS_DIR}/e2e-tests.status"
        exit 0
  integration-tests:
    pull: false
    image: chiseai-ci-local-ci:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          # Skip on push-to-main (PR is authoritative)
          if [ "$${EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
            echo "integration-tests: SKIPPED (push-to-main, PR is authoritative)"
            echo "0" > "$${CI_STATUS_DIR}/integration-tests.status"
            exit 0
          fi
          echo "integration-tests: Installing fakeredis for integration tests"
          pip install fakeredis || pip install fakeredis --break-system-packages
          echo "integration-tests: Running integration tests for consumer recovery"
          python3 -m pytest -m integration tests/integration/ -v --tb=short
        ) > "$${CI_STATUS_DIR}/integration-tests.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/integration-tests.log"
        echo "$code" > "$${CI_STATUS_DIR}/integration-tests.status"
        exit 0
  local-ci:
    pull: false
    image: chiseai-ci-local-ci:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      PYTEST_WORKERS: auto
      PYTEST_MAX_WORKERS: "4"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          # Skip expensive steps on push-to-main (PR is authoritative)
          if [ "$${EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
            echo "local-ci: SKIPPED (push-to-main, PR is authoritative)"
            echo "0" > "$${CI_STATUS_DIR}/local-ci.status"
            exit 0
          fi
          # Skip on cron events — autocog-scheduler validates its own pipeline;
          # full local-ci suite is redundant and triggers Docker socket timeout
          if [ "$${EVENT}" = "cron" ]; then
            echo "local-ci: SKIPPED (cron event, autocog-scheduler handles its own validation)"
            echo "0" > "$${CI_STATUS_DIR}/local-ci.status"
            exit 0
          fi
          # PHASE 3: Performance monitoring start
          START_TIME=$(date +%s)
          echo "local-ci: Starting at $(date -Iseconds)"

          # Increase file descriptor and process limits for testing
          ulimit -n 16384 || echo "Warning: could not increase file descriptor limit"
          if ulimit -u 2048 2>/dev/null; then
            PROCESS_LIMIT="$(ulimit -u)"
          else
            echo "Warning: could not increase process limit"
            PROCESS_LIMIT="unsupported"
          fi
          echo "File descriptor limit: $(ulimit -n)"
          echo "Process limit: ${PROCESS_LIMIT}"

          # PHASE 3: Log system resources
          echo "local-ci: CPU count: $(nproc)"
          if command -v free >/dev/null 2>&1; then
            MEMORY_TOTAL="$(free -h | grep Mem | awk '{print $2}')"
          elif [ -r /proc/meminfo ]; then
            MEMORY_TOTAL="$(python3 -c "from pathlib import Path; line=next((ln for ln in Path('/proc/meminfo').read_text(encoding='utf-8').splitlines() if ln.startswith('MemTotal:')), ''); print(f'{int(line.split()[1]) / 1024 / 1024:.1f}Gi' if line else 'unknown')")"
          else
            MEMORY_TOTAL="unknown"
          fi
          echo "local-ci: Memory: ${MEMORY_TOTAL}"

          BRANCH="$${CI_COMMIT_BRANCH:-$${WOODPECKER_COMMIT_BRANCH:-}}"
          REF="$${CI_COMMIT_REF:-}"
          FULL_MODE=0
          if [ "$${CI_FORCE_FULL:-0}" = "1" ]; then
            FULL_MODE=1
          elif printf '%s' "$${REF}" | grep -q '^refs/pull/'; then
            FULL_MODE=0
            echo "local-ci: pull_request ref detected ($${REF}); running changed-files + critical path tests"
            # PR mode: run changed-files + critical path tests instead of full suite
            CHANGED_FILES="$(git diff --name-only origin/main HEAD 2>/dev/null | tr '\n' ' ')"
            if python3 scripts/ci/critical_paths.py --check $CHANGED_FILES; then
              echo "local-ci: no critical paths affected; running lightweight sanity check"
              python3 -c "import sys; print('Python imports OK')" && exit 0 || exit 1
            else
              echo "local-ci: critical paths matched; running critical path test subset"
              pytest tests/test_execution/ tests/test_ml/ tests/test_venue_enforcement/ tests/test_kill_switch/ tests/test_reconciliation/ tests/test_paper/ -x -q --tb=short
              exit $?
            fi
          elif [ "$${EVENT}" = "cron" ] && [ "$${BRANCH}" = "main" ]; then
            FULL_MODE=1
          fi

          if [ "$${FULL_MODE}" = "0" ]; then
            if python3 scripts/ci/ci_change_scope.py --mode docs-only; then
              echo "local-ci: docs/opencode-only change detected; skipping heavy local-ci checks"
              exit 0
            fi
          else
            echo "local-ci: full-suite mode enabled (event=$${EVENT}, branch=$${BRANCH}, ref=$${REF}, CI_FORCE_FULL=$${CI_FORCE_FULL:-0})"
          fi

          # PHASE 3: Calculate optimal workers
          CPU_COUNT=$(nproc)
          WORKERS=$((CPU_COUNT > 4 ? 4 : CPU_COUNT))
          echo "local-ci: Using $WORKERS parallel workers"

          if [ -x scripts/local-ci-checks.sh ]; then
            # Set environment to indicate we're in CI with file descriptor constraints
            export CI_FD_CONSTRAINTS=1
            # PHASE 3: Export parallel test settings
            export PYTEST_WORKERS=$WORKERS
            if [ "$${FULL_MODE}" = "1" ]; then
              ./scripts/local-ci-checks.sh --full --parallel
            else
              ./scripts/local-ci-checks.sh --merged-only --parallel
            fi
          else
            echo "scripts/local-ci-checks.sh not found; failing"
            exit 1
          fi

          # PHASE 3: Performance monitoring end
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "local-ci: Completed in ${DURATION}s"
          echo "{\"duration_seconds\": $DURATION, \"workers\": $WORKERS, \"timestamp\": \"$(date -Iseconds)\"}" > "$${CI_STATUS_DIR}/local-ci-performance.json"

          # PHASE 3: Fail if duration exceeds threshold (5 minutes = 300s)
          if [ $DURATION -gt 300 ]; then
            echo "local-ci: WARNING - Duration ${DURATION}s exceeds threshold (300s)"
            # Non-blocking warning; ci-gate can enforce if needed
          fi
        ) > "$${CI_STATUS_DIR}/local-ci-full.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/local-ci-full.log"
        echo "$code" > "$${CI_STATUS_DIR}/local-ci.status"
        # RATIONALE: Exit 0 ensures pipeline continues to ci-gate.
        # The ci-gate step reads local-ci.status and fails if non-zero.
        # Note: local-ci is in FULL_REQUIRED list, so it only blocks on main/cron
        # or when FORCE_FULL_GATE=1. PR builds skip this gate by default.
        exit 0
  brain-eval:
    pull: false
    image: chiseai-ci-brain-eval:py311-20260323
    depends_on:
      - evaluation-pre-eval-group
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      CI_TEMPMEMORY_INGESTION_ENABLED: ${CI_TEMPMEMORY_INGESTION_ENABLED:-auto}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          # Skip expensive brain-eval on push-to-main (PR is authoritative)
          if [ "$${EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
            echo "brain-eval: SKIPPED (push-to-main, PR is authoritative)"
            echo '{"success": true, "skipped": true, "reason": "push-to-main"}' > "$${CI_STATUS_DIR}/brain-eval.json"
            echo "0" > "$${CI_STATUS_DIR}/brain-eval.status"
            exit 0
          fi
          python3 -V
          # Determine feature flag value (same logic as pre-eval-ingestion)
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "auto" ]; then
            if [ "$${CI_COMMIT_BRANCH}" != "main" ] && [ "$${CI_COMMIT_BRANCH}" != "$${CI_REPO_DEFAULT_BRANCH:-main}" ]; then
              CI_TEMPMEMORY_INGESTION_ENABLED="true"
            else
              CI_TEMPMEMORY_INGESTION_ENABLED="false"
            fi
          fi
          # Check ingestion results if enabled
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "true" ] && [ -f "$${CI_STATUS_DIR}/pre-eval-ingestion.json" ]; then
            echo "Checking pre-eval ingestion results..."
            INGESTION_SUCCESS=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('success', False))")
            INGESTION_INGESTED=$(python3 -c "import json; data=json.load(open('$${CI_STATUS_DIR}/pre-eval-ingestion.json')); print(data.get('files_ingested', 0))")
            echo "Ingestion success: $${INGESTION_SUCCESS}, Files ingested: $${INGESTION_INGESTED}"
          fi
          # Check if brain files changed
          CHANGED_BRAIN_FILES="$(python3 scripts/ci/ci_change_scope.py --base-ref origin/main --mode changed-python | grep -E '^(src/brain/|src/neuro_symbolic/|src/strategy/)' || true)"
          if [ -n "$(printf '%s' "$${CHANGED_BRAIN_FILES}" | tr -d '[:space:]')" ]; then
            echo "Brain changes detected, running evaluation..."
            # D-03: Ensure pip install failures are detected
            set -e
            pip install -e . || pip install -e . --break-system-packages
            # D-03: Verify pip install actually worked - detect silent failures
            python3 -c "import chiseai" || { echo "FATAL: pip install failed silently - package not importable"; exit 1; }
            python3 scripts/ci/brain_eval_ci.py --output "$${CI_STATUS_DIR}/brain-eval.json"
          else
            echo "No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > "$${CI_STATUS_DIR}/brain-eval.json"
          fi
        ) > "$${CI_STATUS_DIR}/brain-eval.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/brain-eval.log"
        echo "$code" > "$${CI_STATUS_DIR}/brain-eval.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0
  performance-gate:
    pull: false
    image: chiseai-ci-performance-gate:py311-20260323
    depends_on:
      - local-ci
      - changed-lines-coverage
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
      MAX_TEST_DURATION: "300"
      MAX_MEMORY_MB: "2048"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          echo "performance-gate: Validating performance thresholds"

          # Check local-ci performance metrics
          PERF_FILE="$${CI_STATUS_DIR}/local-ci-performance.json"
          if [ -f "$PERF_FILE" ]; then
            # Validate JSON before reading
            if python3 -c "import json; json.load(open('$PERF_FILE'))" 2>/dev/null; then
              DURATION=$(python3 -c "import json; print(json.load(open('$PERF_FILE')).get('duration_seconds', 0))")
            else
              echo "performance-gate: WARNING - Invalid JSON in $PERF_FILE; skipping"
              echo "0" > "$${CI_STATUS_DIR}/performance-gate.status"
              exit 0
            fi
            echo "performance-gate: Test duration was ${DURATION}s"

            if [ "$DURATION" -gt "$${MAX_TEST_DURATION}" ]; then
              echo "performance-gate: FAIL - Duration ${DURATION}s exceeds threshold ($${MAX_TEST_DURATION}s)"
              exit 1
            fi
            echo "performance-gate: Duration OK (${DURATION}s <= $${MAX_TEST_DURATION}s)"
          else
            echo "performance-gate: No performance data available; skipping duration check"
          fi

          # Check coverage threshold
          COVERAGE_FILE="$${CI_STATUS_DIR}/changed-lines-coverage.status"
          if [ -f "$COVERAGE_FILE" ]; then
            COVERAGE_STATUS=$(cat "$COVERAGE_FILE")
            if [ "$COVERAGE_STATUS" != "0" ]; then
              echo "performance-gate: WARNING - Changed lines coverage check failed"
              # Non-blocking; changed-lines-coverage gate handles this
            else
              echo "performance-gate: Changed lines coverage OK"
            fi
          fi

          echo "performance-gate: All performance checks passed"
        ) > "$${CI_STATUS_DIR}/performance-gate.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/performance-gate.log"
        echo "$code" > "$${CI_STATUS_DIR}/performance-gate.status"
        exit 0
  truth-gate:
    pull: false
    image: chiseai-ci-tools:py311-20260423
    environment:
      CI_STATUS_DIR: /woodpecker/ci-status/${CI_PIPELINE_NUMBER}
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          REF="$${CI_COMMIT_REF:-}"
          CHANGED_FILES="$(printf '%s' "$${CI_PIPELINE_FILES:-[]}" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$$//' || true)"
          if [ "$${CI_FORCE_FULL:-0}" != "1" ] && printf '%s' "$${REF}" | grep -q '^refs/pull/' && ! printf '%s\n' "$$CHANGED_FILES" | grep -qx "docs/bmm-workflow-status.yaml"; then
            echo "truth-gate: workflow status file unchanged on PR; skipping"
            echo '{"passed": true, "skipped": true, "reason": "workflow status file unchanged on PR"}' > "$${CI_STATUS_DIR}/truth-gate.json"
            exit 0
          fi

          echo "truth-gate: Starting truth gate validation for strong-system stories"

          # Extract story ID from PR title or branch name
          STORY_ID=$(python3 scripts/validation/extract_story_id_from_pr.py --from-env)

          if [ -z "$STORY_ID" ]; then
            echo "truth-gate: No story ID found in PR title or branch name"
            echo "truth-gate: Skipping truth gate validation (not a story PR)"
            echo '{"passed": true, "skipped": true, "reason": "No story ID found"}' > "$${CI_STATUS_DIR}/truth-gate.json"
            exit 0
          fi

          echo "truth-gate: Found story ID: $STORY_ID"

          # Check if this is a strong-system story
          if ! python3 scripts/validation/extract_story_id_from_pr.py --check-strong-system "$STORY_ID" > /dev/null 2>&1; then
            echo "truth-gate: Story $STORY_ID is not a strong-system story"
            echo "truth-gate: Skipping truth gate validation"
            echo "{\"passed\": true, \"skipped\": true, \"reason\": \"Not a strong-system story\", \"story_id\": \"$STORY_ID\"}" > "$${CI_STATUS_DIR}/truth-gate.json"
            exit 0
          fi

          echo "truth-gate: Story $STORY_ID is a strong-system story, running validation..."

          # Run truth gate validation
          python3 scripts/validation/truth_gate.py --check all --story-id "$STORY_ID" --output json > "$${CI_STATUS_DIR}/truth-gate.json"
          TRUTH_GATE_EXIT=$?

          # Output results
          cat "$${CI_STATUS_DIR}/truth-gate.json"

          if [ $TRUTH_GATE_EXIT -eq 0 ]; then
            echo "truth-gate: Validation PASSED for $STORY_ID"
            exit 0
          else
            echo "truth-gate: Validation FAILED for $STORY_ID"
            echo "truth-gate: Pipeline will fail at ci-gate step"
            exit 1
          fi
        ) > "$${CI_STATUS_DIR}/truth-gate.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/truth-gate.log"
        echo "$code" > "$${CI_STATUS_DIR}/truth-gate.status"
        exit 0
