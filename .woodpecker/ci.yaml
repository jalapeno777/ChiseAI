# Woodpecker pipeline intentionally disabled.
# CI remains enforced through non-Woodpecker providers/workflows.
when:
  event:
    - pull_request
    - manual
    - cron
  branch:
    - __woodpecker_disabled__

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  swarm-context:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        rm -f _bmad-output/ci/*.status
        set +e
        (
          set -euo pipefail
          python scripts/ci/validate_swarm_context.py
        ) > _bmad-output/ci/swarm-context.log 2>&1
        code=$?
        cat _bmad-output/ci/swarm-context.log
        echo "$code" > _bmad-output/ci/swarm-context.status
        exit 0

  lint:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir black ruff mypy pytest pytest-cov pyyaml types-PyYAML types-requests || echo "WARN: pip install failed, continuing"
          CHANGED_PY="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$CHANGED_PY" | tr -d '[:space:]')" ]; then
            echo "lint: checking changed python files only: ${CHANGED_PY}"
            black --check ${CHANGED_PY} || echo "WARN: black violations (non-blocking)"
            ruff check ${CHANGED_PY} || echo "WARN: ruff violations (non-blocking)"
          else
            echo "lint: no changed python files; skipping black/ruff file checks"
          fi
          MYPY_CHANGED="$(printf '%s' \"$CHANGED_PY\" | tr ' ' '\n' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$MYPY_CHANGED" | tr -d '[:space:]')" ]; then
            echo "mypy: checking changed src/scripts files: ${MYPY_CHANGED}"
            mypy ${MYPY_CHANGED} || echo "WARN: mypy violations (non-blocking)"
          else
            echo "mypy: no changed src/scripts files; checking baseline src package"
            mypy src || echo "WARN: mypy violations (non-blocking)"
          fi
          python scripts/validate_status_sync.py || echo "WARN: status sync issues (non-blocking)"
          python scripts/validate_fr_traceability.py || echo "WARN: FR traceability issues (non-blocking)"
          if [ "${CI_SKIP_ITERLOOP_COMPLIANCE:-1}" = "1" ]; then
            echo "lint: skipping iterloop compliance (CI_SKIP_ITERLOOP_COMPLIANCE=1)"
          else
            python scripts/validate_iterloop_compliance.py || echo "WARN: iterloop compliance issues (non-blocking)"
          fi
          python scripts/validate_pr_title.py || echo "WARN: PR title validation issue (non-blocking)"
          python scripts/validate_traceability_drift.py --verbose || echo "WARN: traceability drift issues (non-blocking)"
          python scripts/ci/validate_bootstrap_compliance.py --check --allowlist scripts/ci/bootstrap_allowlist.txt || echo "WARN: bootstrap compliance issues"
        ) > _bmad-output/ci/lint.log 2>&1
        code=$?
        cat _bmad-output/ci/lint.log
        echo "$code" > _bmad-output/ci/lint.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  security-scan:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir bandit
          CHANGED_SCAN="$(printf '%s' \"${CI_PIPELINE_FILES:-[]}\" | tr -d '[]\"' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -E '^(src/|scripts/).+\\.py$' | tr '\n' ' ' || true)"
          if [ -n "$(printf '%s' "$CHANGED_SCAN" | tr -d '[:space:]')" ]; then
            echo "security-scan: scanning changed files only: ${CHANGED_SCAN}"
            # Keep PR checks actionable by scanning changed executable code only.
            bandit --ini .bandit -q ${CHANGED_SCAN} -ll || echo "WARN: bandit findings (non-blocking)"
          else
            echo "security-scan: no changed src/scripts python files; skipping"
          fi
        ) > _bmad-output/ci/security-scan.log 2>&1
        code=$?
        cat _bmad-output/ci/security-scan.log
        echo "$code" > _bmad-output/ci/security-scan.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  dependency-audit:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pip-audit tomli || pip install --no-cache-dir --break-system-packages pip-audit tomli
          python3 scripts/ci/dependency_audit.py
        ) > _bmad-output/ci/dependency-audit.log 2>&1
        code=$?
        cat _bmad-output/ci/dependency-audit.log
        echo "$code" > _bmad-output/ci/dependency-audit.status
        exit 0

  secret-scan:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/secret_scan_changed.py
        ) > _bmad-output/ci/secret-scan.log 2>&1
        code=$?
        cat _bmad-output/ci/secret-scan.log
        echo "$code" > _bmad-output/ci/secret-scan.status
        exit 0

  risk-invariants:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy pyyaml
          python3 -m pytest -q \
            tests/test_execution/test_venue_enforcement.py \
            tests/test_execution/test_kill_switch/ \
            tests/test_execution/test_reconciliation.py \
            tests/test_execution/test_outcome_persistence.py \
            tests/test_execution/test_paper/test_paper_risk_enforcer.py
        ) > _bmad-output/ci/risk-invariants.log 2>&1
        code=$?
        cat _bmad-output/ci/risk-invariants.log
        echo "$code" > _bmad-output/ci/risk-invariants.status
        exit 0

  brain-regression:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if ! echo "$CHANGED_FILES" | grep -qE "^(src/brain/|src/evaluation/|src/neuro_symbolic/|src/governance/tempmemory/|scripts/evaluation/|scripts/ci/brain_eval_ci.py)"; then
            echo "brain-regression: no brain/evaluation changes; skipping"
            exit 0
          fi

          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml requests numpy scipy
          python3 -m pytest -q \
            tests/test_brain/ \
            tests/test_evaluation/ \
            tests/test_ci/test_brain_evaluation.py \
            tests/test_mini_brain_eval.py \
            tests/test_mini_brain_eval_structured.py

          python3 scripts/ci/brain_eval_ci.py --output _bmad-output/ci/brain-regression.json
        ) > _bmad-output/ci/brain-regression.log 2>&1
        code=$?
        cat _bmad-output/ci/brain-regression.log
        echo "$code" > _bmad-output/ci/brain-regression.status
        exit 0

  docs-pairing:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python3 scripts/ci/validate_docs_pairing.py
        ) > _bmad-output/ci/docs-pairing.log 2>&1
        code=$?
        cat _bmad-output/ci/docs-pairing.log
        echo "$code" > _bmad-output/ci/docs-pairing.status
        exit 0

  docker-governance:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          python3 scripts/ci/validate_docker_governance.py
        ) > _bmad-output/ci/docker-governance.log 2>&1
        code=$?
        cat _bmad-output/ci/docker-governance.log
        echo "$code" > _bmad-output/ci/docker-governance.status
        exit 0

  local-ci:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          # Increase file descriptor and process limits for testing
          ulimit -n 16384 || echo "Warning: could not increase file descriptor limit"
          ulimit -u 2048 || echo "Warning: could not increase process limit"
          echo "File descriptor limit: $(ulimit -n)"
          echo "Process limit: $(ulimit -u)"
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          FULL_MODE=0
          if [ "${CI_FORCE_FULL:-0}" = "1" ]; then
            FULL_MODE=1
          elif [ "${EVENT}" = "cron" ] && [ "${BRANCH}" = "main" ]; then
            FULL_MODE=1
          fi

          if [ "${FULL_MODE}" = "0" ]; then
            if python scripts/ci/ci_change_scope.py --mode docs-only; then
              echo "local-ci: docs/opencode-only change detected; skipping heavy local-ci checks"
              exit 0
            fi
          else
            echo "local-ci: full-suite mode enabled (event=${EVENT}, branch=${BRANCH}, CI_FORCE_FULL=${CI_FORCE_FULL:-0})"
          fi

          # Install system dependencies required by tests
          apt-get update && apt-get install -y jq ripgrep
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pytest-forked pyyaml requests
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi httpx
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi
          pip install --no-cache-dir sqlalchemy>=2.0.0
          if [ -x scripts/local-ci-checks.sh ]; then
            # Set environment to indicate we're in CI with file descriptor constraints
            export CI_FD_CONSTRAINTS=1
            if [ "${FULL_MODE}" = "1" ]; then
              ./scripts/local-ci-checks.sh
            else
              ./scripts/local-ci-checks.sh --merged-only
            fi
          else
            echo "scripts/local-ci-checks.sh not found; failing"
            exit 1
          fi
        ) > _bmad-output/ci/local-ci-full.log 2>&1
        code=$?
        cat _bmad-output/ci/local-ci-full.log
        echo "$code" > _bmad-output/ci/local-ci.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  changed-lines-coverage:
    image: python:3.11
    depends_on:
      - local-ci
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir coverage
          python3 -m coverage json -o _bmad-output/ci/coverage.json
          python3 scripts/ci/coverage_changed_lines.py --coverage-json _bmad-output/ci/coverage.json --threshold 80
        ) > _bmad-output/ci/changed-lines-coverage.log 2>&1
        code=$?
        cat _bmad-output/ci/changed-lines-coverage.log
        echo "$code" > _bmad-output/ci/changed-lines-coverage.status
        exit 0

  pipeline-watchdog:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir requests
          python scripts/ci/check_woodpecker_stuck_pipelines.py --max-running-seconds 1800
        ) > _bmad-output/ci/pipeline-watchdog.log 2>&1
        code=$?
        cat _bmad-output/ci/pipeline-watchdog.log
        echo "$code" > _bmad-output/ci/pipeline-watchdog.status
        # Non-blocking signal; ci-gate remains the only fail point.
        exit 0

  brain-eval:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir pyyaml requests numpy scipy
          # Check if brain files changed
          if git diff --name-only origin/main HEAD | grep -qE "(src/brain/|src/neuro_symbolic/|src/strategy/)"; then
            echo "Brain changes detected, running evaluation..."
            pip install -e . > /dev/null 2>&1 || pip install -e . --break-system-packages > /dev/null 2>&1 || true
            python scripts/ci/brain_eval_ci.py --output _bmad-output/ci/brain-eval.json
          else
            echo "No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > _bmad-output/ci/brain-eval.json
          fi
        ) > _bmad-output/ci/brain-eval.log 2>&1
        code=$?
        cat _bmad-output/ci/brain-eval.log
        echo "$code" > _bmad-output/ci/brain-eval.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  tempmemory-scheduler:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run tempmemory migration
          python3 scripts/ops/tempmemory_migration.py --full-migration --enable
        ) > _bmad-output/ci/tempmemory-scheduler.log 2>&1
        code=$?
        cat _bmad-output/ci/tempmemory-scheduler.log
        echo "$code" > _bmad-output/ci/tempmemory-scheduler.status
        exit 0

  mini-brain-eval:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run mini BrainEval with all sources
          python3 scripts/evaluation/mini_brain_eval.py --cadence daily --use-all --provenance --output-dir _bmad-output/ci/mini-brain-eval
        ) > _bmad-output/ci/mini-brain-eval.log 2>&1
        code=$?
        cat _bmad-output/ci/mini-brain-eval.log
        echo "$code" > _bmad-output/ci/mini-brain-eval.status
        exit 0

  tempmemory-reconcile:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run reconciliation and archive
          python3 scripts/ops/tempmemory_scheduler.py --once --dry-run
        ) > _bmad-output/ci/tempmemory-reconcile.log 2>&1
        code=$?
        cat _bmad-output/ci/tempmemory-reconcile.log
        echo "$code" > _bmad-output/ci/tempmemory-reconcile.status
        exit 0

  tempmemory-drill:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          if [ "${EVENT}" != "cron" ] || [ "${BRANCH}" != "main" ]; then
            echo "tempmemory-drill: not cron/main; skipping"
            exit 0
          fi

          pip install --no-cache-dir pyyaml
          python3 scripts/ops/tempmemory_migration.py --dry-run
          python3 scripts/ops/tempmemory_scheduler.py --once --dry-run
          python3 scripts/reconciliation/trade_reconciliation.py --dry-run --output _bmad-output/ci/tempmemory-drill-reconciliation.json
        ) > _bmad-output/ci/tempmemory-drill.log 2>&1
        code=$?
        cat _bmad-output/ci/tempmemory-drill.log
        echo "$code" > _bmad-output/ci/tempmemory-drill.status
        exit 0

  flaky-detection:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          if [ "${EVENT}" != "cron" ] || [ "${BRANCH}" != "main" ]; then
            echo "flaky-detection: not cron/main; skipping"
            exit 0
          fi

          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml
          TARGETS=\"tests/test_execution/test_venue_enforcement.py tests/test_execution/test_kill_switch/test_executor.py tests/test_execution/test_reconciliation.py tests/test_evaluation/test_mini_brain_eval.py\"

          for i in 1 2 3; do
            echo \"flaky-detection: run ${i}/3\"
            python3 -m pytest -q ${TARGETS}
          done
        ) > _bmad-output/ci/flaky-detection.log 2>&1
        code=$?
        cat _bmad-output/ci/flaky-detection.log
        echo "$code" > _bmad-output/ci/flaky-detection.status
        exit 0

  compass-apply:
    image: python:3.11
    environment:
      CI_PR_LABELS: "${CI_COMMIT_PULL_REQUEST_LABELS:-}"
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml
          # Run compass apply to auto-label PRs based on changed files
          echo "Running compass apply..."
          CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | python3 scripts/ops/compass_apply.py
          else
            echo "No changed files detected, skipping compass apply"
          fi
        ) > _bmad-output/ci/compass-apply.log 2>&1
        code=$?
        cat _bmad-output/ci/compass-apply.log
        echo "$code" > _bmad-output/ci/compass-apply.status
        # Non-blocking: always exit 0 for auto-labeling
        exit 0

  compass-gate:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
      CI_PR_LABELS: "${CI_COMMIT_PULL_REQUEST_LABELS:-}"
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir pyyaml
        # Run compass gate to check for sensitive path changes
        echo "Running compass gate check..."
        CHANGED_FILES="$(git diff --name-only origin/main HEAD || true)"
        if [ -n "$CHANGED_FILES" ]; then
          echo "$CHANGED_FILES" | python3 scripts/ci/compass_gate.py --check
        else
          echo "No changed files detected, skipping compass gate"
        fi

  status-write-gate:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          echo "Running status write gate check..."
          python3 scripts/governance/status_write_gate.py --file docs/bmm-workflow-status.yaml --no-require-authority
        ) > _bmad-output/ci/status-write-gate.log 2>&1
        code=$?
        cat _bmad-output/ci/status-write-gate.log
        echo "$code" > _bmad-output/ci/status-write-gate.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  ci-gate:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir requests
        python scripts/ci/ci_gate.py

  taiga-sync-validate:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional gate: only run when explicitly enabled via CI env/secrets.
        if [ "${TAIGA_SYNC_VALIDATE:-}" != "1" ]; then
          echo "TAIGA_SYNC_VALIDATE != 1; skipping taiga sync validation"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --validate

  taiga-sync-apply:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional automation: apply only on main, only when explicitly enabled.
        if [ "${TAIGA_SYNC_APPLY:-}" != "1" ]; then
          echo "TAIGA_SYNC_APPLY != 1; skipping taiga sync apply"
          exit 0
        fi
        if [ "${CI_COMMIT_BRANCH:-}" != "main" ]; then
          echo "Not on main; skipping taiga sync apply"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --apply
