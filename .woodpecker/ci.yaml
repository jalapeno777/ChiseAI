  pre-eval-ingestion:
    pull: false
    image: chiseai-ci-pre-eval-ingestion:py311-20260323
    environment:
      CI_STATUS_DIR: "/woodpecker/ci-status/${CI_PIPELINE_NUMBER}"
      # CI_TEMPMEMORY_INGESTION_ENABLED: Feature flag for tempmemory ingestion
      # - Default: enabled for staging (non-main branches), disabled for production (main)
      # - Override: Set CI_TEMPMEMORY_INGESTION_ENABLED=true/false at pipeline level
      # - Rollback: Set to "false" or remove this step from pipeline
      CI_TEMPMEMORY_INGESTION_ENABLED: "${CI_TEMPMEMORY_INGESTION_ENABLED:-auto}"
    commands:
      - |
        set -euo pipefail
        mkdir -p "$${CI_STATUS_DIR}"
        set +e
        (
          set -euo pipefail
          EVENT="$${CI_BUILD_EVENT:-$${WOODPECKER_BUILD_EVENT:-$${WOODPECKER_EVENT:-$${CI_PIPELINE_EVENT:-}}}}"
          # Skip expensive ingestion on push-to-main (PR is authoritative)
          if [ "$${EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
            echo "pre-eval-ingestion: SKIPPED (push-to-main, PR is authoritative)"
            printf '%s\n' '{"success": true, "skipped": true, "reason": "push-to-main", "files_processed": 0, "files_ingested": 0, "files_failed": 0, "files_skipped": 0, "duration_seconds": 0, "errors": [], "ingested_memory_ids": []}' > "$${CI_STATUS_DIR}/pre-eval-ingestion.json"
            echo "0" > "$${CI_STATUS_DIR}/pre-eval-ingestion.status"
            exit 0
          fi
          python -V
          echo "Running pre-evaluation tempmemory ingestion..."
          # Determine feature flag value
          # "auto" mode: enabled for non-main branches (staging), disabled for main (production)
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" = "auto" ]; then
            if [ "$${CI_COMMIT_BRANCH}" != "main" ] && [ "$${CI_COMMIT_BRANCH}" != "$${CI_REPO_DEFAULT_BRANCH:-main}" ]; then
              CI_TEMPMEMORY_INGESTION_ENABLED="true"
              echo "Staging branch detected ($${CI_COMMIT_BRANCH}). Enabling tempmemory ingestion."
            else
              CI_TEMPMEMORY_INGESTION_ENABLED="false"
              echo "Production branch detected ($${CI_COMMIT_BRANCH}). Disabling tempmemory ingestion."
            fi
          fi
          echo "Feature flag CI_TEMPMEMORY_INGESTION_ENABLED=$${CI_TEMPMEMORY_INGESTION_ENABLED}"
          # Fast-path when ingestion is disabled (main/prod by default):
          # avoid expensive dependency bootstrapping and emit a compatible report.
          if [ "$${CI_TEMPMEMORY_INGESTION_ENABLED}" != "true" ]; then
            echo "Ingestion disabled for this branch; writing skip report and exiting step early."
            printf '%s\n' '{"success": true, "skipped": true, "reason": "Feature flag disabled", "files_processed": 0, "files_ingested": 0, "files_failed": 0, "files_skipped": 0, "duration_seconds": 0, "errors": [], "ingested_memory_ids": []}' > "$${CI_STATUS_DIR}/pre-eval-ingestion.json"
            exit 0
          fi
          # Run pre-eval ingestion
          python scripts/ci/pre_eval_ingestion.py --output "$${CI_STATUS_DIR}/pre-eval-ingestion.json"
        ) > "$${CI_STATUS_DIR}/pre-eval-ingestion.log" 2>&1
        code=$?
        cat "$${CI_STATUS_DIR}/pre-eval-ingestion.log"
        echo "$code" > "$${CI_STATUS_DIR}/pre-eval-ingestion.status"
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  brain-eval:
    pull: false
    image: chiseai-ci-brain-eval:py311-20260323
    depends_on:
