# Woodpecker Cron Pipeline for KPI Evaluation
# Story: ST-KPI-005 - Scheduler Integration
#
# DESIGN PRINCIPLE: Non-blocking steps with single fail point
# - Individual steps capture exit codes but always exit 0
# - The ci-gate step (at the end) is the SINGLE authoritative failure point
#
# CRON SCHEDULES (configured in Woodpecker UI):
#   - 6h-eval: Every 6 hours (0 */6 * * *)
#   - daily-trends: Daily at 00:15 UTC (15 0 * * *)
#   - weekly-reflection: Weekly on Monday at 01:00 UTC (0 1 * * 1)
#
# TRIGGER: Set CI_COMMIT_MESSAGE to identify cycle type:
#   - "cron:6h-eval" for 6-hour cycle
#   - "cron:daily-trends" for daily cycle
#   - "cron:weekly-reflection" for weekly cycle
#
# SAFETY: No risk cap logic modified
# SAFETY: No promotion gate logic modified
# SAFETY: No live trading flow modified

when:
  event:
    - cron
  branch:
    - main
  # Only run this pipeline for dedicated KPI scheduler crons.
  # Prevents cron-eval from running on unrelated crons (e.g. workflow-archive-*).
  cron:
    - 6h-mini-eval
    - 6h-eval
    - daily-trends
    - weekly-reflection
    - persona-weekly

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  kpi-scheduler-6h:
    image: python:3.11
    when:
      cron:
        - 6h-mini-eval
        - 6h-eval
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml requests numpy scipy redis
          
          echo "Running 6-hour KPI mini eval cycle..."
          python3 scripts/evaluation/kpi_scheduler.py --cycle 6h
          
          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/brain-eval -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/kpi-scheduler-6h.log 2>&1
        code=$?
        cat _bmad-output/ci/kpi-scheduler-6h.log
        echo "$code" > _bmad-output/ci/kpi-scheduler-6h.status
        exit 0

  # INC-AUTONOMY-CADENCE-001: Trigger autonomy cadence controller for 6h jobs
  # This runs the ops.kpi_ingest_6h job from autonomy_job_registry.yaml
  # --force is used because cron schedule is the authoritative trigger
  # Idempotency key prevents duplicate runs on the same day
  autonomy-cadence-6h:
    image: python:3.11
    when:
      cron:
        - 6h-mini-eval
        - 6h-eval
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        mkdir -p _bmad-output/autonomy-cadence
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml redis
          
          echo "Running autonomy cadence controller for 6h jobs..."
          python3 scripts/evaluation/autonomy_cadence_controller.py --job-id ops.kpi_ingest_6h --force
          
          # List autonomy artifacts
          echo "Autonomy artifacts produced:"
          find _bmad-output/autonomy-cadence -name "*.json" -type f 2>/dev/null || echo "No autonomy artifacts found"
        ) > _bmad-output/ci/autonomy-cadence-6h.log 2>&1
        code=$?
        cat _bmad-output/ci/autonomy-cadence-6h.log
        echo "$code" > _bmad-output/ci/autonomy-cadence-6h.status
        exit 0

  kpi-scheduler-daily:
    image: python:3.11
    when:
      cron:
        - daily-trends
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml requests numpy scipy redis
          
          echo "Running daily KPI trend cycle..."
          python3 scripts/evaluation/kpi_scheduler.py --cycle daily
          
          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/brain-eval -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/kpi-scheduler-daily.log 2>&1
        code=$?
        cat _bmad-output/ci/kpi-scheduler-daily.log
        echo "$code" > _bmad-output/ci/kpi-scheduler-daily.status
        exit 0

  # INC-AUTONOMY-CADENCE-001: Trigger autonomy cadence controller for daily jobs
  autonomy-cadence-daily:
    image: python:3.11
    when:
      cron:
        - daily-trends
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        mkdir -p _bmad-output/autonomy-cadence
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml redis
          
          echo "Running autonomy cadence controller for daily jobs..."
          python3 scripts/evaluation/autonomy_cadence_controller.py \
            --job-id ops.daily_trends \
            --job-id governance.daily_reflection \
            --force
          
          echo "Autonomy artifacts produced:"
          find _bmad-output/autonomy-cadence -name "*.json" -type f 2>/dev/null || echo "No autonomy artifacts found"
        ) > _bmad-output/ci/autonomy-cadence-daily.log 2>&1
        code=$?
        cat _bmad-output/ci/autonomy-cadence-daily.log
        echo "$code" > _bmad-output/ci/autonomy-cadence-daily.status
        exit 0

  kpi-scheduler-weekly:
    image: python:3.11
    when:
      cron:
        - weekly-reflection
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml requests numpy scipy redis
          
          echo "Running weekly KPI reflection cycle..."
          python3 scripts/evaluation/kpi_scheduler.py --cycle weekly
          
          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/brain-eval -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/kpi-scheduler-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/kpi-scheduler-weekly.log
        echo "$code" > _bmad-output/ci/kpi-scheduler-weekly.status
        exit 0

  # INC-AUTONOMY-CADENCE-001: Trigger autonomy cadence controller for weekly jobs
  autonomy-cadence-weekly:
    image: python:3.11
    when:
      cron:
        - weekly-reflection
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        mkdir -p _bmad-output/autonomy-cadence
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml redis
          
          echo "Running autonomy cadence controller for weekly jobs..."
          python3 scripts/evaluation/autonomy_cadence_controller.py \
            --job-id governance.metacog_weekly \
            --job-id strategy.canary_review_weekly \
            --force
          
          echo "Autonomy artifacts produced:"
          find _bmad-output/autonomy-cadence -name "*.json" -type f 2>/dev/null || echo "No autonomy artifacts found"
        ) > _bmad-output/ci/autonomy-cadence-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/autonomy-cadence-weekly.log
        echo "$code" > _bmad-output/ci/autonomy-cadence-weekly.status
        exit 0

  skill-autonomy-weekly:
    image: python:3.11
    when:
      cron:
        - weekly-reflection
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml redis

          echo "Running weekly skill autonomy tick..."
          python3 scripts/ops/skill_autonomy_tick.py --mode=weekly
          python3 scripts/ops/ingest_skill_backlog_candidates.py

          echo "Artifacts produced:"
          find docs/tempmemories -name "skill-autonomy-weekly-*.md" -type f 2>/dev/null || echo "No weekly skill autonomy artifacts found"
          find docs/backlog -name "skills-autonomy-candidates-*.md" -type f 2>/dev/null || echo "No backlog candidate artifacts found"
        ) > _bmad-output/ci/skill-autonomy-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/skill-autonomy-weekly.log
        echo "$code" > _bmad-output/ci/skill-autonomy-weekly.status
        exit 0

  persona-regression-weekly:
    image: python:3.11
    when:
      cron:
        - persona-weekly
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        mkdir -p _bmad-output/persona

        # Run harness - output TIER:line to stdout
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir pyyaml redis requests
          python3 scripts/eval/run_persona_harness.py \
            --output _bmad-output/persona/persona-regression-$(date +%Y-%m-%d).json \
            --disabled
        ) > _bmad-output/ci/persona-regression-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/persona-regression-weekly.log

        # Extract tier from TIER: line in log
        tier=$(grep "^TIER:" _bmad-output/ci/persona-regression-weekly.log | sed 's/TIER://' || echo "ERROR")
        echo "$tier" > _bmad-output/ci/persona-regression-weekly.status
        echo "Persona tier: $tier (code: $code)"
        exit 0  # Don't fail pipeline on WARN/FAIL

  # Fallback: auto-detect cycle from commit message pattern
  kpi-scheduler-auto:
    image: python:3.11
    when:
      event:
        - manual
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          CRON_MSG="${CI_COMMIT_MESSAGE:-}"
          
          # Skip if already handled by specific steps
          case "$CRON_MSG" in
            cron:6h-eval|cron:daily-trends|cron:weekly-reflection)
              echo "kpi-scheduler-auto: already handled by specific step, skipping"
              exit 0
              ;;
          esac

          pip install --no-cache-dir pyyaml requests numpy scipy redis
          
          # Try to extract cycle from message pattern
          CYCLE=""
          case "$CRON_MSG" in
            *6h*|*6-hour*|*mini*)
              CYCLE="6h"
              ;;
            *daily*|*trends*|*day*)
              CYCLE="daily"
              ;;
            *weekly*|*reflection*|*week*)
              CYCLE="weekly"
              ;;
            *)
              echo "kpi-scheduler-auto: unknown cron trigger, skipping"
              exit 0
              ;;
          esac
          
          echo "Running KPI scheduler cycle: $CYCLE"
          python3 scripts/evaluation/kpi_scheduler.py --cycle "$CYCLE"
          
          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/brain-eval -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/kpi-scheduler-auto.log 2>&1
        code=$?
        cat _bmad-output/ci/kpi-scheduler-auto.log
        echo "$code" > _bmad-output/ci/kpi-scheduler-auto.status
        exit 0

  ci-gate:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir requests

        # Check status files and fail if any non-zero
        FAILED=0
        for status_file in _bmad-output/ci/*.status; do
          if [ -f "$status_file" ]; then
            code=$(cat "$status_file")
            name=$(basename "$status_file" .status)
            if [ "$code" != "0" ]; then
              echo "FAIL: $name exited with code $code"
              FAILED=1
            else
              echo "PASS: $name"
            fi
          fi
        done

        if [ "$FAILED" = "1" ]; then
          echo "KPI scheduler cron pipeline failed"
          exit 1
        fi

        echo "KPI scheduler cron pipeline passed"
        exit 0
