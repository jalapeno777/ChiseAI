# Auto PR Orchestration
# Runs on feature-branch pushes and performs:
# 1) Create PRs for pushed non-protected branches

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

when:
  - event: push
    branch: [feature/**]

steps:
  - name: pre-pr-merge-check
    image: woodpeckerci/plugin-git
    commands:
      - |
        set -euo pipefail
        echo "pre-pr-merge-check: Verifying branch is up-to-date with main..."
        git fetch origin main
        if git merge-base --is-ancestor origin/main HEAD; then
          echo "pre-pr-merge-check: Branch is up-to-date with main"
          exit 0
        else
          echo "pre-pr-merge-check: FAIL - Branch is behind main"
          echo "NOT_MERGEABLE: branch is behind main"
          exit 1
        fi

  - name: auto-pr
    image: python:3.11-slim
    depends_on: [pre-pr-merge-check]
    commands:
      - python3 scripts/pr_lifecycle/auto_pr_merge.py ensure-prs
    environment:
      GITEA_BASE_URL: http://host.docker.internal:3000
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
      GITEA_TOKEN:
        from_secret: gitea_token
      CHISE_AUTOPR_BASE: main
      CHISE_AUTOPR_PROTECTED_BRANCHES: main,develop
      CHISE_AUTOPR_MAX_BRANCH_AGE_MIN: "30"
      CHISE_AUTOPR_SOURCE_BRANCH: ${CI_COMMIT_BRANCH}
      CHISE_AUTOPR_ENABLE_SERVER_AUTOMERGE: "1"
