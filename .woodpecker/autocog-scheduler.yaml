# Woodpecker Cron Pipeline for Autonomous Cognition (AutoCog)
# Story: AUTOCOG-SCHED-001 - Scheduler Integration
#
# DESIGN PRINCIPLE: Non-blocking steps with single fail point
# - Individual steps capture exit codes but always exit 0
# - The ci-gate step (at the end) is the SINGLE authoritative failure point
#
# CRON SCHEDULES (configured in Woodpecker UI):
#   - autocog-hourly: Every hour (0 * * * *)
#   - autocog-improvement-daily: Daily at 02:00 UTC (0 2 * * *)
#   - autocog-constitution-daily: Daily at 03:00 UTC (0 3 * * *)
#   - autocog-calibration-weekly: Weekly on Monday at 01:00 UTC (0 1 * * 1)
#   - autocog-autonomy-tune-weekly: Weekly on Monday at 02:00 UTC (0 2 * * 1)
#
# SAFETY: All jobs run with medium or lower risk level
# SAFETY: No risk cap logic modified
# SAFETY: No promotion gate logic modified
# SAFETY: No live trading flow modified

when:
  event:
    - cron
  branch:
    - main
  # Only run this pipeline for dedicated autocog scheduler crons.
  cron:
    - autocog-hourly
    - autocog-improvement-daily
    - autocog-constitution-daily
    - autocog-calibration-weekly
    - autocog-autonomy-tune-weekly

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  # Hourly: Belief Consistency Check
  autocog-belief-consistency-hourly:
    image: chiseai-ci-autocog:py311-20260414
    when:
      cron:
        - autocog-hourly
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          HOUR=$(date -u +%H)
          DATE=$(date -u +%Y-%m-%d)
          IDEMPOTENCY_KEY="autocog.belief_consistency.hourly:${DATE}:${HOUR}"

          echo "Running autocog belief consistency check..."
          echo "Idempotency key: $IDEMPOTENCY_KEY"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode belief_consistency \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-belief-consistency-hourly.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-belief-consistency-hourly.log
        echo "$code" > _bmad-output/ci/autocog-belief-consistency-hourly.status
        exit 0

  # Daily: Improvement Cycle (runs at 02:00 UTC)
  autocog-improvement-cycle-daily:
    image: chiseai-ci-autocog:py311-20260414
    when:
      cron:
        - autocog-improvement-daily
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          IDEMPOTENCY_KEY="autocog.improvement_cycle.daily:${DATE}"

          echo "Running autocog improvement cycle..."
          echo "Idempotency key: $IDEMPOTENCY_KEY"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode improvement_cycle \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-improvement-cycle-daily.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-improvement-cycle-daily.log
        echo "$code" > _bmad-output/ci/autocog-improvement-cycle-daily.status
        exit 0

  # Daily: Constitution Audit (runs at 03:00 UTC)
  autocog-constitution-audit-daily:
    image: chiseai-ci-autocog:py311-20260414
    when:
      cron:
        - autocog-constitution-daily
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          IDEMPOTENCY_KEY="autocog.constitution_audit.daily:${DATE}"

          echo "Running autocog constitution audit..."
          echo "Idempotency key: $IDEMPOTENCY_KEY"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode constitution_audit \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-constitution-audit-daily.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-constitution-audit-daily.log
        echo "$code" > _bmad-output/ci/autocog-constitution-audit-daily.status
        exit 0

  # Weekly: Calibration (runs Monday at 01:00 UTC)
  autocog-calibration-weekly:
    image: chiseai-ci-autocog:py311-20260414
    when:
      cron:
        - autocog-calibration-weekly
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          WEEK=$(date -u +%V)
          YEAR=$(date -u +%Y)
          IDEMPOTENCY_KEY="autocog.calibration.weekly:${YEAR}-W${WEEK}"

          echo "Running autocog calibration cycle..."
          echo "Idempotency key: $IDEMPOTENCY_KEY"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode calibration \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-calibration-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-calibration-weekly.log
        echo "$code" > _bmad-output/ci/autocog-calibration-weekly.status
        exit 0

  # Weekly: Autonomy Tune (runs Monday at 02:00 UTC)
  autocog-autonomy-tune-weekly:
    image: chiseai-ci-autocog:py311-20260414
    when:
      cron:
        - autocog-autonomy-tune-weekly
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          WEEK=$(date -u +%V)
          YEAR=$(date -u +%Y)
          IDEMPOTENCY_KEY="autocog.autonomy_tune.weekly:${YEAR}-W${WEEK}"

          echo "Running autocog autonomy tune cycle..."
          echo "Idempotency key: $IDEMPOTENCY_KEY"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode autonomy_tune \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-autonomy-tune-weekly.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-autonomy-tune-weekly.log
        echo "$code" > _bmad-output/ci/autocog-autonomy-tune-weekly.status
        exit 0

  # Manual trigger fallback for testing
  autocog-manual-trigger:
    image: chiseai-ci-autocog:py311-20260414
    when:
      event:
        - manual
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/autocog/cycles
        mkdir -p _bmad-output/ci
      - rm -f _bmad-output/ci/autocog-*.status
      - |
        set +e
        (
          set -euo pipefail
          MODE="${AUTOCOG_MODE:-belief_consistency}"

          echo "Running autocog manual trigger with mode: $MODE"

          export PYTHONPATH="$(pwd)"
          python3 scripts/ops/run_autonomous_full_cycle.py \
            --mode "$MODE" \
            --notify-discord

          # List produced artifacts
          echo "Artifacts produced:"
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null || echo "No artifacts found"
        ) > _bmad-output/ci/autocog-manual-trigger.log 2>&1
        code=$?
        cat _bmad-output/ci/autocog-manual-trigger.log
        echo "$code" > _bmad-output/ci/autocog-manual-trigger.status
        exit 0

  # CI Gate: Single authoritative failure point
  ci-gate:
    image: chiseai-ci-autocog:py311-20260414
    commands:
      - |
        set -euo pipefail

        # Check status files and fail if any non-zero
        FAILED=0
        HAS_STATUS_FILES=0
        for status_file in _bmad-output/ci/autocog-*.status; do
          if [ -f "$status_file" ]; then
            HAS_STATUS_FILES=1
            code=$(cat "$status_file")
            name=$(basename "$status_file" .status)
            if [ "$code" != "0" ]; then
              echo "FAIL: $name exited with code $code"
              FAILED=1
            else
              echo "PASS: $name"
            fi
          fi
        done

        # No-op if no autocog steps ran (no status files)
        if [ "$HAS_STATUS_FILES" = "0" ]; then
          echo "No autocog steps ran"
          echo "AutoCog scheduler pipeline PASSED (no-op)"
          exit 0
        fi

        # Summary of artifacts
        echo ""
        echo "=== Artifact Summary ==="
        if [ -d "_bmad-output/autocog/cycles" ]; then
          find _bmad-output/autocog/cycles -name "*.json" -type f 2>/dev/null | while read f; do
            echo "Artifact: $f"
          done
        fi

        if [ "$FAILED" = "1" ]; then
          echo ""
          echo "AutoCog scheduler pipeline FAILED"
          exit 1
        fi

        echo ""
        echo "AutoCog scheduler pipeline PASSED"
        exit 0
