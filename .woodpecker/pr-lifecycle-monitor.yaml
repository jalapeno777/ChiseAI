# PR Lifecycle Health Monitor
# Runs comprehensive health scans every 5 minutes

when:
  - event: cron
    cron: "*/5 * * * *" # Every 5 minutes

labels:
  project: chiseai

steps:
  - name: health-scan
    image: python:3.11-slim
    commands:
      - apt-get update && apt-get install -y redis-tools git
      - pip install -e . 2>/dev/null || true
      - cd scripts/pr_lifecycle
      - python3 health_monitor.py scan --stuck-threshold-min 30
      - |
        redis-cli -h host.docker.internal -p 6380 -n 0 SET \
          bmad:chiseai:pr-lifecycle-monitor:last-health-scan \
          "$(date -Iseconds)" >/dev/null || true
    environment:
      CHISE_REDIS_HOST: host.docker.internal
      CHISE_REDIS_PORT: "6380"
      CHISE_REDIS_DB: "0"
      GITEA_BASE_URL: http://host.docker.internal:3000
      GITEA_TOKEN:
        from_secret: gitea_token
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
      CHISE_PR_STUCK_THRESHOLD_MIN: "30"
      CHISE_PR_SYSTEMIC_THRESHOLD: "3"
    when:
      - event: cron

  - name: trigger-recovery
    image: python:3.11-slim
    commands:
      - apt-get update && apt-get install -y redis-tools
      - cd scripts/pr_lifecycle
      - python3 health_monitor.py recovery
    environment:
      CHISE_REDIS_HOST: host.docker.internal
      CHISE_REDIS_PORT: "6380"
      CHISE_REDIS_DB: "0"
      GITEA_BASE_URL: http://host.docker.internal:3000
      GITEA_TOKEN:
        from_secret: gitea_token
      GITEA_REVIEW_TOKEN:
        from_secret: gitea_review_token
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
    when:
      - event: cron

  - name: auto-rebase-stale-prs
    image: python:3.11-slim
    commands:
      - apt-get update && apt-get install -y redis-tools git
      - pip install -e . 2>/dev/null || true
      - cd scripts/pr_lifecycle
      - python3 auto_rebase.py detect-and-rebase
    environment:
      CHISE_REDIS_HOST: host.docker.internal
      CHISE_REDIS_PORT: "6380"
      CHISE_REDIS_DB: "0"
      GITEA_BASE_URL: http://host.docker.internal:3000
      GITEA_TOKEN:
        from_secret: gitea_token
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
      CHISE_PR_MAX_REBASES_PER_WINDOW: "3"
      CHISE_PR_REBASE_WINDOW_SEC: "300"
      CHISE_PR_REBASE_COOLDOWN_MIN: "10"
      DISCORD_WEBHOOK_URL:
        from_secret: discord_pr_alerts_webhook
    when:
      - event: cron
    depends_on:
      - health-scan

  - name: stale-push-kpi
    image: python:3.11-slim
    commands:
      - apt-get update && apt-get install -y redis-tools
      - python3 scripts/ci/stale_push_kpi.py --limit 50 --threshold 0.30 --write-redis --output-json /tmp/stale-push-kpi.json
    environment:
      WOODPECKER_BASE_URL: http://host.docker.internal:8012
      WOODPECKER_TOKEN:
        from_secret: woodpecker_token
      GITEA_OWNER: craig
      GITEA_REPO: ChiseAI
      CHISE_REDIS_HOST: host.docker.internal
      CHISE_REDIS_PORT: "6380"
      CHISE_REDIS_DB: "0"
      DISCORD_WEBHOOK_URL:
        from_secret: discord_pr_alerts_webhook
    when:
      - event: cron
    depends_on:
      - health-scan

  - name: notify-on-issues
    image: alpine/curl
    commands:
      - |
        # Check if any critical issues were found
        CRITICAL_COUNT=$(redis-cli -h host.docker.internal -p 6380 --json GET "bmad:chiseai:pr:health:last_critical_count" 2>/dev/null || echo "0")
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "Critical PR issues detected: $CRITICAL_COUNT"
          # Send notification (Discord webhook, etc.)
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d '{"content": "🚨 PR Lifecycle Alert: '"$CRITICAL_COUNT"' critical PR issues detected"}' \
              "$DISCORD_WEBHOOK_URL" || true
          fi
        fi
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_pr_alerts_webhook
    when:
      - event: cron
    depends_on:
      - health-scan
