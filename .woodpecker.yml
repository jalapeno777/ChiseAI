when:
  event: [ push, pull_request, manual ]

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  swarm-context:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        rm -f _bmad-output/ci/*.status
        set +e
        (
          set -euo pipefail
          python scripts/ci/validate_swarm_context.py
        ) > _bmad-output/ci/swarm-context.log 2>&1
        code=$?
        cat _bmad-output/ci/swarm-context.log
        echo "$code" > _bmad-output/ci/swarm-context.status
        exit 0

  lint:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir black ruff mypy pytest pytest-cov pyyaml types-PyYAML types-requests
          black --check . --extend-exclude 'src/operations/backtest_runner.py|tests/test_backtest_runner.py|tests/grafana/test_dashboards.py' || echo "WARN: black violations (non-blocking)"
          ruff check . || echo "WARN: ruff violations (non-blocking)"
          mypy src scripts || echo "WARN: mypy violations (non-blocking)"
          python scripts/validate_status_sync.py
          python scripts/validate_iterloop_compliance.py
          python scripts/validate_pr_title.py
        ) > _bmad-output/ci/lint.log 2>&1
        code=$?
        cat _bmad-output/ci/lint.log
        echo "$code" > _bmad-output/ci/lint.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  security-scan:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir bandit
          # Keep deterministic and avoid flagging automation scripts; scan application code only.
          bandit -q -r src -s B311,B107
        ) > _bmad-output/ci/security-scan.log 2>&1
        code=$?
        cat _bmad-output/ci/security-scan.log
        echo "$code" > _bmad-output/ci/security-scan.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  local-ci:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          # Install system dependencies required by tests
          apt-get update && apt-get install -y jq
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml requests
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets
          if [ -x scripts/local-ci-checks.sh ]; then
            ./scripts/local-ci-checks.sh
          else
            echo "scripts/local-ci-checks.sh not found; failing"
            exit 1
          fi
        ) > _bmad-output/ci/local-ci-full.log 2>&1
        code=$?
        cat _bmad-output/ci/local-ci-full.log
        echo "$code" > _bmad-output/ci/local-ci.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  brain-evaluation:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/brain-eval
        set +e
        (
          set -euo pipefail
          # Check if brain files changed
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(src/brain|brains)/'; then
            echo "Brain changes detected, running evaluation..."
            pip install --no-cache-dir -e . > /dev/null 2>&1
            python scripts/ci/run_brain_evaluation.py --output-dir _bmad-output/brain-eval
          else
            echo "No brain changes, skipping evaluation"
            echo '{"skipped": true, "reason": "No brain changes detected"}' > _bmad-output/brain-eval/summary.json
          fi
        ) > _bmad-output/brain-eval/brain-evaluation.log 2>&1
        code=$?
        cat _bmad-output/brain-eval/brain-evaluation.log
        echo "$code" > _bmad-output/brain-eval/brain-evaluation.status
        # Non-blocking: always exit 0 (warnings only)
        exit 0

  ci-root-cause-bundle:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          # Preferred path: query Woodpecker API using WOODPECKER_TOKEN if available.
          python scripts/ci/woodpecker_triage.py bundle --pipeline "${CI_PIPELINE_NUMBER:-0}" --format human
        ) > _bmad-output/ci/root-cause.log 2>&1
        code=$?
        if [ "$code" -ne 0 ]; then
          (
            set -euo pipefail
            # Fallback path: diagnose from captured local artifacts.
            python scripts/ci/woodpecker_triage.py bundle --from-local-dir _bmad-output/ci --format human
          ) >> _bmad-output/ci/root-cause.log 2>&1 || true
        fi
        cat _bmad-output/ci/root-cause.log
        echo "0" > _bmad-output/ci/root-cause.status
        exit 0

  ci-gate:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir requests
        python scripts/ci/ci_gate.py

  taiga-sync-validate:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional gate: only run when explicitly enabled via CI env/secrets.
        if [ "${TAIGA_SYNC_VALIDATE:-}" != "1" ]; then
          echo "TAIGA_SYNC_VALIDATE != 1; skipping taiga sync validation"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --validate

  taiga-sync-apply:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional automation: apply only on main, only when explicitly enabled.
        if [ "${TAIGA_SYNC_APPLY:-}" != "1" ]; then
          echo "TAIGA_SYNC_APPLY != 1; skipping taiga sync apply"
          exit 0
        fi
        if [ "${CI_COMMIT_BRANCH:-}" != "main" ]; then
          echo "Not on main; skipping taiga sync apply"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --apply
