when:
  event: [ pull_request, manual, cron ]

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      remote:
        from_secret: gitea_clone_url

steps:
  swarm-context:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        rm -f _bmad-output/ci/*.status
        set +e
        (
          set -euo pipefail
          python scripts/ci/validate_swarm_context.py
        ) > _bmad-output/ci/swarm-context.log 2>&1
        code=$?
        cat _bmad-output/ci/swarm-context.log
        echo "$code" > _bmad-output/ci/swarm-context.status
        exit 0

  lint:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir black ruff mypy pytest pytest-cov pyyaml types-PyYAML types-requests
          CHANGED_PY="$(python scripts/ci/ci_change_scope.py --mode changed-python | tr '\n' ' ')"
          if [ -n "$(printf '%s' "$CHANGED_PY" | tr -d '[:space:]')" ]; then
            echo "lint: checking changed python files only: ${CHANGED_PY}"
            black --check ${CHANGED_PY} || echo "WARN: black violations (non-blocking)"
            ruff check ${CHANGED_PY} || echo "WARN: ruff violations (non-blocking)"
          else
            echo "lint: no changed python files; skipping black/ruff file checks"
          fi
          mypy src scripts || echo "WARN: mypy violations (non-blocking)"
          python scripts/validate_status_sync.py
          python scripts/validate_fr_traceability.py
          python scripts/validate_iterloop_compliance.py
          python scripts/validate_pr_title.py
          python scripts/validate_traceability_drift.py --verbose
        ) > _bmad-output/ci/lint.log 2>&1
        code=$?
        cat _bmad-output/ci/lint.log
        echo "$code" > _bmad-output/ci/lint.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  security-scan:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir bandit
          # Keep deterministic and avoid flagging automation scripts; scan application code only.
          # Fail only on medium/high findings to avoid blocking on informational lows.
          bandit -q -r src -s B311,B107 -ll
        ) > _bmad-output/ci/security-scan.log 2>&1
        code=$?
        cat _bmad-output/ci/security-scan.log
        echo "$code" > _bmad-output/ci/security-scan.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  local-ci:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          EVENT="${CI_BUILD_EVENT:-${WOODPECKER_BUILD_EVENT:-${WOODPECKER_EVENT:-}}}"
          BRANCH="${CI_COMMIT_BRANCH:-${WOODPECKER_COMMIT_BRANCH:-}}"
          FULL_MODE=0
          if [ "${CI_FORCE_FULL:-0}" = "1" ]; then
            FULL_MODE=1
          elif [ "${EVENT}" = "cron" ] && [ "${BRANCH}" = "main" ]; then
            FULL_MODE=1
          fi

          if [ "${FULL_MODE}" = "0" ]; then
            if python scripts/ci/ci_change_scope.py --mode docs-only; then
              echo "local-ci: docs/opencode-only change detected; skipping heavy local-ci checks"
              exit 0
            fi
          else
            echo "local-ci: full-suite mode enabled (event=${EVENT}, branch=${BRANCH}, CI_FORCE_FULL=${CI_FORCE_FULL:-0})"
          fi

          # Install system dependencies required by tests
          apt-get update && apt-get install -y jq
          pip install --no-cache-dir pytest pytest-asyncio pytest-cov pyyaml requests
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi httpx
          pip install --no-cache-dir ccxt influxdb-client asyncpg numpy scipy watchdog click websockets fastapi
          if [ -x scripts/local-ci-checks.sh ]; then
            if [ "${FULL_MODE}" = "1" ]; then
              ./scripts/local-ci-checks.sh
            else
              ./scripts/local-ci-checks.sh --merged-only
            fi
          else
            echo "scripts/local-ci-checks.sh not found; failing"
            exit 1
          fi
        ) > _bmad-output/ci/local-ci-full.log 2>&1
        code=$?
        cat _bmad-output/ci/local-ci-full.log
        echo "$code" > _bmad-output/ci/local-ci.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  pipeline-watchdog:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          pip install --no-cache-dir requests
          python scripts/ci/check_woodpecker_stuck_pipelines.py --max-running-seconds 1800
        ) > _bmad-output/ci/pipeline-watchdog.log 2>&1
        code=$?
        cat _bmad-output/ci/pipeline-watchdog.log
        echo "$code" > _bmad-output/ci/pipeline-watchdog.status
        # Non-blocking signal; ci-gate remains the only fail point.
        exit 0

  brain-eval:
    image: python:3.11
    commands:
      - |
        set -euo pipefail
        mkdir -p _bmad-output/ci
        set +e
        (
          set -euo pipefail
          python -V
          pip install --no-cache-dir pyyaml requests numpy scipy
          # Check if brain files changed
          if git diff --name-only origin/main HEAD | grep -qE "(src/brain/|src/neuro_symbolic/|src/strategy/)"; then
            echo "Brain changes detected, running evaluation..."
            pip install -e . > /dev/null 2>&1 || pip install -e . --break-system-packages > /dev/null 2>&1 || true
            python scripts/ci/brain_eval_ci.py --output _bmad-output/ci/brain-eval.json
          else
            echo "No brain changes detected, skipping evaluation"
            echo '{"success": true, "skipped": true, "reason": "No brain changes detected"}' > _bmad-output/ci/brain-eval.json
          fi
        ) > _bmad-output/ci/brain-eval.log 2>&1
        code=$?
        cat _bmad-output/ci/brain-eval.log
        echo "$code" > _bmad-output/ci/brain-eval.status
        # Do not short-circuit the pipeline; ci-gate is the single fail point.
        exit 0

  ci-gate:
    image: python:3.11
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - |
        set -euo pipefail
        pip install --no-cache-dir requests
        python scripts/ci/ci_gate.py

  taiga-sync-validate:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional gate: only run when explicitly enabled via CI env/secrets.
        if [ "${TAIGA_SYNC_VALIDATE:-}" != "1" ]; then
          echo "TAIGA_SYNC_VALIDATE != 1; skipping taiga sync validation"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --validate

  taiga-sync-apply:
    image: python:3.11
    commands:
      - |
        set -eu
        # Optional automation: apply only on main, only when explicitly enabled.
        if [ "${TAIGA_SYNC_APPLY:-}" != "1" ]; then
          echo "TAIGA_SYNC_APPLY != 1; skipping taiga sync apply"
          exit 0
        fi
        if [ "${CI_COMMIT_BRANCH:-}" != "main" ]; then
          echo "Not on main; skipping taiga sync apply"
          exit 0
        fi
        pip install --no-cache-dir pyyaml requests
        python scripts/taiga_sync.py --apply
