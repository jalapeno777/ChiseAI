version: 1
policy_id: aria-notification-policy-v1

timezone: America/Toronto

digest:
  enabled: true
  delivery_time_local: "20:00"
  include:
    - new_beliefs_added
    - beliefs_updated
    - lessons_promoted
    - lessons_deprecated
    - contradictions_resolved
    - memories_archived_or_consolidated
    - blocked_items_pending_approval
    - top_3_things_aria_learned_today

immediate_alerts:
  enabled: true
  send_for_severity:
    - high
    - critical
  always_send_for:
    - approval_request
    - core_identity_conflict
    - proposed_soul_item_change
    - proposed_prd_objective_change
    - governance_conflict
    - safety_conflict

severity_model:
  low:
    - minor_preference_refinement
    - small_workflow_observation
    - weak_pattern
  medium:
    - useful_new_belief
    - lesson_promotion
    - lesson_deprecation
    - recurring_pattern
    - tool_preference_change
  high:
    - execution_quality_change
    - planning_quality_change
    - coordination_quality_change
    - memory_integrity_issue
  critical:
    - core_identity_conflict
    - prd_alignment_conflict
    - governance_or_safety_conflict
    - major_contradiction
    - harmful_autonomous_behavior_risk
