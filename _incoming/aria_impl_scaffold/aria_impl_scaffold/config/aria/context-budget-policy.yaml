version: 1
policy_id: aria-context-budget-policy-v1

hard_budget:
  enabled: true
  default_max_tokens: 12000

allocation_order:
  - name: core_personality
    reserve_pct: 18
    mandatory: true
  - name: personal_preferences
    reserve_pct: 14
    mandatory: true
  - name: project_rules_and_architecture
    reserve_pct: 22
    mandatory: true
  - name: current_task_details
    reserve_pct: 24
    mandatory: true
  - name: old_lessons
    reserve_pct: 12
    mandatory: false
  - name: old_conversations
    reserve_pct: 10
    mandatory: false

filters:
  reject_stale_conflicting_low_confidence_memory: true
  prefer_high_evidence_items: true
  deduplicate_cross_backend: true
  require_inclusion_audit_trace: true
