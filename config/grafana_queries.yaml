# Grafana Query Templates - Optimized for Performance
# Target: <3s dashboard load time
#
# This file contains optimized InfluxDB Flux queries for Grafana dashboards.
# Queries use time aggregation to reduce cardinality and improve performance.

---
version: "1.0"
description: "Optimized Grafana dashboard queries for ChiseAI"

# Time aggregation configuration
aggregation:
  # Map time ranges to aggregation windows
  windows:
    raw: "1s"      # Raw data for <5 minutes
    "1m": "1m"     # 1-minute aggregation for <1 hour
    "5m": "5m"     # 5-minute aggregation for <1 day
    "1h": "1h"     # 1-hour aggregation for <1 week
    "1d": "1d"     # 1-day aggregation for longer periods
  
  # Default aggregation function
  default_fn: "mean"
  
  # Aggregation functions by metric type
  functions:
    gauge: "mean"
    counter: "sum"
    histogram: "mean"

# Dashboard-specific query templates
dashboards:
  # Backtest KPIs Dashboard
  backtest_kpis:
    description: "Backtest performance metrics for trading strategies"
    default_time_range: "now-7d"
    refresh_interval: "30s"
    
    panels:
      # Stat panels - current values
      sharpe_ratio:
        type: stat
        time_range: "now-1h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "sharpe_ratio")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
            |> last()
        cache_ttl: 300
        
      max_drawdown:
        type: stat
        time_range: "now-1h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "max_drawdown")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
            |> last()
        cache_ttl: 300
        
      win_rate:
        type: stat
        time_range: "now-1h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "win_rate")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
            |> last()
        cache_ttl: 300
        
      trade_count:
        type: stat
        time_range: "now-1h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "trade_count")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
            |> last()
        cache_ttl: 300
      
      # Time series panels - trends
      sharpe_ratio_trend:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "sharpe_ratio")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
        cache_ttl: 600
        
      max_drawdown_trend:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "max_drawdown")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
        cache_ttl: 600
        
      win_rate_trend:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "win_rate")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
        cache_ttl: 600
        
      trade_count_trend:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "trade_count")
            |> filter(fn: (r) => "${strategy_id}" == "$__all" or r.strategy_id == "${strategy_id}")
            |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
        cache_ttl: 600
      
      # Table panels - comparisons
      strategy_comparison:
        type: table
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "backtest_kpis")
            |> filter(fn: (r) => r._field == "sharpe_ratio" or r._field == "max_drawdown" or r._field == "win_rate" or r._field == "trade_count" or r._field == "timestamp")
            |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
            |> group(columns: ["strategy_id"])
            |> last()
            |> keep(columns: ["strategy_id", "sharpe_ratio", "max_drawdown", "win_rate", "trade_count", "timestamp"])
        cache_ttl: 300

  # Data Freshness Dashboard
  data_freshness:
    description: "Data ingestion health monitoring"
    default_time_range: "now-7d"
    refresh_interval: "30s"
    
    panels:
      last_update_age:
        type: stat
        time_range: "now-5m"
        query_template: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -5m)
            |> filter(fn: (r) => r._measurement == "data_freshness")
            |> filter(fn: (r) => r._field == "last_update_age_seconds")
            |> filter(fn: (r) => r.source == "{source}")
            |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
            |> last()
        sources: ["binance", "bybit", "bitget"]
        cache_ttl: 60
        
      freshness_trend:
        type: timeseries
        time_range: "now-${lookback_days}d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -${lookback_days}d)
            |> filter(fn: (r) => r._measurement == "data_freshness")
            |> filter(fn: (r) => r._field == "last_update_age_seconds")
            |> aggregateWindow(every: 5m, fn: mean, createEmpty: false)
        cache_ttl: 300
        
      status_summary:
        type: table
        time_range: "now-5m"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -5m)
            |> filter(fn: (r) => r._measurement == "data_freshness")
            |> filter(fn: (r) => r._field == "last_update_age_seconds" or r._field == "last_update_timestamp" or r._field == "alert_status")
            |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
            |> map(fn: (r) => ({
              r with
              status_text: if r.alert_status == 0 then "OK"
                         else if r.alert_status == 1 then "STALE"
                         else "ALERT"
            }))
            |> last()
            |> keep(columns: ["source", "last_update_timestamp", "last_update_age_seconds", "alert_status", "status_text"])
        cache_ttl: 60

  # Strategy Registry Dashboard
  strategy_registry:
    description: "Strategy lifecycle management"
    default_time_range: "now-30d"
    refresh_interval: "1m"
    
    panels:
      status_count:
        type: stat
        time_range: "now-30d"
        query_template: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -30d)
            |> filter(fn: (r) => r._measurement == "strategy_registry")
            |> filter(fn: (r) => r._field == "status")
            |> filter(fn: (r) => r.status == "{status}")
            |> aggregateWindow(every: 1d, fn: count, createEmpty: false)
            |> last()
        statuses: ["champion", "challenger", "candidate", "deprecated"]
        cache_ttl: 300
        
      status_distribution:
        type: piechart
        time_range: "now-30d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -30d)
            |> filter(fn: (r) => r._measurement == "strategy_registry")
            |> filter(fn: (r) => r._field == "status")
            |> group(columns: ["status"])
            |> aggregateWindow(every: 1d, fn: count, createEmpty: false)
            |> last()
        cache_ttl: 300
        
      registry_table:
        type: table
        time_range: "now-30d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -30d)
            |> filter(fn: (r) => r._measurement == "strategy_registry")
            |> filter(fn: (r) => r._field == "strategy_id" or r._field == "version" or r._field == "symbol" or r._field == "timeframe" or r._field == "status" or r._field == "created_at")
            |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
            |> keep(columns: ["strategy_id", "version", "symbol", "timeframe", "status", "created_at"])
            |> rename(columns: {strategy_id: "Strategy", version: "Version", symbol: "Symbol", timeframe: "Timeframe", status: "Status", created_at: "Created"})
        cache_ttl: 300

  # Trading Overview Dashboard (New)
  trading_overview:
    description: "Real-time trading performance overview"
    default_time_range: "now-24h"
    refresh_interval: "30s"
    
    panels:
      pnl_chart:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "trading_performance")
            |> filter(fn: (r) => r._field == "pnl")
            |> aggregateWindow(every: 1h, fn: sum, createEmpty: false)
        cache_ttl: 600
        
      win_rate_daily:
        type: stat
        time_range: "now-24h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -24h)
            |> filter(fn: (r) => r._measurement == "trading_performance")
            |> filter(fn: (r) => r._field == "win_rate")
            |> aggregateWindow(every: 1h, fn: mean, createEmpty: false)
            |> last()
        cache_ttl: 300
        
      active_signals:
        type: stat
        time_range: "now-5m"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -5m)
            |> filter(fn: (r) => r._measurement == "signals")
            |> filter(fn: (r) => r._field == "active_count")
            |> last()
        cache_ttl: 60
        
      portfolio_value:
        type: timeseries
        time_range: "now-24h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "portfolio")
            |> filter(fn: (r) => r._field == "total_value")
            |> aggregateWindow(every: 5m, fn: mean, createEmpty: false)
        cache_ttl: 300

  # Risk Management Dashboard (New)
  risk_management:
    description: "Risk metrics and position monitoring"
    default_time_range: "now-24h"
    refresh_interval: "30s"
    
    panels:
      drawdown:
        type: timeseries
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "risk_metrics")
            |> filter(fn: (r) => r._field == "drawdown")
            |> aggregateWindow(every: 5m, fn: mean, createEmpty: false)
        cache_ttl: 600
        
      position_exposure:
        type: stat
        time_range: "now-5m"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -5m)
            |> filter(fn: (r) => r._measurement == "positions")
            |> filter(fn: (r) => r._field == "exposure")
            |> last()
        cache_ttl: 60
        
      correlation_matrix:
        type: heatmap
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -7d)
            |> filter(fn: (r) => r._measurement == "correlations")
            |> filter(fn: (r) => r._field == "correlation")
            |> aggregateWindow(every: 1h, fn: mean, createEmpty: false)
        cache_ttl: 1800
        
      risk_alerts:
        type: table
        time_range: "now-1h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -1h)
            |> filter(fn: (r) => r._measurement == "risk_alerts")
            |> filter(fn: (r) => r._field == "severity" or r._field == "message")
            |> pivot(rowKey:["_time"], columnKey: ["_field"], valueColumn: "_value")
            |> sort(columns: ["_time"], desc: true)
            |> limit(n: 20)
        cache_ttl: 60

  # Signal Analytics Dashboard (New)
  signal_analytics:
    description: "Signal generation and performance analytics"
    default_time_range: "now-7d"
    refresh_interval: "1m"
    
    panels:
      confidence_distribution:
        type: histogram
        time_range: "now-7d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: -7d)
            |> filter(fn: (r) => r._measurement == "signals")
            |> filter(fn: (r) => r._field == "confidence")
            |> aggregateWindow(every: 1h, fn: mean, createEmpty: false)
        cache_ttl: 600
        
      confluence_scores:
        type: timeseries
        time_range: "now-24h"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "signals")
            |> filter(fn: (r) => r._field == "confluence_score")
            |> aggregateWindow(every: 5m, fn: mean, createEmpty: false)
        cache_ttl: 300
        
      historical_accuracy:
        type: timeseries
        time_range: "now-30d"
        query: |
          from(bucket: "${influxdb_bucket}")
            |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
            |> filter(fn: (r) => r._measurement == "signal_performance")
            |> filter(fn: (r) => r._field == "accuracy")
            |> aggregateWindow(every: 1d, fn: mean, createEmpty: false)
        cache_ttl: 3600

# Performance targets
performance_targets:
  dashboard_load_time: "<3s"
  panel_query_time: "<500ms"
  cache_hit_rate: ">70%"
  max_empty_panels: 0

# Query optimization rules
optimization_rules:
  # Always use aggregateWindow for time series data
  - rule: "Use aggregateWindow for ranges > 1 hour"
    condition: "time_range > 1h"
    action: "add_aggregate_window"
  
  # Limit result sets
  - rule: "Limit table results to 100 rows"
    condition: "panel_type == table"
    action: "add_limit_n:100"
  
  # Use last() for stat panels
  - rule: "Use last() aggregation for stat panels"
    condition: "panel_type == stat"
    action: "add_last_aggregation"
  
  # Group by optimization
  - rule: "Minimize group by columns"
    condition: "always"
    action: "only_group_necessary_columns"
  
  # Field selection
  - rule: "Select only needed fields"
    condition: "always"
    action: "explicit_field_filter"
