# Market Realism Configuration for Paper Trading
# Defines slippage, latency, market impact, and fill probability parameters

# Default parameters applied to all symbols unless overridden
defaults:
  slippage:
    base_slippage_bps: 2.0
    volatility_factor: 1.0
    min_slippage_bps: 0.5
    max_slippage_bps: 100.0
    order_size_factor: 1.0
    adv_threshold: 0.001  # 0.1% of ADV

  latency:
    submission_mean_ms: 50.0
    submission_std_ms: 15.0
    fill_mean_ms: 100.0
    fill_std_ms: 30.0
    min_latency_ms: 5.0
    network_jitter_ms: 5.0

  market_impact:
    base_coefficient: 1.0
    volatility_sensitivity: 0.5
    min_impact_bps: 1.0
    max_impact_bps: 500.0
    adv_threshold: 0.001  # 0.1% of ADV
    temporary_impact_fraction: 0.7

  fill_probability:
    market_order_fill_prob: 1.0
    base_limit_fill_prob: 0.8
    price_distance_factor: 2.0
    depth_factor: 1.0
    large_order_threshold: 0.01  # 1% of book depth
    large_order_penalty: 0.3
    time_decay_factor: 0.95

# Per-symbol overrides
symbols:
  # Major cryptocurrencies - tighter spreads, lower slippage
  BTC/USDT:
    slippage:
      base_slippage_bps: 1.0
      max_slippage_bps: 50.0
    market_impact:
      base_coefficient: 0.8
      adv_threshold: 0.0005  # 0.05% of ADV

  ETH/USDT:
    slippage:
      base_slippage_bps: 1.5
      max_slippage_bps: 60.0
    market_impact:
      base_coefficient: 0.9
      adv_threshold: 0.0005

  # Mid-cap cryptocurrencies - moderate slippage
  SOL/USDT:
    slippage:
      base_slippage_bps: 3.0
      max_slippage_bps: 150.0
    market_impact:
      base_coefficient: 1.2

  AVAX/USDT:
    slippage:
      base_slippage_bps: 3.5
      max_slippage_bps: 200.0
    market_impact:
      base_coefficient: 1.3

  # Smaller cap - higher slippage
  # Note: Wildcard removed to allow proper fallback to defaults
  # Use explicit symbol configs or defaults will be applied

# Per-exchange latency configurations
exchanges:
  bybit:
    latency:
      submission_mean_ms: 45.0
      submission_std_ms: 12.0
      fill_mean_ms: 90.0
      fill_std_ms: 25.0

  binance:
    latency:
      submission_mean_ms: 40.0
      submission_std_ms: 10.0
      fill_mean_ms: 80.0
      fill_std_ms: 20.0

  coinbase:
    latency:
      submission_mean_ms: 60.0
      submission_std_ms: 20.0
      fill_mean_ms: 120.0
      fill_std_ms: 35.0

  kraken:
    latency:
      submission_mean_ms: 70.0
      submission_std_ms: 25.0
      fill_mean_ms: 150.0
      fill_std_ms: 40.0

  default:
    latency:
      submission_mean_ms: 50.0
      submission_std_ms: 15.0
      fill_mean_ms: 100.0
      fill_std_ms: 30.0

# Volatility regime adjustments
volatility_regimes:
  low:  # Volatility < 1%
    slippage:
      volatility_factor: 0.5
    market_impact:
      volatility_sensitivity: 0.3

  normal:  # Volatility 1% - 5%
    slippage:
      volatility_factor: 1.0
    market_impact:
      volatility_sensitivity: 0.5

  high:  # Volatility 5% - 10%
    slippage:
      volatility_factor: 2.0
    market_impact:
      volatility_sensitivity: 1.0

  extreme:  # Volatility > 10%
    slippage:
      volatility_factor: 4.0
      max_slippage_bps: 200.0
    market_impact:
      volatility_sensitivity: 2.0
      max_impact_bps: 1000.0
