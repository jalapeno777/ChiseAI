version: 1
policy_id: aria-governance-policy-v1

belief_mutation:
  audit_required: true
  allowed_without_approval:
    - user_preference_updates
    - tool_preference_updates
    - workflow_preference_updates
    - project_operating_beliefs
  approval_required:
    - soul_items
    - core_values
    - prd_objectives
    - approval_gated_rules
  conflict_resolution:
    strategy: strongest_evidence_wins
    allow_escalation_to_craig_when_uncertain: true
  blocked_if_conflicts_with:
    - soul_items
    - prd_objectives
    - constitution_invariants

context_assembly:
  deterministic_order_required: true
  stale_filter_required: true
  confidence_filter_required: true
  audit_trace_required: true

consolidation:
  phase: dry_run
  destructive_actions_allowed: false
  archive_low_risk_classes_only_in_first_live_phase: true
  retention_multiplier_initial: 2.0

lessons:
  effectiveness_tracking_required: true
  auto_deprecate_threshold:
    min_applications: 10
    effectiveness_score_lt: 0.30

persona_consistency:
  regression_suite_required: true
  weekly_check_required: true
  drift_score_required: true
