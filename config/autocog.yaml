# Autonomous Cognition Configuration
# Auto-generated from AUTOCOG Phase 1C Action
# Timestamp: 2026-03-16T15:38:00Z

version: 1

# Experimental Learning Mode
# Enables safe experimentation (2-3 experiments per cycle)
experiments:
  enabled: false
  max_experiments_per_cycle: 3
  safe_mode: true # Only run experiments within safety guardrails

# Qdrant Integration
# Enabled 2026-03-29: Batch 4 phased feature enablement
# Allows belief graph persistence in Qdrant (low-risk: pre-flight validates connectivity)
qdrant:
  write_enabled: true
  collection_name: "ChiseAI"
  vector_size: 384

# Metrics and Monitoring
metrics:
  # Candidate skip rate monitoring
  skip_rate_alert_threshold: 0.20 # 20%
  skip_rate_window_days: 7
  alert_on_high_skip_rate: true

# Scheduling Configuration
# Woodpecker cron triggers for autonomous cognition cycles
scheduling:
  version: 1
  woodpecker_crons:
    - name: autocog-hourly
      schedule: "0 * * * *"
      description: "Hourly belief consistency check"
      job_id: autocog.belief_consistency.hourly
    - name: autocog-improvement-daily
      schedule: "0 2 * * *"
      description: "Daily improvement cycle at 02:00 UTC"
      job_id: autocog.improvement_cycle.daily
    - name: autocog-constitution-daily
      schedule: "0 3 * * *"
      description: "Daily constitution audit at 03:00 UTC"
      job_id: autocog.constitution_audit.daily
    - name: autocog-calibration-weekly
      schedule: "0 1 * * 1"
      description: "Weekly calibration on Monday at 01:00 UTC"
      job_id: autocog.calibration.weekly
    - name: autocog-autonomy-tune-weekly
      schedule: "0 2 * * 1"
      description: "Weekly autonomy tune on Monday at 02:00 UTC"
      job_id: autocog.autonomy_tune.weekly

# Safety Guardrails (immutable via auto-actions)
safety:
  max_risk_level: "medium" # Auto-actions only up to medium
  require_approval_for: ["high", "critical"]
  protected_files:
    - "src/core/risk_caps.py"
    - "src/core/governance_bypasses.py"
    - "docs/bmm-workflow-status.yaml"

# Discord Notification Noise Reduction
# Controls when notifications are sent vs suppressed or batched
notifications:
  # Minimum score delta to trigger self-assessment notification (1%)
  notification_score_threshold: 0.01
  # Low-severity digest flush interval in minutes
  digest_interval_minutes: 60
  # Max buffered low-severity items before auto-flush
  digest_max_items: 10
