# STATUS DEFINITIONS:
# ==================
# Sprint Status:
#   - planned: Sprint planned but not yet started
#   - in_progress: Sprint actively being worked on
#   - completed: All stories in sprint completed
#   - blocked: Sprint blocked by dependencies
#
# Story Status:
#   - not_started: Story not yet started
#   - in_progress: Developer actively working on implementation
#   - review: Implementation complete, ready for review
#   - completed: Story completed
#   - validated: Story validated and accepted
#   - blocked: Story blocked by dependencies
#
# Task Status:
#   - not_started: Task not yet started
#   - in_progress: Task actively being worked on
#   - review: Task complete, ready for review
#   - completed: Task completed
#   - validated: Task validated
#   - blocked: Task blocked by dependencies
