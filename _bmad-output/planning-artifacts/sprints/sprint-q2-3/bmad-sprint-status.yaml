stories:
  # EP-LEARN-001: Learning System Foundation
  - story_id: ST-NS-019
    title: Confidence Threshold Calibration
    epic_id: EP-LEARN-001
    story_points: 6
    priority: P0-CRITICAL
    status: not_started
    description: Implement calibration data collector, threshold optimizer, and dynamic threshold controller for model confidence tuning
    tasks:
      - task_id: TASK-ST-NS-019-01
        title: Implement calibration data collector
        story_points: 2
        status: not_started
        description: Gathers prediction vs outcome pairs for calibration analysis
        acceptance_criteria:
          - Collect prediction probability and actual outcome pairs
          - Store calibration data in time-series format
          - Support configurable collection windows
          - Export data for ECE analysis
        owner_suggestion: ML Engineer
      - task_id: TASK-ST-NS-019-02
        title: Build threshold optimizer
        story_points: 2
        status: not_started
        description: Analyzes ECE vs threshold curves to find optimal confidence thresholds
        acceptance_criteria:
          - Calculate Expected Calibration Error (ECE) across threshold ranges
          - Generate threshold vs ECE curves for visualization
          - Identify optimal thresholds per signal type
          - Export optimized threshold configurations
        owner_suggestion: ML Engineer
        dependencies:
          - TASK-ST-NS-019-01
      - task_id: TASK-ST-NS-019-03
        title: Create dynamic threshold controller
        story_points: 2
        status: not_started
        description: Applies optimized thresholds dynamically based on market conditions
        acceptance_criteria:
          - Load and apply optimized thresholds at runtime
          - Support dynamic threshold updates without restart
          - Log threshold changes with timestamps
          - Provide API to query current threshold settings
        owner_suggestion: Backend Engineer
        dependencies:
          - TASK-ST-NS-019-02

  - story_id: ST-NS-020
    title: Training Data Generator
    epic_id: EP-LEARN-001
    story_points: 6
    priority: P0-CRITICAL
    status: not_started
    description: Design and implement training data generation pipeline for model retraining
    tasks:
      - task_id: TASK-ST-NS-020-01
        title: Design training data schema and storage format
        story_points: 2
        status: not_started
        description: Define schema for labeled training datasets
        acceptance_criteria:
          - Define feature schema for all signal types
          - Design label format (entry, exit, PnL, outcome)
          - Choose storage format (Parquet/Arrow for efficiency)
          - Document schema versioning strategy
        owner_suggestion: Data Engineer
      - task_id: TASK-ST-NS-020-02
        title: Implement signal feature extraction pipeline
        story_points: 2
        status: not_started
        description: Extract features from raw signals for training
        acceptance_criteria:
          - Extract technical indicators as features
          - Include market context (regime, volatility)
          - Add signal metadata (confidence, timeframe)
          - Support batch and streaming extraction
        owner_suggestion: Data Engineer
        dependencies:
          - TASK-ST-NS-020-01
      - task_id: TASK-ST-NS-020-03
        title: Build labeled dataset exporter for model retraining
        story_points: 2
        status: not_started
        description: Export labeled datasets compatible with training frameworks
        acceptance_criteria:
          - Export to common formats (CSV, Parquet, TFRecord)
          - Support train/validation/test splits
          - Include feature normalization parameters
          - Generate dataset manifest with statistics
        owner_suggestion: ML Engineer
        dependencies:
          - TASK-ST-NS-020-02

  # EP-INFRA-001: Performance & Infrastructure Optimization
  - story_id: ST-NS-025
    title: Dashboard Performance Optimization
    epic_id: EP-INFRA-001
    story_points: 7
    priority: P1-HIGH
    status: not_started
    description: Optimize dashboard performance through caching, query optimization, and lazy loading
    tasks:
      - task_id: TASK-ST-NS-025-01
        title: Implement query result caching layer (Redis)
        story_points: 3
        status: not_started
        description: Add Redis-based caching for dashboard queries
        acceptance_criteria:
          - Cache query results with configurable TTL
          - Implement cache invalidation on data updates
          - Cache hit ratio >80% for common queries
          - Add cache metrics to monitoring
        owner_suggestion: Backend Engineer
      - task_id: TASK-ST-NS-025-02
        title: Optimize Grafana panel queries and reduce data cardinality
        story_points: 2
        status: not_started
        description: Refactor queries to reduce load and improve response times
        acceptance_criteria:
          - Reduce query execution time by 50%
          - Implement data aggregation for historical views
          - Remove unused metrics from panels
          - Document optimized query patterns
        owner_suggestion: DevOps Engineer
      - task_id: TASK-ST-NS-025-03
        title: Add lazy loading and pagination for large datasets
        story_points: 2
        status: not_started
        description: Implement UI optimizations for large data displays
        acceptance_criteria:
          - Implement virtual scrolling for large tables
          - Add pagination for historical data views
          - Lazy load charts below the fold
          - Maintain <2s initial load time
        owner_suggestion: Frontend Engineer
        dependencies:
          - TASK-ST-NS-025-01

  - story_id: ST-NS-026
    title: Signal Delivery Latency Optimization
    epic_id: EP-INFRA-001
    story_points: 7
    priority: P0-CRITICAL
    status: not_started
    description: Reduce signal delivery latency through connection pooling, async processing, and batching
    tasks:
      - task_id: TASK-ST-NS-026-01
        title: Implement connection pooling for exchange APIs
        story_points: 3
        status: not_started
        description: Add connection pooling to reduce API latency
        acceptance_criteria:
          - Implement HTTP connection pooling for REST APIs
          - Add WebSocket connection management
          - Configure pool size based on throughput requirements
          - Monitor connection pool metrics
        owner_suggestion: Backend Engineer
      - task_id: TASK-ST-NS-026-02
        title: Add async signal processing pipeline
        story_points: 2
        status: not_started
        description: Convert signal processing to async for better throughput
        acceptance_criteria:
          - Convert synchronous processing to async/await
          - Implement backpressure handling
          - Add queue depth monitoring
          - Maintain ordering guarantees for signals
        owner_suggestion: Backend Engineer
        dependencies:
          - TASK-ST-NS-026-01
      - task_id: TASK-ST-NS-026-03
        title: Optimize Discord webhook delivery with batching
        story_points: 2
        status: not_started
        description: Batch Discord webhook calls to reduce API rate limiting
        acceptance_criteria:
          - Implement webhook batching with configurable batch size
          - Add retry logic with exponential backoff
          - Respect Discord rate limits (5 requests per 2 seconds)
          - Monitor delivery latency and success rate
        owner_suggestion: Backend Engineer
        dependencies:
          - TASK-ST-NS-026-02

  - story_id: ST-NS-027
    title: High Availability Infrastructure
    epic_id: EP-INFRA-001
    story_points: 7
    priority: P1-HIGH
    status: not_started
    description: Implement health checks, automatic failover, and redundancy for critical services
    tasks:
      - task_id: TASK-ST-NS-027-01
        title: Implement health check endpoints and monitoring
        story_points: 3
        status: not_started
        description: Add comprehensive health checks for all services
        acceptance_criteria:
          - Implement /health endpoint for all services
          - Add deep health checks (database, cache connectivity)
          - Integrate with Grafana for health monitoring
          - Configure alerting for health check failures
        owner_suggestion: DevOps Engineer
      - task_id: TASK-ST-NS-027-02
        title: Add automatic failover for critical services
        story_points: 2
        status: not_started
        description: Implement failover mechanisms for service redundancy
        acceptance_criteria:
          - Implement primary/secondary failover for critical services
          - Add health-based traffic routing
          - Configure automatic failover triggers
          - Test failover scenarios and document RTO/RPO
        owner_suggestion: DevOps Engineer
        dependencies:
          - TASK-ST-NS-027-01
      - task_id: TASK-ST-NS-027-03
        title: Create redundancy for data ingestion pipelines
        story_points: 2
        status: not_started
        description: Ensure data ingestion continues during failures
        acceptance_criteria:
          - Implement redundant data source connections
          - Add message queue buffering for ingestion
          - Configure automatic reconnection logic
          - Monitor ingestion lag and alert on anomalies
        owner_suggestion: DevOps Engineer
        dependencies:
          - TASK-ST-NS-027-02

  - story_id: ST-NS-028
    title: Security Hardening
    epic_id: EP-INFRA-001
    story_points: 6
    priority: P1-HIGH
    status: not_started
    description: Enhance security through encryption, TLS enforcement, and secrets management
    tasks:
      - task_id: TASK-ST-NS-028-01
        title: Audit and encrypt all secrets at rest (AES-256)
        story_points: 2
        status: not_started
        description: Encrypt all sensitive configuration and secrets
        acceptance_criteria:
          - Audit all secrets in configuration files
          - Implement AES-256 encryption for secrets at rest
          - Migrate existing secrets to encrypted storage
          - Document encryption key management procedures
        owner_suggestion: Security Engineer
      - task_id: TASK-ST-NS-028-02
        title: Enforce TLS 1.3 for all service communications
        story_points: 2
        status: not_started
        description: Upgrade all service communications to TLS 1.3
        acceptance_criteria:
          - Configure TLS 1.3 for all HTTP services
          - Update internal service-to-service communication
          - Disable TLS 1.0/1.1 fallback
          - Verify with SSL Labs or similar tool (A+ rating)
        owner_suggestion: Security Engineer
        dependencies:
          - TASK-ST-NS-028-01
      - task_id: TASK-ST-NS-028-03
        title: Implement secrets rotation and access logging
        story_points: 2
        status: not_started
        description: Add automated secrets rotation and audit logging
        acceptance_criteria:
          - Implement automated secrets rotation policy
          - Add access logging for all secret retrievals
          - Configure alerts for unusual access patterns
          - Document rotation schedule and procedures
        owner_suggestion: Security Engineer
        dependencies:
          - TASK-ST-NS-028-01

