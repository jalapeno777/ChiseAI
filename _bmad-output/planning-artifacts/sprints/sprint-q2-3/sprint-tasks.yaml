tasks:
  # ==========================================================================
  # ST-NS-019: Confidence Threshold Calibration (6 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-019-01
    story_id: ST-NS-019
    story_title: Confidence Threshold Calibration
    epic_id: EP-LEARN-001
    title: Implement calibration data collector
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Gathers prediction vs outcome pairs for calibration analysis.
      Collects model prediction probabilities and compares them with
      actual trade outcomes to measure calibration accuracy.
    
    acceptance_criteria:
      - criterion_id: ACC-019-01-001
        description: Collect prediction probability and actual outcome pairs
        validation_method: unit_test
        
      - criterion_id: ACC-019-01-002
        description: Store calibration data in time-series format
        validation_method: integration_test
        
      - criterion_id: ACC-019-01-003
        description: Support configurable collection windows (1h, 24h, 7d, 30d)
        validation_method: configuration_review
        
      - criterion_id: ACC-019-01-004
        description: Export data for ECE (Expected Calibration Error) analysis
        validation_method: manual_test
    
    technical_notes: |
      - Use Redis time-series for efficient storage
      - Schema: {timestamp, signal_id, predicted_prob, actual_outcome, signal_type}
      - Export format: Parquet for efficient analytics
    
    owner_suggestion: ML Engineer
    estimated_hours: 16
    
  - task_id: TASK-ST-NS-019-02
    story_id: ST-NS-019
    story_title: Confidence Threshold Calibration
    epic_id: EP-LEARN-001
    title: Build threshold optimizer
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Analyzes ECE vs threshold curves to find optimal confidence thresholds.
      Implements algorithms to minimize calibration error across different
      confidence levels and signal types.
    
    acceptance_criteria:
      - criterion_id: ACC-019-02-001
        description: Calculate Expected Calibration Error (ECE) across threshold ranges
        validation_method: unit_test
        
      - criterion_id: ACC-019-02-002
        description: Generate threshold vs ECE curves for visualization
        validation_method: manual_test
        
      - criterion_id: ACC-019-02-003
        description: Identify optimal thresholds per signal type (LONG, SHORT, SCALP)
        validation_method: unit_test
        
      - criterion_id: ACC-019-02-004
        description: Export optimized threshold configurations to YAML/JSON
        validation_method: integration_test
    
    technical_notes: |
      - ECE calculation: bin predictions by confidence, compare to accuracy
      - Support equal-frequency and equal-width binning
      - Optimization: minimize ECE while maintaining minimum signal volume
    
    owner_suggestion: ML Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-019-01
    
  - task_id: TASK-ST-NS-019-03
    story_id: ST-NS-019
    story_title: Confidence Threshold Calibration
    epic_id: EP-LEARN-001
    title: Create dynamic threshold controller
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Applies optimized thresholds dynamically based on market conditions.
      Provides runtime threshold management with hot-reload capabilities.
    
    acceptance_criteria:
      - criterion_id: ACC-019-03-001
        description: Load and apply optimized thresholds at runtime
        validation_method: integration_test
        
      - criterion_id: ACC-019-03-002
        description: Support dynamic threshold updates without service restart
        validation_method: manual_test
        
      - criterion_id: ACC-019-03-003
        description: Log threshold changes with timestamps and user context
        validation_method: log_review
        
      - criterion_id: ACC-019-03-004
        description: Provide REST API to query current threshold settings
        validation_method: api_test
    
    technical_notes: |
      - Implement file watcher for configuration changes
      - API endpoint: GET /api/v1/thresholds, POST /api/v1/thresholds/reload
      - Use atomic updates to prevent race conditions
    
    owner_suggestion: Backend Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-019-02

  # ==========================================================================
  # ST-NS-020: Training Data Generator (6 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-020-01
    story_id: ST-NS-020
    story_title: Training Data Generator
    epic_id: EP-LEARN-001
    title: Design training data schema and storage format
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Define schema for labeled training datasets including features,
      labels, and metadata required for model retraining.
    
    acceptance_criteria:
      - criterion_id: ACC-020-01-001
        description: Define feature schema for all signal types (LONG, SHORT, SCALP)
        validation_method: design_review
        
      - criterion_id: ACC-020-01-002
        description: Design label format (entry_price, exit_price, pnl, outcome)
        validation_method: design_review
        
      - criterion_id: ACC-020-01-003
        description: Choose storage format (Parquet/Arrow for efficiency)
        validation_method: performance_benchmark
        
      - criterion_id: ACC-020-01-004
        description: Document schema versioning strategy
        validation_method: documentation_review
    
    technical_notes: |
      - Features: technical indicators, market regime, volatility, sentiment
      - Labels: binary outcome, pnl, holding period, max_drawdown
      - Storage: Parquet with Snappy compression for optimal read performance
    
    owner_suggestion: Data Engineer
    estimated_hours: 16
    
  - task_id: TASK-ST-NS-020-02
    story_id: ST-NS-020
    story_title: Training Data Generator
    epic_id: EP-LEARN-001
    title: Implement signal feature extraction pipeline
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Extract features from raw signals for training. Includes technical
      indicators, market context, and signal metadata.
    
    acceptance_criteria:
      - criterion_id: ACC-020-02-001
        description: Extract technical indicators as features (RSI, MACD, BB, etc.)
        validation_method: unit_test
        
      - criterion_id: ACC-020-02-002
        description: Include market context (regime, volatility regime)
        validation_method: integration_test
        
      - criterion_id: ACC-020-02-003
        description: Add signal metadata (confidence, timeframe, model version)
        validation_method: unit_test
        
      - criterion_id: ACC-020-02-004
        description: Support batch and streaming extraction modes
        validation_method: performance_test
    
    technical_notes: |
      - Use pandas/ta-lib for technical indicators
      - Streaming mode for real-time feature generation
      - Batch mode for historical backfill
    
    owner_suggestion: Data Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-020-01
    
  - task_id: TASK-ST-NS-020-03
    story_id: ST-NS-020
    story_title: Training Data Generator
    epic_id: EP-LEARN-001
    title: Build labeled dataset exporter for model retraining
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Export labeled datasets compatible with training frameworks.
      Supports multiple formats and train/validation/test splits.
    
    acceptance_criteria:
      - criterion_id: ACC-020-03-001
        description: Export to common formats (CSV, Parquet, TFRecord)
        validation_method: integration_test
        
      - criterion_id: ACC-020-03-002
        description: Support configurable train/validation/test splits
        validation_method: unit_test
        
      - criterion_id: ACC-020-03-003
        description: Include feature normalization parameters (mean, std)
        validation_method: unit_test
        
      - criterion_id: ACC-020-03-004
        description: Generate dataset manifest with statistics (count, balance, features)
        validation_method: manual_test
    
    technical_notes: |
      - Default split: 70/15/15 with stratification by outcome
      - Include feature statistics for normalization
      - Manifest in JSON format with dataset metadata
    
    owner_suggestion: ML Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-020-02

  # ==========================================================================
  # ST-NS-025: Dashboard Performance Optimization (7 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-025-01
    story_id: ST-NS-025
    story_title: Dashboard Performance Optimization
    epic_id: EP-INFRA-001
    title: Implement query result caching layer (Redis)
    story_points: 3
    priority: P1-HIGH
    status: not_started
    
    description: |
      Add Redis-based caching for dashboard queries to reduce database
      load and improve response times.
    
    acceptance_criteria:
      - criterion_id: ACC-025-01-001
        description: Cache query results with configurable TTL (default 5 minutes)
        validation_method: integration_test
        
      - criterion_id: ACC-025-01-002
        description: Implement cache invalidation on data updates
        validation_method: integration_test
        
      - criterion_id: ACC-025-01-003
        description: Achieve cache hit ratio >80% for common queries
        validation_method: performance_benchmark
        
      - criterion_id: ACC-025-01-004
        description: Add cache metrics to Grafana monitoring (hits, misses, evictions)
        validation_method: dashboard_review
    
    technical_notes: |
      - Use Redis hash structure for query results
      - Cache key format: query:{hash_of_sql}:{params}
      - Implement cache-aside pattern
    
    owner_suggestion: Backend Engineer
    estimated_hours: 24
    
  - task_id: TASK-ST-NS-025-02
    story_id: ST-NS-025
    story_title: Dashboard Performance Optimization
    epic_id: EP-INFRA-001
    title: Optimize Grafana panel queries and reduce data cardinality
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Refactor queries to reduce load and improve response times.
      Remove unused metrics and optimize data aggregation.
    
    acceptance_criteria:
      - criterion_id: ACC-025-02-001
        description: Reduce query execution time by 50% (baseline vs optimized)
        validation_method: performance_benchmark
        
      - criterion_id: ACC-025-02-002
        description: Implement data aggregation for historical views (hourly, daily)
        validation_method: query_review
        
      - criterion_id: ACC-025-02-003
        description: Remove unused metrics from panels
        validation_method: dashboard_audit
        
      - criterion_id: ACC-025-02-004
        description: Document optimized query patterns in runbook
        validation_method: documentation_review
    
    technical_notes: |
      - Use continuous aggregates for time-series data
      - Limit raw data queries to last 24 hours
      - Pre-aggregate metrics for common time ranges
    
    owner_suggestion: DevOps Engineer
    estimated_hours: 16
    
  - task_id: TASK-ST-NS-025-03
    story_id: ST-NS-025
    story_title: Dashboard Performance Optimization
    epic_id: EP-INFRA-001
    title: Add lazy loading and pagination for large datasets
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Implement UI optimizations for large data displays including
      virtual scrolling, pagination, and lazy loading.
    
    acceptance_criteria:
      - criterion_id: ACC-025-03-001
        description: Implement virtual scrolling for large tables (>1000 rows)
        validation_method: manual_test
        
      - criterion_id: ACC-025-03-002
        description: Add pagination for historical data views
        validation_method: manual_test
        
      - criterion_id: ACC-025-03-003
        description: Lazy load charts below the fold
        validation_method: performance_test
        
      - criterion_id: ACC-025-03-004
        description: Maintain <2s initial load time for dashboard
        validation_method: performance_benchmark
    
    technical_notes: |
      - Use Intersection Observer API for lazy loading
      - Implement server-side pagination for large datasets
      - Virtual scrolling using react-window or similar
    
    owner_suggestion: Frontend Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-025-01

  # ==========================================================================
  # ST-NS-026: Signal Delivery Latency Optimization (7 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-026-01
    story_id: ST-NS-026
    story_title: Signal Delivery Latency Optimization
    epic_id: EP-INFRA-001
    title: Implement connection pooling for exchange APIs
    story_points: 3
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Add connection pooling to reduce API latency and improve throughput
      for exchange API communications.
    
    acceptance_criteria:
      - criterion_id: ACC-026-01-001
        description: Implement HTTP connection pooling for REST APIs
        validation_method: integration_test
        
      - criterion_id: ACC-026-01-002
        description: Add WebSocket connection management with auto-reconnect
        validation_method: integration_test
        
      - criterion_id: ACC-026-01-003
        description: "Configure pool size based on throughput requirements (min: 5, max: 20)"
        validation_method: configuration_review
        
      - criterion_id: ACC-026-01-004
        description: Monitor connection pool metrics (active, idle, wait time)
        validation_method: dashboard_review
    
    technical_notes: |
      - Use urllib3 or aiohttp for connection pooling
      - WebSocket: implement heartbeat and auto-reconnect
      - Pool size configurable per exchange
    
    owner_suggestion: Backend Engineer
    estimated_hours: 24
    
  - task_id: TASK-ST-NS-026-02
    story_id: ST-NS-026
    story_title: Signal Delivery Latency Optimization
    epic_id: EP-INFRA-001
    title: Add async signal processing pipeline
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Convert signal processing to async for better throughput
      and reduced latency.
    
    acceptance_criteria:
      - criterion_id: ACC-026-02-001
        description: Convert synchronous processing to async/await pattern
        validation_method: code_review
        
      - criterion_id: ACC-026-02-002
        description: Implement backpressure handling with bounded queues
        validation_method: load_test
        
      - criterion_id: ACC-026-02-003
        description: Add queue depth monitoring and alerting
        validation_method: integration_test
        
      - criterion_id: ACC-026-02-004
        description: Maintain ordering guarantees for signals (FIFO per symbol)
        validation_method: unit_test
    
    technical_notes: |
      - Use asyncio for Python async implementation
      - Queue size: 1000 signals max, drop oldest on overflow
      - Preserve ordering using symbol-based partitioning
    
    owner_suggestion: Backend Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-026-01
    
  - task_id: TASK-ST-NS-026-03
    story_id: ST-NS-026
    story_title: Signal Delivery Latency Optimization
    epic_id: EP-INFRA-001
    title: Optimize Discord webhook delivery with batching
    story_points: 2
    priority: P0-CRITICAL
    status: not_started
    
    description: |
      Batch Discord webhook calls to reduce API rate limiting
      and improve delivery reliability.
    
    acceptance_criteria:
      - criterion_id: ACC-026-03-001
        description: Implement webhook batching with configurable batch size (default 5)
        validation_method: integration_test
        
      - criterion_id: ACC-026-03-002
        description: Add retry logic with exponential backoff (max 3 retries)
        validation_method: unit_test
        
      - criterion_id: ACC-026-03-003
        description: Respect Discord rate limits (5 requests per 2 seconds)
        validation_method: load_test
        
      - criterion_id: ACC-026-03-004
        description: Monitor delivery latency and success rate (>99.9%)
        validation_method: monitoring_review
    
    technical_notes: |
      - Batch window: 500ms or batch size reached
      - Rate limiter using token bucket algorithm
      - Dead letter queue for failed deliveries
    
    owner_suggestion: Backend Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-026-02

  # ==========================================================================
  # ST-NS-027: High Availability Infrastructure (7 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-027-01
    story_id: ST-NS-027
    story_title: High Availability Infrastructure
    epic_id: EP-INFRA-001
    title: Implement health check endpoints and monitoring
    story_points: 3
    priority: P1-HIGH
    status: not_started
    
    description: |
      Add comprehensive health checks for all services to enable
      proactive monitoring and alerting.
    
    acceptance_criteria:
      - criterion_id: ACC-027-01-001
        description: Implement /health endpoint for all services (liveness)
        validation_method: integration_test
        
      - criterion_id: ACC-027-01-002
        description: Add deep health checks (database, cache, external APIs)
        validation_method: integration_test
        
      - criterion_id: ACC-027-01-003
        description: Integrate with Grafana for health monitoring dashboard
        validation_method: dashboard_review
        
      - criterion_id: ACC-027-01-004
        description: Configure alerting for health check failures (PagerDuty/Discord)
        validation_method: alert_test
    
    technical_notes: |
      - Liveness probe: simple HTTP 200 response
      - Readiness probe: check all dependencies
      - Health status: healthy, degraded, unhealthy
    
    owner_suggestion: DevOps Engineer
    estimated_hours: 24
    
  - task_id: TASK-ST-NS-027-02
    story_id: ST-NS-027
    story_title: High Availability Infrastructure
    epic_id: EP-INFRA-001
    title: Add automatic failover for critical services
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Implement failover mechanisms for service redundancy
      to ensure high availability.
    
    acceptance_criteria:
      - criterion_id: ACC-027-02-001
        description: Implement primary/secondary failover for critical services
        validation_method: failover_test
        
      - criterion_id: ACC-027-02-002
        description: Add health-based traffic routing
        validation_method: integration_test
        
      - criterion_id: ACC-027-02-003
        description: Configure automatic failover triggers (3 consecutive health check failures)
        validation_method: configuration_review
        
      - criterion_id: ACC-027-02-004
        description: Test failover scenarios and document RTO/RPO targets
        validation_method: disaster_recovery_test
    
    technical_notes: |
      - RTO target: < 30 seconds
      - RPO target: < 1 minute (data loss)
      - Use HAProxy or similar for traffic routing
    
    owner_suggestion: DevOps Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-027-01
    
  - task_id: TASK-ST-NS-027-03
    story_id: ST-NS-027
    story_title: High Availability Infrastructure
    epic_id: EP-INFRA-001
    title: Create redundancy for data ingestion pipelines
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Ensure data ingestion continues during failures through
      redundant connections and buffering.
    
    acceptance_criteria:
      - criterion_id: ACC-027-03-001
        description: Implement redundant data source connections (primary + backup)
        validation_method: failover_test
        
      - criterion_id: ACC-027-03-002
        description: Add message queue buffering for ingestion (RabbitMQ/Kafka)
        validation_method: integration_test
        
      - criterion_id: ACC-027-03-003
        description: Configure automatic reconnection logic with exponential backoff
        validation_method: integration_test
        
      - criterion_id: ACC-027-03-004
        description: Monitor ingestion lag and alert on anomalies (>30s lag)
        validation_method: monitoring_review
    
    technical_notes: |
      - Use message queue for buffering during outages
      - Reconnect backoff: 1s, 2s, 4s, 8s, max 60s
      - Lag monitoring via consumer offset tracking
    
    owner_suggestion: DevOps Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-027-02

  # ==========================================================================
  # ST-NS-028: Security Hardening (6 SP)
  # ==========================================================================
  - task_id: TASK-ST-NS-028-01
    story_id: ST-NS-028
    story_title: Security Hardening
    epic_id: EP-INFRA-001
    title: Audit and encrypt all secrets at rest (AES-256)
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Encrypt all sensitive configuration and secrets at rest
      using AES-256 encryption.
    
    acceptance_criteria:
      - criterion_id: ACC-028-01-001
        description: Audit all secrets in configuration files and environment variables
        validation_method: security_audit
        
      - criterion_id: ACC-028-01-002
        description: Implement AES-256 encryption for secrets at rest
        validation_method: security_review
        
      - criterion_id: ACC-028-01-003
        description: Migrate existing secrets to encrypted storage (HashiCorp Vault or similar)
        validation_method: migration_verification
        
      - criterion_id: ACC-028-01-004
        description: Document encryption key management procedures
        validation_method: documentation_review
    
    technical_notes: |
      - Use envelope encryption (data key + master key)
      - Master key in HSM or cloud KMS
      - Rotation policy: 90 days for data keys
    
    owner_suggestion: Security Engineer
    estimated_hours: 16
    
  - task_id: TASK-ST-NS-028-02
    story_id: ST-NS-028
    story_title: Security Hardening
    epic_id: EP-INFRA-001
    title: Enforce TLS 1.3 for all service communications
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Upgrade all service communications to TLS 1.3 for
      improved security and performance.
    
    acceptance_criteria:
      - criterion_id: ACC-028-02-001
        description: Configure TLS 1.3 for all HTTP services (external and internal)
        validation_method: ssl_scan
        
      - criterion_id: ACC-028-02-002
        description: Update internal service-to-service communication to use mTLS
        validation_method: integration_test
        
      - criterion_id: ACC-028-02-003
        description: Disable TLS 1.0/1.1 fallback completely
        validation_method: ssl_scan
        
      - criterion_id: ACC-028-02-004
        description: Verify with SSL Labs or similar tool (A+ rating required)
        validation_method: external_scan
    
    technical_notes: |
      - TLS 1.3 cipher suites: TLS_AES_256_GCM_SHA384, TLS_CHACHA20_POLY1305_SHA256
      - Disable all weak ciphers
      - HSTS header with 1 year max-age
    
    owner_suggestion: Security Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-028-01
    
  - task_id: TASK-ST-NS-028-03
    story_id: ST-NS-028
    story_title: Security Hardening
    epic_id: EP-INFRA-001
    title: Implement secrets rotation and access logging
    story_points: 2
    priority: P1-HIGH
    status: not_started
    
    description: |
      Add automated secrets rotation and comprehensive audit logging
      for secret access.
    
    acceptance_criteria:
      - criterion_id: ACC-028-03-001
        description: Implement automated secrets rotation policy (90-day default)
        validation_method: automation_test
        
      - criterion_id: ACC-028-03-002
        description: Add access logging for all secret retrievals (who, when, what)
        validation_method: log_review
        
      - criterion_id: ACC-028-03-003
        description: Configure alerts for unusual access patterns (>10 accesses/hour)
        validation_method: alert_test
        
      - criterion_id: ACC-028-03-004
        description: Document rotation schedule and emergency rotation procedures
        validation_method: documentation_review
    
    technical_notes: |
      - Rotation: automatic with 7-day overlap period
      - Access logs: SIEM integration for analysis
      - Alerting: anomaly detection on access patterns
    
    owner_suggestion: Security Engineer
    estimated_hours: 16
    dependencies:
      - TASK-ST-NS-028-01

