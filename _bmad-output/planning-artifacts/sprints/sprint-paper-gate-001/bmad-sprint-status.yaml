goal: >
  Activate paper-trading canary with full monitoring pipeline and evidence
  collection for human approval packets.

gate_criteria:
  max_drawdown_pct: 5.0
  min_win_rate_pct: 55.0
  min_canary_duration_days: 7
  min_trade_count: 10
  monitoring_interval_minutes: 15
  portfolio_allocation_pct: 10.0
  max_leverage: 3.0
  per_trade_risk_pct: 1.0
  per_grid_risk_pct: 2.0

phases:
  - phase: pre_flight
    name: Pre-Flight Checks
    status: planned
    target_days: "1-3"
    tasks:
      - id: PF-DATA
        name: Verify data feeds functional
        status: planned
        depends_on: [ST-DATA-001, ST-DATA-002]
      - id: PF-GRAFANA
        name: Verify Grafana panels ready
        status: planned
        depends_on: [ST-OPS-001, ST-OPS-002]
      - id: PF-KILLSWITCH
        name: Verify kill-switch integration
        status: planned
        depends_on: [ST-EX-003]

  - phase: canary_activation
    name: Canary Activation
    status: planned
    target_days: "4-7"
    tasks:
      - id: CA-CONFIG
        name: Configure canary parameters
        status: planned
        depends_on: [ST-BT-002]
      - id: CA-START
        name: Start paper-trading at 10%
        status: planned
        depends_on: [ST-EX-001]
      - id: CA-MONITOR
        name: Verify monitoring interval
        status: planned
        depends_on: [CA-START]

  - phase: gate_monitoring
    name: Gate Monitoring
    status: planned
    target_days: "8-14"
    tasks:
      - id: GM-CRITERIA
        name: Monitor gate criteria
        status: planned
        depends_on: [CA-MONITOR]
      - id: GM-EVIDENCE
        name: Evidence collection test
        status: planned
        depends_on: [ST-BT-003]
      - id: GM-REVIEW
        name: Canary completion review
        status: planned
        depends_on: [GM-CRITERIA, GM-EVIDENCE]

  - phase: validation_handoff
    name: Validation & Handoff
    status: planned
    target_days: "15-21"
    tasks:
      - id: VH-VALIDATE
        name: Full 7-day cycle validation
        status: planned
        depends_on: [GM-REVIEW]
      - id: VH-PACKET
        name: Promotion packet finalization
        status: planned
        depends_on: [VH-VALIDATE]
      - id: VH-APPROVAL
        name: Human approval review
        status: planned
        depends_on: [VH-PACKET]

