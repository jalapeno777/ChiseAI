name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install black ruff mypy
      - name: Check formatting and linting
        run: |
          CHANGED_PY=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_PY=$(git diff --name-only origin/main HEAD | grep '\.py$' | tr '\n' ' ' || true)
          else
            CHANGED_PY=$(find src scripts -name '*.py' -not -path '*/test_*' | head -50 | tr '\n' ' ' || true)
          fi
          if [ -z "$(echo $CHANGED_PY | tr -d '[:space:]')" ]; then
            echo "No Python files to check"
            exit 0
          fi
          echo "Checking: $CHANGED_PY"
          echo "$CHANGED_PY" | tr ' ' '\n' | grep -v '^$' | xargs black --check || echo "WARN: black formatting issues"
          echo "$CHANGED_PY" | tr ' ' '\n' | grep -v '^$' | xargs ruff check || echo "WARN: ruff lint issues"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          pip install pytest pytest-cov fakeredis 2>/dev/null || true
      - name: Run tests
        run: |
          ulimit -n 16384 2>/dev/null || true
          python3 -m pytest tests/ -x -q --tb=short \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            -k "not slow" \
            --timeout=120 || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install bandit 2>/dev/null || true
      - name: Bandit scan
        run: |
          CHANGED_PY=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_PY=$(git diff --name-only origin/main HEAD | grep -E '\.py$' | tr '\n' ' ' || true)
          else
            CHANGED_PY=$(find src scripts -name '*.py' | head -50 | tr '\n' ' ' || true)
          fi
          if [ -n "$(echo $CHANGED_PY | tr -d '[:space:]')" ]; then
            echo "$CHANGED_PY" | tr ' ' '\n' | grep -v '^$' | xargs bandit -c pyproject.toml -q -ll || echo "WARN: bandit findings (non-blocking)"
          fi

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
