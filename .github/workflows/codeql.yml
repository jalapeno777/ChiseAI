name: "CodeQL Analysis"

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "config/**"
      - "*.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "config/**"
      - "*.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC — always runs full scan

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
