# Pre-commit configuration for ChiseAI
# Aligns with .woodpecker/ci.yaml validation steps
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
        files: \.(py)$

  # Python linting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
        files: \.(py)$

  # Type checking with mypy (optional, can be slow)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: \.(py)$
        args: [--ignore-missing-imports, --no-error-summary]
        pass_filenames: false
        additional_dependencies:
          - types-requests
          - types-PyYAML

  # Security scanning with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-q, -ll]
        files: \.(py)$

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe, --allow-multiple-documents]
        files: \.(yaml|yml)$

  # JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # Shell script validation
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        types: [shell]
        files: \.(sh|bash)$

  # Secret scanning with gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Local validation scripts (align with CI gates)
  - repo: local
    hooks:
      # Status sync validation (aligns with CI lint step)
      - id: status-sync-check
        name: Status Sync Validation
        entry: python3 scripts/validate_status_sync.py
        language: system
        pass_filenames: false
        stages: [commit-msg]

      # PR title validation (aligns with CI lint step)
      - id: pr-title-check
        name: PR Title Validation
        entry: python3 scripts/validate_pr_title.py
        language: system
        pass_filenames: false
        stages: [commit-msg]

      # Traceability validation (aligns with CI lint step)
      - id: fr-traceability-check
        name: FR Traceability Validation
        entry: python3 scripts/validate_fr_traceability.py
        language: system
        pass_filenames: false
        stages: [commit-msg]

      # Tempmemory frontmatter validation (ST-MEMORY-INGEST-004)
      - id: tempmemory-frontmatter-check
        name: Tempmemory Frontmatter Validation
        entry: python3 .pre-commit-hooks/validate-tempmemory-frontmatter.py
        language: system
        pass_filenames: true
        files: docs/tempmemories/.*\.md$
        stages: [pre-commit]

      # Quick pytest for staged files (ST-GIT-REMEDIATION-001)
      - id: quick-pytest-staged
        name: Quick pytest (staged files)
        entry: python3 scripts/ci/quick_pytest_staged.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: false

      # Evidence validator for docs/evidence files (ST-GIT-REMEDIATION-001)
      - id: evidence-validator
        name: Evidence Validator
        entry: python3 scripts/swarm/evidence_validator.py
        language: system
        pass_filenames: true
        files: ^docs/evidence/.*\.md$
        args: ["--files"]

  # Configure stages
default_stages: [pre-commit]

# Skip files matching these patterns
exclude: |
  (?x)(
    ^\.git/ |
    ^_bmad-output/ |
    ^\.venv/ |
    ^venv/ |
    ^build/ |
    ^dist/ |
    \.egg-info/ |
    ^docs/tempmemories/
  )

# Fail fast on first error
fail_fast: false

# Verbose output
verbose: true
