    fr_coverage: [FR-012]
    description: Implement core position sizing calculation engine with Kelly Criterion, fixed fractional, and volatility-based sizing methods
    acceptance_criteria:
      - Kelly Criterion sizing is calculated correctly (f* = (bp - q) / b)
      - Fixed fractional sizing supports configurable risk percentage (default 1-2%)
      - Volatility-based sizing uses ATR or historical volatility
      - Position size is calculated as: (Account Balance × Risk %) / (Stop Distance × Tick Value)
      - Maximum position size limits are enforced per token and portfolio-wide
      - Unit tests cover all sizing methods with edge cases (zero volatility, extreme prices)

