    epic_id: EP-NS-008
    sprint_id: q2-7
    status: planned
    validation_status: planned
    story_points: 7
    priority: P0-CRITICAL
    fr_coverage: [FR-ACP-001, FR-ACP-002]
    description: Implement centralized circuit breaker registry consolidating all existing circuit breakers into a unified management plane with real-time telemetry
    scope_globs: ["src/autonomous_control_plane/components/circuit_breaker_registry.py", "src/autonomous_control_plane/telemetry/metrics.py"]
    acceptance_criteria:
      - Circuit breaker registry provides CRUD operations for all service circuit breakers
      - Registry state is persisted in Redis with PostgreSQL backup
      - Telemetry exports to InfluxDB every 15s with tags for service_name, state, failure_count
      - Dashboard panel shows all circuit breaker states in real-time
      - Bulk operations complete within 1 second
      - API endpoints provide queryable circuit breaker health
      - Unit test coverage >=85% with integration tests
    test_strategy:
      unit: "pytest tests/test_autonomous/test_circuit_breaker_registry.py -v"
      integration: "pytest tests/test_autonomous/integration/test_cb_telemetry.py -v"
      e2e: "scripts/e2e/test_circuit_breaker_lifecycle.py"
    live_validation_gates:
      - gate: "registry_startup"
        check: "curl -f http://localhost:8000/health"
        timeout: 30s
      - gate: "telemetry_flow"
        check: "influx query from bucket chiseai for circuit_breaker_state"
        timeout: 60s
    rollback_plan:
      - action: "Disable circuit breaker automation"
        command: "curl -X POST http://localhost:8000/api/v1/circuit-breakers/disable-auto"
      - action: "Revert to local circuit breakers"
