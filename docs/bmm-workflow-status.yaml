  - id: ST-NS-038
    title: Circuit Breaker Registry & Unified Telemetry
    epic_id: EP-NS-008
    sprint_id: q2-7
    status: planned
    validation_status: planned
    story_points: 7
    priority: P0-CRITICAL
    fr_coverage: [FR-ACP-001, FR-ACP-002]
    description: Implement centralized circuit breaker registry consolidating all existing circuit breakers into a unified management plane with real-time telemetry
    scope_globs: ["src/autonomous_control_plane/components/circuit_breaker_registry.py", "src/autonomous_control_plane/telemetry/metrics.py"]
    acceptance_criteria:
      - Circuit breaker registry provides CRUD operations for all service circuit breakers
      - Registry state is persisted in Redis with PostgreSQL backup
      - Telemetry exports to InfluxDB every 15s with tags for service_name, state, failure_count
      - Dashboard panel shows all circuit breaker states in real-time
      - Bulk operations complete within 1 second
      - API endpoints provide queryable circuit breaker health
      - Unit test coverage >=85% with integration tests
    test_strategy:
      unit: "pytest tests/test_autonomous/test_circuit_breaker_registry.py -v"
      integration: "pytest tests/test_autonomous/integration/test_cb_telemetry.py -v"
      e2e: "scripts/e2e/test_circuit_breaker_lifecycle.py"
    live_validation_gates:
      - gate: "registry_startup"
        check: "curl -f http://localhost:8000/health"
        timeout: 30s
      - gate: "telemetry_flow"
        check: "influx query from bucket chiseai for circuit_breaker_state"
        timeout: 60s
    rollback_plan:
      - action: "Disable circuit breaker automation"
        command: "curl -X POST http://localhost:8000/api/v1/circuit-breakers/disable-auto"
      - action: "Revert to local circuit breakers"
        command: "kubectl rollout undo deployment/autonomous-control-plane"
    observability:
      - metric: "circuit_breaker_state_changes"
        dashboard: "Autonomous Control Plane / Circuit Breakers"
      - metric: "registry_query_latency_p99"
        alert: "p99 > 100ms for 5 minutes"

  # ST-NS-039: Retry Coordinator with Budget Management
  - id: ST-NS-039
    title: Retry Coordinator with Budget Management
    epic_id: EP-NS-008
    sprint_id: q2-7
    status: planned
    validation_status: planned
    story_points: 7
    priority: P0-CRITICAL
    fr_coverage: [FR-ACP-003, FR-ACP-004]
    description: Implement intelligent retry coordinator with exponential backoff, jitter, and retry budget management to prevent retry storms
    scope_globs: ["src/autonomous_control_plane/components/retry_coordinator.py", "src/autonomous_control_plane/models/retry_policy.py"]
    depends_on: [ST-NS-038]
    acceptance_criteria:
      - Retry coordinator supports exponential backoff with configurable base and max delay
      - Jitter prevents thundering herd with random component added to delays
      - Per-service retry budgets prevent retry storms with >100 retries per minute blocks
      - Integration with circuit breaker registry prevents retries when circuit open
      - Operation-level retry policies override global defaults
      - Failed operations are queued for manual review after max retries
      - Retry metrics exported including attempts, successes, budget_exceeded events
    test_strategy:
      unit: "pytest tests/test_autonomous/test_retry_coordinator.py -v"
      load: "locust -f tests/load/retry_storm_prevention.py"
      chaos: "pytest tests/chaos/test_retry_under_failure.py -v"
    live_validation_gates:
      - gate: "retry_budget_enforcement"
        check: "scripts/validate_retry_budget.sh --max-rps=100"
        timeout: 120s
      - gate: "backoff_timing"
        check: "pytest tests/e2e/test_retry_timing.py"
        timeout: 60s
    rollback_plan:
      - action: "Disable retry coordination"
        command: "curl -X POST http://localhost:8000/api/v1/retry/disable"
      - action: "Revert to component-local retry logic"
        command: "git checkout HEAD~1 -- src/execution/kill_switch/retry_handler.py"
    observability:
      - metric: "retry_attempts_total"
        dashboard: "Autonomous Control Plane / Retry Activity"
      - metric: "retry_budget_exceeded_rate"
        alert: "> 5% of operations in 5-minute window"

