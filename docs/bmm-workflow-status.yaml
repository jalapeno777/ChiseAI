  # EP-CI-001: CI/CD Autonomy (4 stories, 14 points)
  - id: ST-CI-001
    title: Real CI Gates - Black/Ruff/Mypy/Pytest/Coverage
    epic_id: EP-CI-001
    sprint_id: p0-1
    status: completed
    validation_status: validated
    story_points: 4
    priority: P0-CRITICAL
    fr_coverage: [FR-DEV-001]
    description: Make CI gates real and blocking (Black/Ruff/Mypy/Pytest/Coverage) for safe autonomous merges
    acceptance_criteria:
      - Black formatting failures fail CI (exit code non-zero)
      - Ruff lint failures fail CI with zero tolerance for errors
      - Mypy type check failures fail CI (strict mode enabled)
      - Pytest test failures fail CI (any failed test blocks merge)
      - Coverage below 80% threshold fails CI with detailed report
      - CI gates are non-bypassable without explicit human override and audit log

  - id: ST-CI-002
