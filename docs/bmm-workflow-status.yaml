stories:
  # EP-CHISE-001: Chise v1 Brain Operations (5 stories, 19 points)
  - id: ST-CHISE-001
    title: Brain CI/CD Pipeline - Version and Evaluate
    epic_id: EP-CHISE-001
    sprint_id: p0-1
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement Brain CI/CD pipeline with versioning and evaluation workflow
    acceptance_criteria:
      - Brain versioning follows semantic versioning (MAJOR.MINOR.PATCH)
      - Evaluation runs automatically on new versions within 5 minutes of push
      - Shadow testing runs against live brain in parallel with <100ms latency overhead
      - Promotion is gated by human approval packet with required fields complete
      - CI blocks promotion on failed evaluations (non-bypassable without override)
      - Rollback to previous version completes in <5 minutes

  - id: ST-CHISE-002
    title: Brain Evaluation Framework - Batching + BrainEval
    epic_id: EP-CHISE-001
    sprint_id: p0-1
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Build brain evaluation framework with batching support and BrainEval protocol
    acceptance_criteria:
      - Evaluation batches support 3-5 brain versions simultaneously
      - Evaluation results are persisted with full metrics (accuracy, precision, recall, F1)
      - BrainEval tool is integrated and callable via CLI/API
      - Evaluation criteria are documented and version-controlled (accuracy, ECE, safety checks)
      - Batch results are rankable and comparable with sortable leaderboard
      - Evaluation completes within 30 minutes for standard test suite

  - id: ST-CHISE-003
    title: Brain Promotion Packet - Evidence + Rollback
    epic_id: EP-CHISE-001
    sprint_id: p0-1
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Generate promotion packets for brain upgrades with evidence and rollback procedures
    acceptance_criteria:
      - Packets include all required fields: evaluation summary, safety checks, rollback steps, human approval checkbox
      - Rollback steps are detailed, tested in dev environment, and executable in <5 minutes
      - Packet generation is automated and triggered on evaluation completion
      - Rollback path is documented with verification steps for each stage
      - Promotion is gated by human approval via signed-off packet
      - Packet format is human-readable (Markdown) and machine-parseable (JSON)

  - id: ST-CHISE-004
    title: Chise v1 Loop Compliance - Iteration + Logging
    epic_id: EP-CHISE-001
    sprint_id: p0-1
    status: planned
    story_points: 4
    priority: P1-HIGH
    description: Ensure Chise v1 loop compliance with iteration tracking and Redis/Qdrant logging
    acceptance_criteria:
      - Iteration logs are stored in Redis with 5-day TTL (432,000 seconds)
      - Key decisions are logged per iteration with timestamp and rationale
      - Learnings are promoted to Qdrant on story completion with proper metadata
      - Iteration logs follow schema: story_id, phase, status, started_at, key_decisions
      - Memory promotion happens automatically or via manual trigger command
      - Redis iteration log keys are queryable by story_id pattern

  - id: ST-CHISE-005
    title: Chise v1 Rollback Plan - Safety + Rollback Steps
    epic_id: EP-CHISE-001
    sprint_id: p0-1
    status: planned
    story_points: 3
    priority: P0-CRITICAL
    description: Define comprehensive rollback plan with safety checks and rollback steps
    acceptance_criteria:
      - Rollback triggers are documented: ECE degradation >0.15, safety violations, human request
      - Rollback steps are detailed, tested in dev, and executable in <5 minutes
      - Safety checks verify system state before rollback (no active trades, data consistency)
      - Rollback path includes verification steps at each stage
      - Rollback outcome is logged for post-mortem analysis with full context
      - Emergency rollback command is available via CLI with --force override option

  # EP-CI-001: CI/CD Autonomy (4 stories, 14 points)
  - id: ST-CI-001
    title: Real CI Gates - Black/Ruff/Mypy/Pytest/Coverage
    epic_id: EP-CI-001
    sprint_id: p0-1
    status: completed
    story_points: 4
    priority: P0-CRITICAL
    description: Make CI gates real and blocking (Black/Ruff/Mypy/Pytest/Coverage) for safe autonomous merges
    acceptance_criteria:
      - Black formatting failures fail CI (exit code non-zero)
      - Ruff lint failures fail CI with zero tolerance for errors
      - Mypy type check failures fail CI (strict mode enabled)
      - Pytest test failures fail CI (any failed test blocks merge)
      - Coverage below 80% threshold fails CI with detailed report
      - CI gates are non-bypassable without explicit human override and audit log

  - id: ST-CI-002
    title: Gitea PR Auto-Merge Bot - Green CI Only
    epic_id: EP-CI-001
    sprint_id: p0-1
    status: completed
    story_points: 4
    priority: P0-CRITICAL
    description: Implement PR open/poll/merge automation via Gitea API; merge only when required checks are green
    acceptance_criteria:
      - PRs do not merge when any required check is missing or failed
      - PRs merge automatically once all checks are green and reviews approved
      - Bot polls Gitea API every 60 seconds for PR status updates
      - Merge requires explicit approval from at least 1 required reviewer
      - Failed merges are logged with error details and retry count
      - Bot handles merge conflicts by notifying author and skipping auto-merge

  - id: ST-CI-003
    title: Branch Hygiene Automation - Prune + Prevention
    epic_id: EP-CI-001
    sprint_id: p0-1
    status: in_progress
    story_points: 3
    priority: P1-HIGH
    description: Auto-prune merged branches and prevent long-lived divergence
    acceptance_criteria:
      - Merged branches are auto-deleted after 24 hours of merge completion
      - Branches older than 30 days trigger warning notifications
      - Divergence detection alerts on >50 commits drift from main
      - Branch naming conventions are enforced (feature/*, bugfix/*, hotfix/*)
      - Cleanup operations are logged with branch name, author, and timestamp
      - Protected branches (main, release/*) are excluded from auto-deletion

  - id: ST-CI-004
    title: Security Scan Gate - Deterministic Bandit
    epic_id: EP-CI-001
    sprint_id: p0-1
    status: planned
    story_points: 3
    priority: P1-HIGH
    description: Add deterministic security scanning to CI (bandit on src)
    acceptance_criteria:
      - CI runs bandit scan on src/ directory with severity filter
      - Critical/high severity findings fail the pipeline immediately
      - Scan is deterministic (same code produces same findings)
      - Medium/low severity issues trigger warnings but allow merge
      - Security scan results are logged with file:line references
      - Bandit configuration is version-controlled in pyproject.toml

  # EP-DATA-001: Data & Continuous Backtesting (4 stories, 16 points)
  - id: ST-DATA-001
    title: Exchange Market Data Ingestion - Binance Reference
    epic_id: EP-DATA-001
    sprint_id: p0-2
    status: completed
    story_points: 4
    priority: P0-CRITICAL
    description: Ingest market-structure reference data (order book/liquidity/open interest) from Binance for 10 tokens
    acceptance_criteria:
      - Order book snapshots are captured at 100ms intervals for all 10 tokens
      - Liquidity metrics (bid/ask spread, depth) are calculated correctly
      - Open interest data is aggregated and stored as time-series
      - Data quality checks pass: no gaps >5s, no duplicates, price accuracy ±0.01%
      - Ingest latency is <2s at 95th percentile
      - Failed ingests trigger alerts within 10 seconds

  - id: ST-DATA-002
    title: Execution Market Data Ingestion - Bybit/Bitget
    epic_id: EP-DATA-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Ingest execution-market data needed for sizing/SL/TP and realized trade analytics
    acceptance_criteria:
      - Real-time pricing data matches exchange API within 100ms
      - Fill data is captured and persisted with order_id, price, quantity, timestamp
      - Position/SL/TP data is queryable for risk calculations via API
      - Data gaps >10s trigger alerts with source and duration
      - Exchange connection health is monitored (heartbeat every 30s)
      - Reconnect logic handles disconnects with exponential backoff (max 60s)

  - id: ST-DATA-003
    title: Continuous Backtest Runner - Always-on + KPIs
    epic_id: EP-DATA-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Run continuous backtests (including walk-forward) and persist KPIs
    acceptance_criteria:
      - Backtests run continuously without manual start/stop intervention
      - KPIs are generated per backtest (Sharpe, max drawdown, win rate, trade count)
      - KPIs are persisted to InfluxDB with strategy_id and timestamp tags
      - Runner recovers from failures and resumes processing within 60 seconds
      - Backtest queue depth and lag are monitored in Grafana
      - Walk-forward backtests complete daily for all active strategies

  - id: ST-DATA-004
    title: Data Quality Monitoring - Freshness + Gaps
    epic_id: EP-DATA-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P1-HIGH
    description: Monitor data freshness, detect gaps, and alert on ingestion failures
    acceptance_criteria:
      - Last update timestamps are visible per data source in Grafana
      - Freshness thresholds are configurable per source (>5min stale = alert default)
      - Data gaps are detected within 60 seconds of occurrence
      - Alert triggers when any source exceeds freshness threshold
      - Historical freshness trends are queryable and plottable in Grafana
      - Alert routing sends notifications to Discord #alerts channel

  # EP-BT-001: Strategy Intake & Candidate Evaluation (5 stories, 20 points)
  - id: ST-SIG-001
    title: Strategy Submission Format & DSL Schema
    epic_id: EP-BT-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Define DSL schema for strategy submission format and validation
    acceptance_criteria:
      - DSL schema is validated on submission with clear error messages
      - Invalid strategies are rejected with field-level error details
      - DSL versioning is supported with migration path between versions
      - DSL is diffable and reproducible (same input = same output)
      - Schema enforces safe parameter ranges (max leverage, position size limits)
      - DSL specification is documented in docs/architecture/strategy-dsl.md

  - id: ST-SIG-002
    title: Strategy Registry - Champion/Challenger Tracking
    epic_id: EP-BT-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Build strategy registry with champion/challenger tracking and versioning
    acceptance_criteria:
      - Champion/challenger relationships are maintained with clear status
      - Artifacts are stored: config, diffs, backtest results, paper results
      - KPIs are comparable across strategies with normalized metrics
      - Challenger promotion criteria are documented and enforced
      - Registry state is visible in Grafana dashboard
      - Strategy versions are immutable once registered

  - id: ST-BT-001
    title: Candidate Backtesting & Ranking
    epic_id: EP-BT-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement candidate backtesting pipeline with standardized ranking metrics
    acceptance_criteria:
      - Backtests use consistent walk-forward windows (30-day train, 7-day test)
      - Ranking criteria are applied uniformly across all candidates
      - Backtest results are persisted with full metrics to time-series DB
      - Top 3 candidates are identified for paper testing based on composite score
      - Ranking is transparent with criteria weights and scores visible
      - Ranking pipeline completes within 4 hours for 100 candidates

  - id: ST-BT-002
    title: Paper Canary Planning & Gates
    epic_id: EP-BT-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Design paper canary deployment with explicit gates for promotion
    acceptance_criteria:
      - Canary size is defined as 10% of paper portfolio allocation
      - Gate criteria are documented: max 5% drawdown, min 55% win rate, 7-day duration
      - Gate failure triggers automatic rollback to previous champion
      - Canary results are persisted and visible in Grafana dashboard
      - Promotion to paper full is gated by human approval with evidence review
      - Canary monitoring checks run every 15 minutes during canary period

  - id: ST-BT-003
    title: Promotion Packet Generation (Human Approval)
    epic_id: EP-BT-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Generate human-readable promotion packets with evidence, risks, and rollback plan
    acceptance_criteria:
      - Packets include: evidence summary, KPI comparison, risk assessment, rollback plan
      - Packets are rendered in human-readable Markdown format
      - Rollback steps are detailed, tested, and executable in <5 minutes
      - Packet generation is automated and triggered on gate completion
      - Approval workflow is documented with required approvers and SLAs
      - Packets are stored with version history and audit trail

  # EP-ML-001: ML Optimization for Strategy Tuning (3 stories, 11 points)
  - id: ST-ML-001
    title: Walk-Forward Evaluation Framework
    epic_id: EP-ML-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement walk-forward evaluation framework for robust strategy validation
    acceptance_criteria:
      - Walk-forward windows are configurable (default: 30-day train, 7-day test)
      - No future data leaks into training set (verified by temporal split audit)
      - Performance metrics are calculated per window and aggregated
      - Walk-forward results are aggregateable for strategy comparison
      - Look-ahead bias checks pass (test data not used in training)
      - Framework completes evaluation within 2 hours per strategy

  - id: ST-ML-002
    title: Hyperparameter Optimization - Genetic/BO
    epic_id: EP-ML-001
    sprint_id: p0-2
    status: planned
    story_points: 4
    priority: P1-HIGH
    description: Implement genetic algorithm and Bayesian optimization for strategy hyperparameter tuning
    acceptance_criteria:
      - Optimization converges to stable parameter sets (variance <5% across runs)
      - Optimization runs complete within 24 hours per strategy
      - Optimized parameters improve backtest KPIs vs baseline by >10%
      - Optimization history is tracked with parameter values and scores
      - Both genetic algorithm and Bayesian optimization methods are supported
      - Optimization respects parameter constraints (min/max bounds, integer constraints)

  - id: ST-ML-003
    title: ML Optimization Cadence - Auto-tuning Schedule
    epic_id: EP-ML-001
    sprint_id: p0-2
    status: planned
    story_points: 3
    priority: P1-HIGH
    description: Set up automated tuning schedule for continuous strategy optimization
    acceptance_criteria:
      - Scheduled optimization jobs run reliably without manual trigger
      - Optimization schedule is configurable per strategy (daily/weekly/monthly)
      - Optimization frequency adapts to market volatility regime
      - Optimization results are persisted with timestamp and parameter deltas
      - Optimization can be paused/resumed without data loss
      - Schedule is visible and editable via CLI and dashboard

  # EP-CONF-001: Confidence Scoring - ECE/Thresholds (3 stories, 10 points)
  - id: ST-CONF-001
    title: ECE Calculation per Strategy/Signal Type
    epic_id: EP-CONF-001
    sprint_id: p0-3
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement Expected Calibration Error (ECE) calculation per strategy and signal type
    acceptance_criteria:
      - ECE calculations use correct binning (10 bins: 0-10%, 10-20%, etc.)
      - ECE is calculated per signal type (entry, exit, SL, TP)
      - Historical ECE values are tracked and trended over time
      - ECE calculations are verified against ground truth labels
      - ECE is queryable per strategy via API for calibration decisions
      - ECE updates daily with new prediction-outcome pairs

  - id: ST-CONF-002
    title: Confidence Threshold Calibration - Dynamic vs Fixed
    epic_id: EP-CONF-001
    sprint_id: p0-3
    status: planned
    story_points: 3
    priority: P1-HIGH
    description: Implement dynamic vs fixed confidence threshold calibration
    acceptance_criteria:
      - Dynamic threshold adjustment algorithm is documented and implemented
      - Threshold history is tracked with changes and reasons
      - Fixed threshold mode is available as fallback with manual override
      - Threshold adjustments improve calibration (ECE decreases by >0.05)
      - Threshold changes are logged with timestamp, old value, new value, reason
      - Mode switching (dynamic/fixed) is configurable per strategy

  - id: ST-CONF-003
    title: Confidence Threshold Enforcement - <40% Filter
    epic_id: EP-CONF-001
    sprint_id: p0-3
    status: planned
    story_points: 3
    priority: P0-CRITICAL
    description: Enforce confidence threshold filter (<40% signals filtered from Discord)
    acceptance_criteria:
      - Confidence filter is applied before Discord alert generation
      - Filtered signals are logged with confidence score and reason for filtering
      - No Discord alerts are sent for signals below 40% confidence
      - Filter threshold is configurable per user preference (40% default)
      - Filter statistics are visible in Grafana (filtered count, rate, trends)
      - Filter can be bypassed for testing with explicit flag and audit log

  # EP-EX-001: Execution (Perps-First) (3 stories, 13 points)
  - id: ST-EX-001
    title: Bybit Demo Paper Trading Integration
    epic_id: EP-EX-001
    sprint_id: p0-4
    status: planned
    story_points: 5
    priority: P0-CRITICAL
    description: Integrate Bybit demo paper trading with trade budget enforcement and KPI tracking
    acceptance_criteria:
      - Paper trades execute on Bybit demo environment with order confirmation
      - Trade budget is enforced: max 10% portfolio exposure per trade
      - KPIs are tracked: PnL, max drawdown, win rate, trade count, Sharpe ratio
      - Paper kill-switch triggers on >=10% drawdown and closes all positions
      - Results are visible in Grafana with real-time updates (<5s latency)
      - Order lifecycle (pending, filled, partial, cancelled) is tracked and logged

  - id: ST-EX-002
    title: Bitget Live Trading Gating
    epic_id: EP-EX-001
    sprint_id: p0-4
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement Bitget live trading with human approval gating and risk controls
    acceptance_criteria:
      - Live trading requires explicit human approval via signed promotion packet
      - Approval gates check paper trading performance (min 30 days, positive Sharpe)
      - Risk controls are enforced before live activation (position limits, kill-switch)
      - Live trading can be disabled via kill-switch with immediate position close
      - All live trades are logged with full audit trail (timestamp, price, quantity, reason)
      - Live trading state is visible in Grafana (enabled/disabled, last approval date)

  - id: ST-EX-003
    title: Execution Risk Management - Kill Switch
    epic_id: EP-EX-001
    sprint_id: p0-4
    status: planned
    story_points: 4
    priority: P0-CRITICAL
    description: Implement kill switch and execution risk controls for live trading
    acceptance_criteria:
      - Kill-switch triggers on >=15% drawdown within rolling 24-hour window
      - Kill-switch closes all positions immediately via market orders
      - Kill-switch disables live execution until human re-authorizes with signed packet
      - Kill-switch state is visible in Grafana (armed, triggered, disabled)
      - Kill-switch triggers are logged with context (drawdown %, timestamp, positions)
      - Manual kill-switch trigger is available via CLI and dashboard with confirmation

