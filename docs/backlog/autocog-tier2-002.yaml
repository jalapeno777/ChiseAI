story_id: AUTOCOG-TIER2-002
title: "Self-Directed Story Proposal Generator"
priority: P1
story_points: 2
status: completed
epic: AUTOCOG-TIER2
created_date: "2026-03-18"
target_sprint: SPRINT-2026-03-31
description: |
  Implement story proposal generator that enables agents to identify
  improvement opportunities and propose new stories autonomously.
scope: |
  - Opportunity detection
  - Story template generation
  - Proposal scoring
  - Human review integration
  - Proposal tracking
acceptance_criteria:
  must_conditions:
    - Detect 10+ opportunity types
    - Generate valid story proposals
    - Proposal scoring algorithm
    - Integration with backlog system
  live_validation_requirements:
    - Propose 20+ stories in staging
    - ">70% proposal quality score"
    - <24h from detection to proposal
  evidence_file_requirements:
    - docs/evidence/AUTOCOG-TIER2-002-proposals-generated.json
    - docs/evidence/AUTOCOG-TIER2-002-quality-scores.json
risk_mitigation:
  overfitting_to_self_eval: |
    Mitigation: Proposals validated against historical high-quality stories.
    Human feedback loop for proposal quality.
  unsafe_autonomous_change: |
    Mitigation: All proposals require human approval before backlog entry.
    Scope limits on autonomous proposal types.
  data_quality_drift: |
    Mitigation: Opportunity detection based on stable metrics.
    Drift detection for opportunity signals.
  ci_operational_fragility: |
    Mitigation: Proposal generation idempotent and recoverable.
    Queue-based proposal processing.
  model_degradation_on_deploy: |
    Mitigation: A/B testing for proposal quality.
    Gradual rollout of new opportunity types.
dependencies:
  required_before:
    - AUTOCOG-TIER2-001
    - AUTOCOG-OBS-001
  enables:
    - AUTOCOG-TIER3-001
files_expected:
  - src/autonomous_cognition/proposal_generator.py
  - src/autonomous_cognition/opportunity_detection.py
  - tests/test_autonomous_cognition/test_proposals.py
estimated_lines: 500
estimated_tests: 25
