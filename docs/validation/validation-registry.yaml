  # EP-CHISE-001: Chise v1 Brain Operations (5 validations)
  - id: V-CHISE-001
    title: Brain CI/CD Pipeline - Version and Evaluate
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-001
    status: planned
    description: Validate Chise v1 brain has CI/CD pipeline for version management, shadow testing, and promotion
    acceptance_criteria:
      - Brain versioning follows semantic versioning
      - Evaluation runs automatically on new versions
      - Shadow testing runs against live brain in parallel
      - Promotion is gated by human approval packet
      - CI blocks promotion on failed evaluations
    test_method: automated
    owner: ml-team

  - id: V-CHISE-002
    title: Brain Evaluation Framework - Batching + BrainEval
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-002
    status: planned
    description: Validate brain evaluation framework supports batch evaluation of multiple brain versions and uses BrainEval tool
    acceptance_criteria:
      - Evaluation batches support 3-5 brain versions
      - Evaluation results are persisted with full metrics
      - BrainEval tool is integrated correctly
      - Evaluation criteria are documented (accuracy, ECE, safety)
      - Batch results are rankable and comparable
    test_method: automated
    owner: ml-team

  - id: V-CHISE-003
    title: Brain Promotion Packet - Evidence + Rollback
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-003
    status: planned
    description: Validate promotion packets for brain upgrades include evidence, risk assessment, and rollback steps
    acceptance_criteria:
      - Packets include all required fields (evaluation summary, safety checks, rollback steps, human approval checkbox)
      - Rollback steps are detailed and tested
      - Packet generation is automated
      - Rollback path is documented and verified
      - Promotion is gated by human approval
    test_method: manual
    owner: ml-team

  - id: V-CHISE-004
    title: Chise v1 Loop Compliance - Iteration + Logging
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-004
    status: validated
    description: Validate Chise v1 brain follows iteration loop compliance with proper iteration logging and memory promotion
