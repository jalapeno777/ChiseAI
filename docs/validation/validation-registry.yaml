  # EP-CI-001: CI/CD Autonomy (4 validations)
  - id: V-CI-001
    title: Real CI Gates - Black/Ruff/Mypy/Pytest/Coverage
    epic_id: EP-CI-001
    story_id: ST-CI-001
    status: planned
    description: Validate CI runs and blocks merges on lint/type/test failures
    acceptance_criteria:
      - Black/ruff/mypy failures fail CI
      - Pytest failures fail CI
      - Coverage below threshold fails CI
      - CI gates are non-bypassable without explicit human override
      - Failed gates prevent auto-merge
    test_method: automated
    owner: qa-team

  - id: V-CI-002
    title: Gitea PR Auto-Merge Bot - Green CI Only
    epic_id: EP-CI-001
    story_id: ST-CI-002
    status: planned
    description: Validate merge automation only merges PRs with required checks green
    acceptance_criteria:
      - PRs do not merge when any required check is missing/failed
      - PRs merge automatically once checks are green
      - Bot polls Gitea API for PR status
      - Merge requires explicit approval from required reviewers
      - Failed merges are logged with error details
    test_method: manual
    owner: ops-team

  - id: V-CI-003
    title: Branch Hygiene Automation - Prune + Prevention
    epic_id: EP-CI-001
    story_id: ST-CI-003
    status: in_progress
    description: Validate auto-prune merged branches and prevent long-lived divergence
    acceptance_criteria:
      - Merged branches are auto-deleted after 24 hours
      - Branches older than 30 days trigger warnings
      - Divergence detection alerts on significant drift from main
      - Branch naming conventions are enforced
      - Cleanup operations are logged
    test_method: automated
    owner: ops-team

  - id: V-CI-004
    title: Security Scan Gate - Deterministic Bandit
    epic_id: EP-CI-001
    story_id: ST-CI-004
    status: validated
    description: Validate deterministic security scan runs in CI and blocks merges on findings
    acceptance_criteria:
      - CI runs bandit scan on src/ directory
      - Findings fail the pipeline
      - Scan is deterministic (same findings for same code)
      - Critical/high severity issues block merges
      - Medium/low issues trigger warnings but allow merge
    test_method: automated
    owner: security-team

