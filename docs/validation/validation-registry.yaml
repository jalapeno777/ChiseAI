      - Failed merges are logged with error details
    test_method: manual
    owner: ops-team

  - id: V-CI-003
    title: Branch Hygiene Automation - Prune + Prevention
    epic_id: EP-CI-001
    story_id: ST-CI-003
    status: validated
    description: Validate auto-prune merged branches and prevent long-lived divergence
    acceptance_criteria:
      - Merged branches are auto-deleted after 24 hours of merge completion
      - Branches older than 30 days trigger warning notifications
      - Divergence detection alerts on >50 commits drift from main
      - Branch naming conventions are enforced (feature/*, bugfix/*, hotfix/*)
      - Cleanup operations are logged with branch name, author, and timestamp
      - Protected branches (main, release/*) are excluded from auto-deletion
    test_method: automated
    owner: ops-team

  - id: V-CI-004
    title: Security Scan Gate - Deterministic Bandit
    epic_id: EP-CI-001
    story_id: ST-CI-004
    status: validated
    description: Validate deterministic security scan runs in CI and blocks merges on findings
    acceptance_criteria:
      - CI runs bandit scan on src/ directory
      - Findings fail the pipeline
      - Scan is deterministic (same findings for same code)
      - Critical/high severity issues block merges
      - Medium/low issues trigger warnings but allow merge
    test_method: automated
    owner: security-team

