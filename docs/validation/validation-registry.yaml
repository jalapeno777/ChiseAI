  # EP-CHISE-001: Chise v1 Brain Operations (5 validations)
  - id: V-CHISE-001
    title: Brain CI/CD Pipeline - Version and Evaluate
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-001
    status: validated
    description: Validate Chise v1 brain has CI/CD pipeline for version management, shadow testing, and promotion. CI trigger added via chise-brain-upgrade-attempt workflow.
    acceptance_criteria:
      - Brain versioning follows semantic versioning
      - Evaluation runs automatically on new versions
      - Shadow testing runs against live brain in parallel
      - Promotion is gated by human approval packet
      - CI blocks promotion on failed evaluations
    test_method: automated
    owner: ml-team

  - id: V-CHISE-002
