    owner: ml-team

  - id: V-CHISE-005
    title: Chise v1 Rollback Plan - Safety + Rollback Steps
    epic_id: EP-CHISE-001
    story_id: ST-CHISE-005
    status: planned
    description: Validate Chise v1 brain rollback plan includes safety checks and detailed rollback steps
