    - metric: "Average archive time"
      target: "< 1s per story"
      measurement: "Redis timing logs"
    
    - metric: "Search response time"
      target: "< 200ms"
      measurement: "Qdrant query timing"
    
    - metric: "User satisfaction"
      target: "> 4/5"
      measurement: "Quarterly survey"

