archived_fields:
  description: Implement automatic model retraining triggers based on ECE degradation,
    performance thresholds, and schedule
  acceptance_criteria:
  - ECE-based trigger - Retraining triggered automatically when ECE > 0.15, alert
    sent to Discord
  - Performance-based trigger - Retraining triggered when win rate <55% over 20 trades,
    reason logged
  - Scheduled trigger - Retraining triggered at scheduled time, starts within 1 hour
  - Trigger deduplication - New trigger queued if retraining in progress, duplicates
    within 24h ignored
  - Pre-training validation - Training data quality validated, proceeds only if quality
    >90%
  notes:
  - CRITICAL for launch - model retraining must be automatic
  live_validation_gates:
  - check: Set ECE to 0.18, wait for trigger
    gate: trigger_accuracy
    threshold: Trigger fires within 5 minutes
  rollback_plan:
  - action: Disable auto-trigger
    command: redis-cli SET launch:training:auto_trigger:enabled 0
