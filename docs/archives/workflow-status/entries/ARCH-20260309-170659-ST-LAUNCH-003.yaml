archived_fields:
  description: Implement order idempotency using clientOrderId with Redis-based deduplication
    to prevent duplicate orders
  acceptance_criteria:
  - Client order ID generation - Unique ID generated with timestamp, token, random
    component for each order
  - Duplicate detection - Orders with existing clientOrderId rejected with DuplicateOrderException,
    original response returned
  - Redis TTL management - Idempotency keys stored with 24-hour TTL, automatic expiration
  - Idempotency scope - Each token has independent idempotency space, cross-token
    orders not deduplicated
  live_validation_gates:
  - check: Submit same order twice with same clientOrderId
    gate: duplicate_prevention
    threshold: Second order rejected, first order returned
  rollback_plan:
  - action: Disable idempotency
    command: redis-cli SET launch:safety:order_idempotency:enabled 0
  scope_globs:
  - src/data/exchange/bybit_connector.py
  - src/execution/order_idempotency.py
  - tests/test_execution/test_order_idempotency.py
  depends_on: []
