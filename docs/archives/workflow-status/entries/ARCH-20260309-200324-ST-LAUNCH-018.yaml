archived_fields:
  description: Create outcome capture service that listens to Bybit WebSocket fill
    events and stores trade outcomes for signal-to-outcome matching
  acceptance_criteria:
  - WebSocket listener - Connects to Bybit private WebSocket, subscribes to execution
    channel
  - Fill event parsing - Parses fill events to extract order_id, symbol, side, price,
    quantity, timestamp
  - Outcome storage - Stores outcomes in signal_outcomes table with proper schema
  - Signal matching - Matches fills to originating signals using order metadata
  - Error handling - Handles missed events, reconnections, and duplicate fills
  - Latency target - Outcomes available within 5 minutes of fill
  notes:
  - CRITICAL PATH - blocks all feedback loop stories
  - Must start on Day 1
  - Fallback: CSV export if WebSocket issues
  live_validation_gates:
